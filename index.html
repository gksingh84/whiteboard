  function getCachedImage(dataUrl) {
    if (!imageCache.has(dataUrl)) {
      const img = new Image();
      img.src = dataUrl;
      imageCache.set(dataUrl, img);
    }
    return imageCache.get(dataUrl);
  }

  const PX_PER_CM = 96 / 2.54;

  function drawGridBackground(ctx, w, h) {
    ctx.save();
    const isDark = currentBoardType === "black" || currentBoardType === "green";
    ctx.strokeStyle = isDark ? "rgba(255, 255, 255, 0.2)" : "rgba(0, 0, 0, 0.18)";
    ctx.lineWidth = 0.6;
    const step = PX_PER_CM;
    for (let x = 0; x <= w; x += step) {
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, h);
      ctx.stroke();
    }
    for (let y = 0; y <= h; y += step) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(w, y);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawGraphBackground(ctx, w, h) {
    const cx = w / 2;
    const cy = h / 2;
    const minorStep = 20;
    const majorStep = 100;
    ctx.save();
    // minor grid
    ctx.strokeStyle = "rgba(148, 163, 184, 0.35)";
    ctx.lineWidth = 0.5;
    for (let x = cx; x < w; x += minorStep) {
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, h);
      ctx.stroke();
    }
    for (let x = cx - minorStep; x >= 0; x -= minorStep) {
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, h);
      ctx.stroke();
    }
    for (let y = cy; y < h; y += minorStep) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(w, y);
      ctx.stroke();
    }
    for (let y = cy - minorStep; y >= 0; y -= minorStep) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(w, y);
      ctx.stroke();
    }
    // major grid
    ctx.strokeStyle = "rgba(148, 163, 184, 0.8)";
    ctx.lineWidth = 0.9;
    for (let x = cx; x < w; x += majorStep) {
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, h);
      ctx.stroke();
    }
    for (let x = cx - majorStep; x >= 0; x -= majorStep) {
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, h);
      ctx.stroke();
    }
    for (let y = cy; y < h; y += majorStep) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(w, y);
      ctx.stroke();
    }
    for (let y = cy - majorStep; y >= 0; y -= majorStep) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(w, y);
      ctx.stroke();
    }
    // axes
    ctx.strokeStyle = "#111827";
    ctx.lineWidth = 1.4;
    ctx.beginPath();
    ctx.moveTo(cx, 0);
    ctx.lineTo(cx, h);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0, cy);
    ctx.lineTo(w, cy);
    ctx.stroke();
    ctx.restore();
  }

  function drawPageContent(ctx, backgroundColor, options) {
    const page = pages[currentPageIndex];
    const skipTimeWidgets = options && options.skipTimeWidgets;
    ctx.fillStyle = backgroundColor;
    const w = boardCanvas ? boardCanvas.width / (window.devicePixelRatio || 1) / zoom : 800;
    const h = boardCanvas ? boardCanvas.height / (window.devicePixelRatio || 1) / zoom : 600;
    ctx.fillRect(0, 0, w, h);
    if (!page) return;

    // 1) Special backgrounds, otherwise optional background image
    if (currentTool === "graphs") {
      drawGraphBackground(ctx, w, h);
    } else if (page.gridVisible) {
      drawGridBackground(ctx, w, h);
    } else if (page.background && page.background.dataUrl) {
      const img = getCachedImage(page.background.dataUrl);
      if (img && img.complete) {
        const iw = img.width;
        const ih = img.height;
        if (iw > 0 && ih > 0) {
          const scale = Math.min(w / iw, h / ih);
          const dw = iw * scale;
          const dh = ih * scale;
          const dx = (w - dw) / 2;
          const dy = (h - dh) / 2;
          ctx.drawImage(img, dx, dy, dw, dh);
        }
      }
    }

    // 2) Draw all shapes (including image shapes) and text first
    if (page.shapes) {
      page.shapes.forEach((shape) => drawShape(ctx, shape, false));
    }
    if (page.texts) {
      page.texts.forEach((item) => drawTextItem(ctx, item, false));
    }
    if (page.widgets && page.widgets.length) {
      const widgetsToDraw = skipTimeWidgets
        ? page.widgets.filter((w) => w.type !== "clock" && w.type !== "timer" && w.type !== "stopwatch")
        : page.widgets;
      widgetsToDraw.forEach((widget) => {
        if (widget.type === "poll") {
          drawPollWidget(ctx, widget, zoom);
        } else {
          const text = getWidgetDisplayText(widget);
          const fs = Math.max(14, (widget.fontSize || 28) * zoom);
          ctx.save();
          ctx.font = `bold ${fs}px Arial`;
          ctx.fillStyle = widget.color || "#0f172a";
          ctx.textBaseline = "middle";
          ctx.fillText(text, widget.x, widget.y);
          ctx.restore();
        }
      });
    }

    // 3) Draw strokes (pen / highlighter) LAST so they always appear over images and shapes
    page.strokes.forEach((stroke) => {
      const points = stroke.points;
      if (!points || points.length < 2) return;
      ctx.save();
      ctx.globalAlpha = stroke.alpha ?? 1;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.strokeStyle = stroke.color;
      ctx.lineWidth = stroke.width ?? 3;
      ctx.beginPath();
      drawSmoothStrokePath(ctx, points);
      ctx.stroke();
      ctx.restore();
    });
  }

  function getTextFontString(item, fontSize) {
    const fs = fontSize ?? item.fontSize ?? 24;
    const style = item.italic ? "italic " : "";
    const weight = item.bold ? "bold " : "";
    const family = item.fontFamily ?? "Arial";
    return `${style}${weight}${fs}px ${family}`;
  }

  function getFormatAtChar(item, index) {
    const formats = item.inlineFormats;
    let subscript = false, superscript = false, strikethrough = false;
    let inAnyRange = false;
    if (formats && formats.length) {
      for (let i = 0; i < formats.length; i++) {
        const r = formats[i];
        if (index >= r.start && index < r.end) {
          inAnyRange = true;
          if (r.subscript) subscript = true;
          if (r.superscript) superscript = true;
          if (r.strikethrough) strikethrough = true;
        }
      }
    }
    if (!inAnyRange) {
      subscript = !!item.subscript;
      superscript = !!item.superscript;
      strikethrough = !!item.strikethrough;
    }
    return { subscript, superscript, strikethrough };
  }

  function getFormatRuns(text, item) {
    const len = (text || "").length;
    if (len === 0) return [{ start: 0, end: 0, subscript: false, superscript: false, strikethrough: false }];
    const runs = [];
    let i = 0;
    while (i < len) {
      const f = getFormatAtChar(item, i);
      let end = i + 1;
      while (end < len && getFormatAtChar(item, end).subscript === f.subscript &&
        getFormatAtChar(item, end).superscript === f.superscript &&
        getFormatAtChar(item, end).strikethrough === f.strikethrough) end++;
      runs.push({ start: i, end, subscript: f.subscript, superscript: f.superscript, strikethrough: f.strikethrough });
      i = end;
    }
    return runs;
  }

  function wrapStickyTextWithCtx(ctx, text, fontSize, maxWidth) {
    const fs = fontSize ?? 24;
    if (!text || !text.trim()) return { lines: [""], lineStarts: [0], width: 20, height: fs };
    function wrapParagraph(paragraph, startChar) {
      if (!paragraph.trim()) return { lines: [""], starts: [startChar] };
      const words = paragraph.split(/\s+/);
      const out = [];
      const starts = [];
      let current = [];
      let currentW = 0;
      let paraOffset = 0;
      for (let i = 0; i < words.length; i++) {
        const w = ctx.measureText(words[i]).width;
        if (current.length && currentW + (current.length > 1 ? ctx.measureText(" ").width : 0) + w > maxWidth) {
          const lineStr = current.join(" ");
          starts.push(startChar + paraOffset);
          out.push(lineStr);
          paraOffset += lineStr.length + 1;
          current = [words[i]];
          currentW = w;
        } else {
          if (current.length) currentW += ctx.measureText(" ").width;
          current.push(words[i]);
          currentW += w;
        }
      }
      if (current.length) {
        const lineStr = current.join(" ");
        starts.push(startChar + paraOffset);
        out.push(lineStr);
      }
      return { lines: out, starts };
    }
    const paragraphs = String(text).split("\n");
    const lines = [];
    const lineStarts = [];
    let charIdx = 0;
    for (let i = 0; i < paragraphs.length; i++) {
      const para = paragraphs[i];
      const res = wrapParagraph(para, charIdx);
      lines.push(...res.lines);
      lineStarts.push(...res.starts);
      charIdx += para.length + (i < paragraphs.length - 1 ? 1 : 0);
    }
    if (lines.length === 0) {
      lines.push("");
      lineStarts.push(0);
    }
    let width = 20;
    for (const line of lines) {
      const lw = ctx.measureText(line).width;
      if (lw > width) width = lw;
    }
    return { lines, lineStarts, width, height: lines.length * fs };
  }

  function wrapStickyText(item, maxWidth) {
    const text = item.text || "";
    const fs = item.fontSize ?? 24;
    if (!text.trim()) return { lines: [""], width: 20, height: fs };
    const approxCharWidth = fs * 0.55;
    function wrapParagraph(paragraph) {
      if (!paragraph.trim()) return [""];
      const words = paragraph.split(/\s+/);
      const out = [];
      let current = [];
      let currentW = 0;
      for (let i = 0; i < words.length; i++) {
        const word = words[i];
        const wordW = word.length * approxCharWidth;
        if (current.length && currentW + wordW > maxWidth) {
          out.push(current.join(" "));
          current = [word];
          currentW = wordW;
        } else {
          current.push(word);
          currentW += (current.length > 1 ? 1 : 0) * approxCharWidth + wordW;
        }
      }
      if (current.length) out.push(current.join(" "));
      return out;
    }
    const paragraphs = String(text).split("\n");
    const lines = [];
    for (let i = 0; i < paragraphs.length; i++) {
      lines.push(...wrapParagraph(paragraphs[i]));
    }
    if (lines.length === 0) lines.push("");
    const width = Math.max(20, ...lines.map((l) => l.length * approxCharWidth));
    const height = lines.length * fs;
    return { lines, width, height };
  }

  function drawOneLineWithRuns(ctx, item, lineText, lineStartChar, baseX, baseY, fs) {
    const runs = getFormatRuns(item.text || "", item);
    const lineEndChar = lineStartChar + lineText.length;
    let x = baseX;
    for (let r = 0; r < runs.length; r++) {
      const run = runs[r];
      if (run.start >= lineEndChar || run.end <= lineStartChar) continue;
      const segStart = Math.max(run.start, lineStartChar) - lineStartChar;
      const segEnd = Math.min(run.end, lineEndChar) - lineStartChar;
      const segText = lineText.slice(segStart, segEnd);
      if (!segText) continue;
      const runSubSup = !!(run.subscript || run.superscript);
      const drawFs = runSubSup ? fs * 0.65 : fs;
      const yOff = run.superscript ? -fs * 0.35 : run.subscript ? fs * 0.4 : 0;
      const ly = baseY + yOff;
      ctx.font = (item.italic ? "italic " : "") + (item.bold ? "bold " : "") + drawFs + "px " + (item.fontFamily ?? "Arial");
      ctx.fillText(segText, x, ly);
      if (run.strikethrough) {
        const m = ctx.measureText(segText);
        const midY = ly + drawFs / 2;
        ctx.strokeStyle = item.color ?? "#0f172a";
        ctx.lineWidth = Math.max(1, Math.round(drawFs / 16));
        ctx.beginPath();
        ctx.moveTo(x, midY);
        ctx.lineTo(x + m.width, midY);
        ctx.stroke();
      }
      x += ctx.measureText(segText).width;
    }
    return fs;
  }

  function drawTextItem(ctx, item, isSelected) {
    if (!item || item.text == null || item.text === "") return;
    ctx.save();
    const fs = item.fontSize ?? 24;
    const hasInlineFormats = item.inlineFormats && item.inlineFormats.length > 0;
    const subSup = !hasInlineFormats && !!(item.subscript || item.superscript);
    const drawFs = subSup ? fs * 0.65 : fs;
    const fontStr = getTextFontString(item, hasInlineFormats ? fs : (subSup ? drawFs : fs));
    ctx.font = fontStr;
    if (subSup) ctx.font = (item.italic ? "italic " : "") + (item.bold ? "bold " : "") + drawFs + "px " + (item.fontFamily ?? "Arial");
    const pad = 12;
    const defaultMaxW = stickyNotesSettings.maxWidth ?? 220;
    const b = getTextBounds(item);
    const rotDeg = !item.sticky && (item.rotation != null && item.rotation !== 0) ? Number(item.rotation) : 0;
    if (rotDeg) {
      const cx = b.x + b.w / 2;
      const cy = b.y + b.h / 2;
      ctx.translate(cx, cy);
      ctx.rotate((rotDeg * Math.PI) / 180);
      ctx.translate(-cx, -cy);
    }
    const hasExplicitSize = item.w != null && item.h != null && Number(item.w) > 0 && Number(item.h) > 0;
    const shouldWrap = item.sticky || hasExplicitSize;
    const wrapWidth = shouldWrap ? Math.max(20, Number(b.w) || Number(item.w) || defaultMaxW) : 0;
    let wrappedLines = null;
    if (shouldWrap && wrapWidth > 0 && item.text) {
      wrappedLines = wrapStickyTextWithCtx(ctx, String(item.text), fs, wrapWidth);
    }
    if (item.sticky) {
      const x1 = b.x - pad;
      const y1 = b.y - pad;
      const x2 = b.x + b.w + pad;
      const y2 = b.y + b.h + pad;
      const r = 6;
      const foldSize = 18;
      ctx.shadowColor = "rgba(0,0,0,0.2)";
      ctx.shadowBlur = 8;
      ctx.shadowOffsetX = 2;
      ctx.shadowOffsetY = 2;
      const stickyAlpha = item.stickyOpacity ?? stickyNotesSettings.fillOpacity ?? 1;
      ctx.save();
      ctx.globalAlpha = stickyAlpha;
      ctx.fillStyle = item.stickyColor || stickyNotesSettings.color || "#fef08a";
      ctx.beginPath();
      if (ctx.roundRect) {
        ctx.roundRect(x1, y1, x2 - x1, y2 - y1, r);
      } else {
        ctx.rect(x1, y1, x2 - x1, y2 - y1);
      }
      ctx.fill();
      ctx.restore();
      ctx.shadowColor = "transparent";
      ctx.shadowBlur = 0;
      ctx.shadowOffsetX = 0;
      ctx.shadowOffsetY = 0;
      ctx.fillStyle = "rgba(0,0,0,0.08)";
      ctx.beginPath();
      ctx.moveTo(x2 - foldSize, y1);
      ctx.lineTo(x2, y1);
      ctx.lineTo(x2, y1 + foldSize);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = "rgba(0,0,0,0.1)";
      ctx.lineWidth = 1;
      ctx.stroke();
    }
    ctx.fillStyle = item.color ?? "#0f172a";
    ctx.textBaseline = "top";
    const yOffset = item.superscript ? -fs * 0.35 : item.subscript ? fs * 0.4 : 0;
    const lineHeight = subSup ? drawFs : fs;
    if (hasInlineFormats) {
      const hasSupInFormats = item.inlineFormats.some((r) => r.superscript);
      const hasSubInFormats = item.inlineFormats.some((r) => r.subscript);
      const extraTop = hasSupInFormats ? fs * 0.45 : 0;
      const extraBottom = hasSubInFormats ? fs * 0.45 : 0;
      const contentTop = item.y + extraTop;
      if (hasExplicitSize && b.w > 0 && b.h > 0) {
        ctx.save();
        ctx.beginPath();
        ctx.rect(b.x, b.y - extraTop, b.w, b.h + extraTop + extraBottom);
        ctx.clip();
      }
      if (wrappedLines && wrappedLines.lines && wrappedLines.lines.length > 0) {
        const boxHeight = hasExplicitSize && item.h > 0 ? item.h : 1e9;
        const starts = wrappedLines.lineStarts || (() => { const s = []; let i = 0; for (let j = 0; j < wrappedLines.lines.length; j++) { s.push(i); i += wrappedLines.lines[j].length; } return s; })();
        for (let i = 0; i < wrappedLines.lines.length; i++) {
          if (contentTop + (i + 1) * fs > item.y + boxHeight) break;
          const line = wrappedLines.lines[i];
          drawOneLineWithRuns(ctx, item, line, starts[i] ?? 0, item.x, contentTop + i * fs, fs);
        }
      } else {
        const textStr = item.text || "";
        const lines = textStr.includes("\n") ? textStr.split("\n") : [textStr];
        let lineStartChar = 0;
        for (let i = 0; i < lines.length; i++) {
          drawOneLineWithRuns(ctx, item, lines[i], lineStartChar, item.x, contentTop + i * fs, fs);
          lineStartChar += lines[i].length + (i < lines.length - 1 && textStr.includes("\n") ? 1 : 0);
        }
      }
      if (hasExplicitSize && b.w > 0 && b.h > 0) ctx.restore();
    } else if (wrappedLines && wrappedLines.lines && wrappedLines.lines.length > 0) {
      const boxHeight = hasExplicitSize && item.h > 0 ? item.h : 1e9;
      if (hasExplicitSize && b.w > 0 && b.h > 0) {
        ctx.save();
        ctx.beginPath();
        ctx.rect(b.x, b.y, b.w, b.h);
        ctx.clip();
      }
      for (let i = 0; i < wrappedLines.lines.length; i++) {
        const ly = item.y + yOffset + i * lineHeight;
        if (ly + lineHeight > item.y + boxHeight) break;
        const line = wrappedLines.lines[i];
        ctx.fillText(line, item.x, ly);
        if (item.strikethrough) {
          const m = ctx.measureText(line);
          const midY = ly + lineHeight / 2;
          ctx.strokeStyle = item.color ?? "#0f172a";
          ctx.lineWidth = Math.max(1, Math.round(drawFs / 16));
          ctx.beginPath();
          ctx.moveTo(item.x, midY);
          ctx.lineTo(item.x + m.width, midY);
          ctx.stroke();
        }
      }
      if (hasExplicitSize && b.w > 0 && b.h > 0) ctx.restore();
    } else {
      const textStr = item.text || "";
      const drawY = item.y + yOffset;
      if (textStr.includes("\n")) {
        const lines = textStr.split("\n");
        for (let i = 0; i < lines.length; i++) {
          const ly = drawY + i * lineHeight;
          ctx.fillText(lines[i], item.x, ly);
          if (item.strikethrough) {
            const m = ctx.measureText(lines[i]);
            const midY = ly + lineHeight / 2;
            ctx.strokeStyle = item.color ?? "#0f172a";
            ctx.lineWidth = Math.max(1, Math.round(drawFs / 16));
            ctx.beginPath();
            ctx.moveTo(item.x, midY);
            ctx.lineTo(item.x + m.width, midY);
            ctx.stroke();
          }
        }
      } else {
        ctx.fillText(textStr, item.x, drawY);
        if (item.strikethrough) {
          const m = ctx.measureText(textStr);
          const midY = drawY + lineHeight / 2;
          ctx.strokeStyle = item.color ?? "#0f172a";
          ctx.lineWidth = Math.max(1, Math.round(drawFs / 16));
          ctx.beginPath();
          ctx.moveTo(item.x, midY);
          ctx.lineTo(item.x + m.width, midY);
          ctx.stroke();
        }
      }
    }
    if (item.underline && !item.sticky) {
      const m = ctx.measureText(item.text);
      const underY = item.y + fs + 2;
      ctx.strokeStyle = item.color ?? "#0f172a";
      ctx.lineWidth = Math.max(1, Math.round(fs / 16));
      ctx.beginPath();
      ctx.moveTo(item.x, underY);
      ctx.lineTo(item.x + m.width, underY);
      ctx.stroke();
    }
    if (isSelected) {
      const selPad = item.sticky ? 12 : 4;
      const boxX = b.x - selPad;
      const boxY = b.y - selPad;
      const boxW = b.w + selPad * 2;
      const boxH = b.h + selPad * 2;

      // selection rectangle
      ctx.strokeStyle = item.locked ? "#6b7280" : "#eab308";
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 3]);
      ctx.strokeRect(boxX, boxY, boxW, boxH);

      if (item.locked) {
        item._resizeHandles = undefined;
        item._duplicateHandle = undefined;
        item._deleteHandle = undefined;
        item._lockHandle = undefined;
        const btnH = 18;
        const plusPad = 4;
        const plusSize = 14;
        const plusX = boxX + boxW + plusPad;
        const btnX = plusX - 14 - 6 - 14 - 6 - 44;
        const btnY = boxY - btnH - 4;
        const btnW = 50;
        ctx.setLineDash([]);
        ctx.fillStyle = "#6b7280";
        ctx.strokeStyle = "#4b5563";
        ctx.lineWidth = 1;
        ctx.beginPath();
        if (ctx.roundRect) ctx.roundRect(btnX, btnY, btnW, btnH, 6);
        else ctx.rect(btnX, btnY, btnW, btnH);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = "#e5e7eb";
        ctx.font = "10px Arial";
        ctx.textBaseline = "middle";
        ctx.fillText("Unlock", btnX + 18, btnY + btnH / 2);
        ctx.strokeStyle = "#e5e7eb";
        ctx.lineWidth = 1.2;
        const cxLock = btnX + 10;
        const cyLock = btnY + btnH / 2;
        ctx.beginPath();
        ctx.arc(cxLock + 1.5, cyLock - 1.5, 2.5, Math.PI * 0.2, Math.PI * 1.2);
        ctx.stroke();
        ctx.beginPath();
        if (ctx.roundRect) ctx.roundRect(btnX + 2.5, cyLock + 0.5, 5, 3.5, 1);
        else ctx.rect(btnX + 2.5, cyLock + 0.5, 5, 3.5);
        ctx.stroke();
        item._unlockHandle = { x: btnX, y: btnY, w: btnW, h: btnH };
      } else {
        const handles = [
          { corner: "tl", x: boxX, y: boxY },
          { corner: "tr", x: boxX + boxW, y: boxY },
          { corner: "br", x: boxX + boxW, y: boxY + boxH },
          { corner: "bl", x: boxX, y: boxY + boxH },
        ];
        ctx.setLineDash([]);
        ctx.fillStyle = "#eab308";
        const s = 8;
        handles.forEach((h) => {
          ctx.fillRect(h.x - s / 2, h.y - s / 2, s, s);
        });
        item._resizeHandles = handles;

        const plusSize = 14;
        const plusPad = 4;
        const plusX = boxX + boxW + plusPad;
        const plusY = boxY - plusSize - plusPad;
        ctx.fillStyle = "#22c55e";
        ctx.strokeStyle = "#14532d";
        ctx.lineWidth = 1;
        ctx.setLineDash([]);
        ctx.beginPath();
        if (ctx.roundRect) ctx.roundRect(plusX, plusY, plusSize, plusSize, 4);
        else ctx.rect(plusX, plusY, plusSize, plusSize);
        ctx.fill();
        ctx.stroke();
        ctx.beginPath();
        ctx.strokeStyle = "#022c22";
        ctx.lineWidth = 2;
        const cxPlus = plusX + plusSize / 2;
        const cyPlus = plusY + plusSize / 2;
        const arm = plusSize * 0.3;
        ctx.moveTo(cxPlus - arm, cyPlus);
        ctx.lineTo(cxPlus + arm, cyPlus);
        ctx.moveTo(cxPlus, cyPlus - arm);
        ctx.lineTo(cxPlus, cyPlus + arm);
        ctx.stroke();
        item._duplicateHandle = { x: plusX, y: plusY, w: plusSize, h: plusSize };

        const delSize = 14;
        const delPad = 6;
        const delX = plusX - delSize - delPad;
        const delY = plusY;
        ctx.fillStyle = "#dc2626";
        ctx.strokeStyle = "#7f1d1d";
        ctx.lineWidth = 1;
        ctx.beginPath();
        if (ctx.roundRect) ctx.roundRect(delX, delY, delSize, delSize, 4);
        else ctx.rect(delX, delY, delSize, delSize);
        ctx.fill();
        ctx.stroke();
        ctx.beginPath();
        ctx.strokeStyle = "#fef2f2";
        ctx.lineWidth = 2;
        const cxDel = delX + delSize / 2;
        const cyDel = delY + delSize / 2;
        const armDel = delSize * 0.35;
        ctx.moveTo(cxDel - armDel, cyDel - armDel);
        ctx.lineTo(cxDel + armDel, cyDel + armDel);
        ctx.moveTo(cxDel - armDel, cyDel + armDel);
        ctx.lineTo(cxDel + armDel, cyDel - armDel);
        ctx.stroke();
        item._deleteHandle = { x: delX, y: delY, w: delSize, h: delSize };

        const lockSize = 14;
        const lockPad = 6;
        const lockX = delX - lockSize - lockPad;
        const lockY = delY;
        ctx.fillStyle = "#4b5563";
        ctx.strokeStyle = "#374151";
        ctx.lineWidth = 1;
        ctx.beginPath();
        if (ctx.roundRect) ctx.roundRect(lockX, lockY, lockSize, lockSize, 4);
        else ctx.rect(lockX, lockY, lockSize, lockSize);
        ctx.fill();
        ctx.stroke();
        ctx.strokeStyle = "#e5e7eb";
        ctx.lineWidth = 1.5;
        const cxLock = lockX + lockSize / 2;
        const cyLock = lockY + lockSize / 2;
        ctx.beginPath();
        ctx.arc(cxLock, cyLock - 1.5, 3, Math.PI * 0.5, Math.PI * 1.5);
        ctx.stroke();
        ctx.beginPath();
        if (ctx.roundRect) ctx.roundRect(lockX + 3.5, cyLock + 1, 7, 4.5, 1);
        else ctx.rect(lockX + 3.5, cyLock + 1, 7, 4.5);
        ctx.stroke();
        item._lockHandle = { x: lockX, y: lockY, w: lockSize, h: lockSize };
      }
    }
    ctx.restore();
  }

  function exportPageAsPNG() {
    const scale = window.devicePixelRatio || 1;
    const logicalW = boardCanvas ? boardCanvas.width / (scale * zoom) : 800;
    const logicalH = boardCanvas ? boardCanvas.height / (scale * zoom) : 600;
    const exportScale = 2;
    const canvas = document.createElement("canvas");
    canvas.width = logicalW * exportScale;
    canvas.height = logicalH * exportScale;
    const ctx = canvas.getContext("2d");
    if (!ctx) return;
    ctx.scale(exportScale, exportScale);
    drawPageContent(ctx, getBoardBackgroundColor(), { skipTimeWidgets: true });
    const dataUrl = canvas.toDataURL("image/png");
    const a = document.createElement("a");
    a.href = dataUrl;
    a.download = `Gauravs-Board-page-${currentPageIndex + 1}.png`;
    a.click();
  }

  /** Draw a specific page to ctx (for export). w,h in logical units. No connectors. */
  function drawPageContentForExport(ctx, pageIndex, w, h, backgroundColor) {
    const page = pages[pageIndex];
    ctx.fillStyle = backgroundColor;
    ctx.fillRect(0, 0, w, h);
    if (!page) return;
    if (page.background && page.background.dataUrl) {
      const img = getCachedImage(page.background.dataUrl);
      if (img && img.complete) {
        const iw = img.width;
        const ih = img.height;
        if (iw > 0 && ih > 0) {
          const scale = Math.min(w / iw, h / ih);
          const dw = iw * scale;
          const dh = ih * scale;
          const dx = (w - dw) / 2;
          const dy = (h - dh) / 2;
          ctx.drawImage(img, dx, dy, dw, dh);
        }
      }
    }
    if (page.shapes) {
      page.shapes.forEach((shape) => drawShape(ctx, shape, false));
    }
    if (page.texts) {
      page.texts.forEach((item) => drawTextItem(ctx, item, false));
    }
    if (page.widgets && page.widgets.length) {
      const widgetsToDraw = page.widgets.filter((w) => w.type !== "clock" && w.type !== "timer" && w.type !== "stopwatch");
      widgetsToDraw.forEach((widget) => {
        if (widget.type === "poll") {
          drawPollWidget(ctx, widget, 1);
        } else {
          const text = getWidgetDisplayText(widget);
          const fs = Math.max(14, widget.fontSize || 28);
          ctx.save();
          ctx.font = `bold ${fs}px Arial`;
          ctx.fillStyle = widget.color || "#0f172a";
          ctx.textBaseline = "middle";
          ctx.fillText(text, widget.x, widget.y);
          ctx.restore();
        }
      });
    }
    (page.strokes || []).forEach((stroke) => {
      const points = stroke.points;
      if (!points || points.length < 2) return;
      ctx.save();
      ctx.globalAlpha = stroke.alpha ?? 1;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.strokeStyle = stroke.color;
      ctx.lineWidth = stroke.width ?? 3;
      ctx.beginPath();
      drawSmoothStrokePath(ctx, points);
      ctx.stroke();
      ctx.restore();
    });
  }

  function getSelectionBounds() {
    let x1 = Infinity, y1 = Infinity, x2 = -Infinity, y2 = -Infinity;
    const page = pages[currentPageIndex];
    if (!page) return null;
    selectedShapes.forEach((shape) => {
      if (!shape.start || !shape.end) return;
      const sx1 = Math.min(shape.start.x, shape.end.x);
      const sy1 = Math.min(shape.start.y, shape.end.y);
      const sx2 = Math.max(shape.start.x, shape.end.x);
      const sy2 = Math.max(shape.start.y, shape.end.y);
      x1 = Math.min(x1, sx1);
      y1 = Math.min(y1, sy1);
      x2 = Math.max(x2, sx2);
      y2 = Math.max(y2, sy2);
    });
    selectedTexts.forEach((item) => {
      const b = getTextBounds(item);
      x1 = Math.min(x1, b.x);
      y1 = Math.min(y1, b.y);
      x2 = Math.max(x2, b.x + b.w);
      y2 = Math.max(y2, b.y + b.h);
    });
    if (x1 === Infinity || y1 === Infinity) return null;
    return { x: x1, y: y1, w: x2 - x1, h: y2 - y1 };
  }

  function exportCurrentViewAsPNG() {
    const container = boardCanvas.closest(".canvas-container");
    const scale = window.devicePixelRatio || 1;
    const logicalW = boardCanvas ? boardCanvas.width / (scale * zoom) : 800;
    const logicalH = boardCanvas ? boardCanvas.height / (scale * zoom) : 600;
    const scrollTop = container ? container.scrollTop : 0;
    const viewHeight = container ? container.clientHeight : 600;
    const viewWidth = container ? container.clientWidth : logicalW;
    const logicalViewY = scrollTop / zoom;
    const logicalViewH = viewHeight / zoom;
    const logicalViewW = Math.min(logicalW, viewWidth / zoom);
    const exportScale = 2;
    const fullCanvas = document.createElement("canvas");
    fullCanvas.width = logicalW * exportScale;
    fullCanvas.height = logicalH * exportScale;
    const fullCtx = fullCanvas.getContext("2d");
    if (!fullCtx) return;
    fullCtx.scale(exportScale, exportScale);
    drawPageContent(fullCtx, getBoardBackgroundColor(), { skipTimeWidgets: true });
    const outCanvas = document.createElement("canvas");
    outCanvas.width = logicalViewW * exportScale;
    outCanvas.height = logicalViewH * exportScale;
    const outCtx = outCanvas.getContext("2d");
    if (!outCtx) return;
    outCtx.drawImage(
      fullCanvas,
      0, logicalViewY * exportScale, logicalViewW * exportScale, logicalViewH * exportScale,
      0, 0, outCanvas.width, outCanvas.height
    );
    const dataUrl = outCanvas.toDataURL("image/png");
    const a = document.createElement("a");
    a.href = dataUrl;
    a.download = `Gauravs-Board-view-page-${currentPageIndex + 1}.png`;
    a.click();
  }

  function exportSelectionAsPNG() {
    const bounds = getSelectionBounds();
    if (!bounds || (selectedShapes.length === 0 && selectedTexts.length === 0)) {
      alert("Select one or more shapes or text items first.");
      return;
    }
    const pad = 16;
    const exportScale = 2;
    const w = (bounds.w + pad * 2) * exportScale;
    const h = (bounds.h + pad * 2) * exportScale;
    const canvas = document.createElement("canvas");
    canvas.width = w;
    canvas.height = h;
    const ctx = canvas.getContext("2d");
    if (!ctx) return;
    ctx.scale(exportScale, exportScale);
    ctx.translate(pad - bounds.x, pad - bounds.y);
    ctx.fillStyle = getBoardBackgroundColor();
    ctx.fillRect(bounds.x, bounds.y, bounds.w, bounds.h);
    selectedShapes.forEach((shape) => drawShape(ctx, shape, false));
    selectedTexts.forEach((item) => drawTextItem(ctx, item, false));
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    const dataUrl = canvas.toDataURL("image/png");
    const a = document.createElement("a");
    a.href = dataUrl;
    a.download = `Gauravs-Board-selection.png`;
    a.click();
  }

  function exportToPDF() {
    if (typeof jspdf !== "undefined" && jspdf.jsPDF) {
      doExportToPDF();
      return;
    }
    const script = document.createElement("script");
    script.src = "https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";
    script.onload = () => {
      doExportToPDF();
    };
    script.onerror = () => {
      alert("Could not load PDF library. Check your internet connection.");
    };
    document.head.appendChild(script);
  }

  function doExportToPDF() {
    const scale = window.devicePixelRatio || 1;
    const logicalW = boardCanvas ? boardCanvas.width / (scale * zoom) : 800;
    const logicalH = boardCanvas ? boardCanvas.height / (scale * zoom) : 600;
    const exportScale = 2;
    const orientation = logicalW > logicalH ? "landscape" : "portrait";
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({
      orientation,
      unit: "pt",
      format: "a4",
    });
    const pdfW = pdf.internal.pageSize.getWidth();
    const pdfH = pdf.internal.pageSize.getHeight();
    const scaleToFit = Math.min(pdfW / logicalW, pdfH / logicalH);
    const drawW = logicalW * scaleToFit;
    const drawH = logicalH * scaleToFit;
    const offsetX = (pdfW - drawW) / 2;
    const offsetY = (pdfH - drawH) / 2;
    const tempCanvas = document.createElement("canvas");
    tempCanvas.width = logicalW * exportScale;
    tempCanvas.height = logicalH * exportScale;
    const tempCtx = tempCanvas.getContext("2d");
    if (!tempCtx) return;
    for (let i = 0; i < pages.length; i++) {
      if (i > 0) pdf.addPage("a4", orientation);
      tempCtx.setTransform(1, 0, 0, 1, 0, 0);
      tempCtx.scale(exportScale, exportScale);
      const bg = getBoardBackgroundColor();
      drawPageContentForExport(tempCtx, i, logicalW, logicalH, bg);
      const imgData = tempCanvas.toDataURL("image/png");
      pdf.addImage(imgData, "PNG", offsetX, offsetY, drawW, drawH);
    }
    pdf.save("Gauravs-Board.pdf");
  }

  function drawAllStrokes(ctx) {
    const page = pages[currentPageIndex];
    if (!page) return;

    page.strokes.forEach((stroke) => {
      const points = stroke.points;
      if (!points || points.length < 2) return;

      ctx.save();
      ctx.globalAlpha = stroke.alpha ?? 1;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.strokeStyle = stroke.color;
      ctx.lineWidth = stroke.width ?? 3;

      ctx.beginPath();
      drawSmoothStrokePath(ctx, points);
      ctx.stroke();
      ctx.restore();
    });

    if (page.shapes && page.shapes.length) {
      page.shapes.forEach((shape) => {
        drawShape(ctx, shape, false);
      });
    }

    if (page.texts && page.texts.length) {
      page.texts.forEach((item) => {
        drawTextItem(ctx, item, selectedTexts.includes(item));
      });
    }

    if (page.widgets && page.widgets.length) {
      page.widgets.forEach((widget) => {
        if (widget.type === "poll") {
          drawPollWidget(ctx, widget, 1);
        } else {
          const text = getWidgetDisplayText(widget);
          const fs = Math.max(14, (widget.fontSize || 28));
          ctx.save();
          ctx.font = `bold ${fs}px Arial`;
          ctx.fillStyle = widget.color || "#0f172a";
          ctx.textBaseline = "middle";
          ctx.fillText(text, widget.x, widget.y);
          ctx.restore();
        }
      });
    }
    if (selectedWidgets && selectedWidgets.length) {
      const pad = 4;
      const lockSize = 14;
      const btnH = 18;
      selectedWidgets.forEach((widget) => {
        const b = getWidgetBounds(widget);
        const boxX = b.x - pad;
        const boxY = b.y - pad;
        const boxW = b.w + pad * 2;
        const boxH = b.h + pad * 2;
        ctx.save();
        ctx.setLineDash([4, 3]);
        ctx.strokeStyle = widget.locked ? "#6b7280" : "#eab308";
        ctx.lineWidth = 1;
        ctx.strokeRect(boxX, boxY, boxW, boxH);
        widget._resizeHandle = undefined;
        widget._lockHandle = undefined;
        widget._unlockHandle = undefined;
        if (widget.locked) {
          const btnY = boxY - btnH - 4;
          const btnW = 50;
          const btnX = boxX + boxW - btnW - 4;
          ctx.setLineDash([]);
          ctx.fillStyle = "#6b7280";
          ctx.strokeStyle = "#4b5563";
          ctx.lineWidth = 1;
          ctx.beginPath();
          if (ctx.roundRect) ctx.roundRect(btnX, btnY, btnW, btnH, 6);
          else ctx.rect(btnX, btnY, btnW, btnH);
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = "#e5e7eb";
          ctx.font = "10px Arial";
          ctx.textBaseline = "middle";
          ctx.fillText("Unlock", btnX + 18, btnY + btnH / 2);
          ctx.strokeStyle = "#e5e7eb";
          ctx.lineWidth = 1.2;
          const cxLock = btnX + 10;
          const cyLock = btnY + btnH / 2;
          ctx.beginPath();
          ctx.arc(cxLock + 1.5, cyLock - 1.5, 2.5, Math.PI * 0.2, Math.PI * 1.2);
          ctx.stroke();
          ctx.beginPath();
          if (ctx.roundRect) ctx.roundRect(btnX + 2.5, cyLock + 0.5, 5, 3.5, 1);
          else ctx.rect(btnX + 2.5, cyLock + 0.5, 5, 3.5);
          ctx.stroke();
          widget._unlockHandle = { x: btnX, y: btnY, w: btnW, h: btnH };
        } else {
          const handleSize = 8;
          const hx = b.x + b.w - handleSize;
          const hy = b.y + b.h - handleSize;
          ctx.setLineDash([]);
          ctx.fillStyle = "#eab308";
          ctx.fillRect(hx, hy, handleSize, handleSize);
          ctx.strokeStyle = "#0f172a";
          ctx.lineWidth = 1;
          ctx.strokeRect(hx, hy, handleSize, handleSize);
          widget._resizeHandle = { x: hx, y: hy, w: handleSize, h: handleSize };
          const lockX = boxX + boxW - lockSize - 4;
          const lockY = boxY - lockSize - 4;
          ctx.fillStyle = "#4b5563";
          ctx.strokeStyle = "#374151";
          ctx.beginPath();
          if (ctx.roundRect) ctx.roundRect(lockX, lockY, lockSize, lockSize, 4);
          else ctx.rect(lockX, lockY, lockSize, lockSize);
          ctx.fill();
          ctx.stroke();
          ctx.strokeStyle = "#e5e7eb";
          ctx.lineWidth = 1.5;
          const cxLock = lockX + lockSize / 2;
          const cyLock = lockY + lockSize / 2;
          ctx.beginPath();
          ctx.arc(cxLock, cyLock - 1.5, 3, Math.PI * 0.5, Math.PI * 1.5);
          ctx.stroke();
          ctx.beginPath();
          if (ctx.roundRect) ctx.roundRect(lockX + 3.5, cyLock + 1, 7, 4.5, 1);
          else ctx.rect(lockX + 3.5, cyLock + 1, 7, 4.5);
          ctx.stroke();
          widget._lockHandle = { x: lockX, y: lockY, w: lockSize, h: lockSize };
        }
        ctx.restore();
      });
    }

    if (activeShape) {
      drawShape(ctx, activeShape, true);
    }

    if (activeSelectionBox) {
      const { start, end } = activeSelectionBox;
      const x = Math.min(start.x, end.x);
      const y = Math.min(start.y, end.y);
      const w = Math.abs(end.x - start.x);
      const h = Math.abs(end.y - start.y);
      ctx.save();
      ctx.setLineDash([6, 4]);
      ctx.strokeStyle = "#38bdf8";
      ctx.lineWidth = 2;
      ctx.strokeRect(x, y, w, h);
      ctx.restore();
    }
  }

  function drawShape(ctx, shape, isPreview) {
    const { start, end } = shape;
    if (!start || !end) return;

    const type = shape.type;
    if (type === "group") {
      if (shape.children) {
        (shape.children.shapes || []).forEach((s) => drawShape(ctx, s, false));
        (shape.children.texts || []).forEach((t) => drawTextItem(ctx, t, false));
      }
      return;
    }

    ctx.save();
    if (isPreview) {
      ctx.setLineDash([6, 4]);
    }
    ctx.globalAlpha = 1;
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ctx.strokeStyle = shape.color;
    ctx.lineWidth = shape.width ?? 2;
    ctx.fillStyle = shape.fillMode === "solid" ? shape.color : "transparent";
    const fillOpacity = shape.fillOpacity ?? 1;
    ctx.beginPath();

    const x1 = Math.min(start.x, end.x);
    const y1 = Math.min(start.y, end.y);
    const x2 = Math.max(start.x, end.x);
    const y2 = Math.max(start.y, end.y);
    const cx = (x1 + x2) / 2;
    const cy = (y1 + y2) / 2;
    const w = x2 - x1 || 1;
    const h = y2 - y1 || 1;
    const r = Math.min(w, h) / 2;

    if (type === "line" || type === "ray" || type === "arrow") {
      const dx = end.x - start.x;
      const dy = end.y - start.y;
      const len = Math.sqrt(dx * dx + dy * dy) || 1;
      const ux = dx / len;
      const uy = dy / len;
      const headLength = 10 + (shape.width ?? 2) * 1.5;

      ctx.moveTo(start.x, start.y);
      ctx.lineTo(end.x, end.y);
      ctx.stroke();

      if (type === "ray" || type === "arrow") {
        const hxEnd = end.x - ux * headLength;
        const hyEnd = end.y - uy * headLength;
        ctx.beginPath();
        ctx.moveTo(end.x, end.y);
        ctx.lineTo(hxEnd - uy * (headLength / 2), hyEnd + ux * (headLength / 2));
        ctx.moveTo(end.x, end.y);
        ctx.lineTo(hxEnd + uy * (headLength / 2), hyEnd - ux * (headLength / 2));
        ctx.stroke();
      }
      if (type === "arrow") {
        const hxStart = start.x + ux * headLength;
        const hyStart = start.y + uy * headLength;
        ctx.beginPath();
        ctx.moveTo(start.x, start.y);
        ctx.lineTo(hxStart - uy * (headLength / 2), hyStart + ux * (headLength / 2));
        ctx.moveTo(start.x, start.y);
        ctx.lineTo(hxStart + uy * (headLength / 2), hyStart - ux * (headLength / 2));
        ctx.stroke();
      }
      const dotRadius = Math.max(2, (shape.width ?? 2) * 1.2);
      ctx.fillStyle = shape.color;
      ctx.beginPath();
      ctx.arc(start.x, start.y, dotRadius, 0, Math.PI * 2);
      ctx.fill();
      if (type === "line" || type === "arrow") {
        ctx.beginPath();
        ctx.arc(end.x, end.y, dotRadius, 0, Math.PI * 2);
        ctx.fill();
      }
    } else if (type === "rectangle") {
      ctx.rect(x1, y1, w, h);
      if (shape.fillMode === "solid") { ctx.save(); ctx.globalAlpha = fillOpacity; ctx.fill(); ctx.restore(); }
      ctx.stroke();
    } else if (type === "circle") {
      const dx = end.x - start.x;
      const dy = end.y - start.y;
      const rad = Math.sqrt(dx * dx + dy * dy);
      ctx.arc(start.x, start.y, rad, 0, Math.PI * 2);
      if (shape.fillMode === "solid") { ctx.save(); ctx.globalAlpha = fillOpacity; ctx.fill(); ctx.restore(); }
      ctx.stroke();
    } else if (type === "triangle") {
      const midX = (x1 + x2) / 2;
      ctx.moveTo(midX, y1);
      ctx.lineTo(x1, y2);
      ctx.lineTo(x2, y2);
      ctx.closePath();
      if (shape.fillMode === "solid") { ctx.save(); ctx.globalAlpha = fillOpacity; ctx.fill(); ctx.restore(); }
      ctx.stroke();
    } else if (type === "rhombus" || type === "diamond") {
      ctx.moveTo(cx, y1);
      ctx.lineTo(x2, cy);
      ctx.lineTo(cx, y2);
      ctx.lineTo(x1, cy);
      ctx.closePath();
      if (shape.fillMode === "solid") { ctx.save(); ctx.globalAlpha = fillOpacity; ctx.fill(); ctx.restore(); }
      ctx.stroke();
    } else if (type === "parallelogram") {
      const skew = w * 0.25;
      ctx.moveTo(x1 + skew, y1);
      ctx.lineTo(x2 + skew, y1);
      ctx.lineTo(x2 - skew, y2);
      ctx.lineTo(x1 - skew, y2);
      ctx.closePath();
      if (shape.fillMode === "solid") { ctx.save(); ctx.globalAlpha = fillOpacity; ctx.fill(); ctx.restore(); }
      ctx.stroke();
    } else if (type === "trapezium") {
      const topInset = w * 0.2;
      const topLeft = x1 + topInset;
      const topRight = x2 - topInset;
      ctx.moveTo(topLeft, y1);
      ctx.lineTo(topRight, y1);
      ctx.lineTo(x2, y2);
      ctx.lineTo(x1, y2);
      ctx.closePath();
      if (shape.fillMode === "solid") { ctx.save(); ctx.globalAlpha = fillOpacity; ctx.fill(); ctx.restore(); }
      ctx.stroke();
    } else if (type === "pentagon") {
      for (let k = 0; k < 5; k++) {
        const angle = -Math.PI / 2 + (2 * Math.PI * k) / 5;
        const px = cx + r * Math.cos(angle);
        const py = cy + r * Math.sin(angle);
        if (k === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath();
      if (shape.fillMode === "solid") { ctx.save(); ctx.globalAlpha = fillOpacity; ctx.fill(); ctx.restore(); }
      ctx.stroke();
    } else if (type === "hexagon") {
      for (let k = 0; k < 6; k++) {
        const angle = (Math.PI / 2) - (2 * Math.PI * k) / 6;
        const px = cx + r * Math.cos(angle);
        const py = cy + r * Math.sin(angle);
        if (k === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath();
      if (shape.fillMode === "solid") { ctx.save(); ctx.globalAlpha = fillOpacity; ctx.fill(); ctx.restore(); }
      ctx.stroke();
    } else if (type === "star") {
      const innerR = r * 0.4;
      for (let k = 0; k < 10; k++) {
        const angle = -Math.PI / 2 + (Math.PI * k) / 5;
        const rad = k % 2 === 0 ? r : innerR;
        const px = cx + rad * Math.cos(angle);
        const py = cy + rad * Math.sin(angle);
        if (k === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath();
      if (shape.fillMode === "solid") { ctx.save(); ctx.globalAlpha = fillOpacity; ctx.fill(); ctx.restore(); }
      ctx.stroke();
    } else if (type === "cube" || type === "cuboid") {
      const depth = Math.min(w, h) * 0.35;
      const dx = depth;
      const dy = -depth * 0.6;

      // fill front face
      if (shape.fillMode === "solid") {
        ctx.save();
        ctx.globalAlpha = fillOpacity;
        ctx.beginPath();
        ctx.rect(x1, y1, w, h);
        ctx.fill();
        ctx.restore();
      }

      // outline front face
      ctx.beginPath();
      ctx.rect(x1, y1, w, h);
      ctx.stroke();

      // back face
      ctx.beginPath();
      ctx.moveTo(x1 + dx, y1 + dy);
      ctx.lineTo(x2 + dx, y1 + dy);
      ctx.lineTo(x2 + dx, y2 + dy);
      ctx.lineTo(x1 + dx, y2 + dy);
      ctx.closePath();
      ctx.stroke();

      // connectors
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x1 + dx, y1 + dy);
      ctx.moveTo(x2, y1);
      ctx.lineTo(x2 + dx, y1 + dy);
      ctx.moveTo(x2, y2);
      ctx.lineTo(x2 + dx, y2 + dy);
      ctx.moveTo(x1, y2);
      ctx.lineTo(x1 + dx, y2 + dy);
      ctx.stroke();
    } else if (type === "cylinder") {
      const rx = w / 2;
      const ry = Math.max(4, h * 0.15);
      const topY = y1 + ry;
      const bottomY = y2 - ry;
      ctx.save();
      // body fill
      if (shape.fillMode === "solid") {
        ctx.globalAlpha = fillOpacity;
        ctx.beginPath();
        ctx.rect(x1, topY, w, bottomY - topY);
        ctx.fill();
      }
      // top ellipse (full)
      ctx.beginPath();
      ctx.ellipse(cx, topY, rx, ry, 0, 0, Math.PI * 2);
      ctx.stroke();
      // sides
      ctx.beginPath();
      ctx.moveTo(x1, topY);
      ctx.lineTo(x1, bottomY);
      ctx.moveTo(x2, topY);
      ctx.lineTo(x2, bottomY);
      ctx.stroke();
      // bottom ellipse: full visible circle for clearer 3D look
      ctx.setLineDash([]);
      ctx.beginPath();
      ctx.ellipse(cx, bottomY, rx, ry, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    } else if (type === "cone") {
      const rx = w / 2;
      const ry = Math.max(4, w * 0.25);
      const baseY = y2;
      // fill body using triangle (apex to base)
      if (shape.fillMode === "solid") {
        ctx.save();
        ctx.globalAlpha = fillOpacity;
        ctx.beginPath();
        ctx.moveTo(cx, y1);
        ctx.lineTo(x1, baseY);
        ctx.lineTo(x2, baseY);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }
      // outline only the two slant edges (no straight bottom line)
      ctx.beginPath();
      ctx.moveTo(cx, y1);
      ctx.lineTo(x1, baseY);
      ctx.moveTo(cx, y1);
      ctx.lineTo(x2, baseY);
      ctx.stroke();
      // base ellipse centred on base line
      ctx.setLineDash([]);
      ctx.beginPath();
      ctx.ellipse(cx, baseY, rx, ry, 0, 0, Math.PI * 2);
      ctx.stroke();
    } else if (type === "sphere") {
      const rad = Math.min(w, h) / 2;
      ctx.beginPath();
      ctx.arc(cx, cy, rad, 0, Math.PI * 2);
      if (shape.fillMode === "solid") { ctx.save(); ctx.globalAlpha = fillOpacity; ctx.fill(); ctx.restore(); }
      ctx.stroke();
      ctx.beginPath();
      ctx.ellipse(cx, cy, rad, rad * 0.45, 0, 0, Math.PI * 2);
      ctx.stroke();
    } else if (type === "pie3d") {
      const rad = Math.min(w, h) / 2;
      const sliceAngle = Math.PI * 0.6; // 108Â°
      const startAngle = -Math.PI / 2;
      const endAngle = startAngle + sliceAngle;
      // outer circle
      ctx.beginPath();
      ctx.arc(cx, cy, rad, 0, Math.PI * 2);
      ctx.stroke();
      // slice
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, rad, startAngle, endAngle);
      ctx.closePath();
      if (shape.fillMode === "solid") { ctx.save(); ctx.globalAlpha = fillOpacity; ctx.fill(); ctx.restore(); }
      ctx.stroke();
    } else if (type === "barChart") {
      const data = shape.data || [40, 65, 50, 80, 55];
      const padL = 40;
      const padR = 20;
      const padT = 25;
      const padB = 35;
      const chartW = w - padL - padR;
      const chartH = h - padT - padB;
      if (chartW <= 0 || chartH <= 0) { ctx.restore(); return; }
      const maxVal = Math.max(...data, 1);
      const n = data.length;
      const barW = Math.max(8, (chartW / n) * 0.6);
      const gap = (chartW - n * barW) / (n + 1);
      ctx.save();
      ctx.strokeStyle = shape.color || "#374151";
      ctx.fillStyle = shape.color || "#374151";
      ctx.lineWidth = 1;
      ctx.strokeRect(x1 + padL, y1 + padT, chartW, chartH);
      const barColors = ["#2563eb", "#16a34a", "#eab308", "#ea580c", "#7c3aed"];
      for (let i = 0; i < n; i++) {
        const barH = (data[i] / maxVal) * chartH;
        const bx = x1 + padL + gap + i * (barW + gap);
        const by = y1 + padT + chartH - barH;
        ctx.fillStyle = barColors[i % barColors.length];
        ctx.fillRect(bx, by, barW, barH);
        ctx.strokeStyle = "#1e293b";
        ctx.strokeRect(bx, by, barW, barH);
      }
      ctx.restore();
    } else if (type === "pieChart") {
      const data = shape.data || [30, 25, 20, 15, 10];
      const total = data.reduce((s, v) => s + v, 0) || 1;
      const rad = Math.min(w, h) / 2 - 10;
      if (rad <= 0) { ctx.restore(); return; }
      const sliceColors = ["#2563eb", "#16a34a", "#eab308", "#ea580c", "#7c3aed"];
      let startA = -Math.PI / 2;
      ctx.save();
      for (let i = 0; i < data.length; i++) {
        const sweep = (data[i] / total) * Math.PI * 2;
        const endA = startA + sweep;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, rad, startA, endA);
        ctx.closePath();
        ctx.fillStyle = sliceColors[i % sliceColors.length];
        ctx.fill();
        ctx.strokeStyle = "#1e293b";
        ctx.lineWidth = 1;
        ctx.stroke();
        startA = endA;
      }
      ctx.restore();
    } else if (type === "horizontalBarChart") {
      const data = shape.data || [40, 65, 50, 80, 55];
      const padL = 25;
      const padR = 20;
      const padT = 25;
      const padB = 40;
      const chartW = w - padL - padR;
      const chartH = h - padT - padB;
      if (chartW <= 0 || chartH <= 0) { ctx.restore(); return; }
      const maxVal = Math.max(...data, 1);
      const n = data.length;
      const barH = Math.max(6, (chartH / n) * 0.6);
      const gap = (chartH - n * barH) / (n + 1);
      ctx.save();
      ctx.strokeStyle = shape.color || "#374151";
      ctx.strokeRect(x1 + padL, y1 + padT, chartW, chartH);
      const barColors = ["#2563eb", "#16a34a", "#eab308", "#ea580c", "#7c3aed"];
      for (let i = 0; i < n; i++) {
        const barW = (data[i] / maxVal) * chartW;
        const bx = x1 + padL;
        const by = y1 + padT + gap + i * (barH + gap);
        ctx.fillStyle = barColors[i % barColors.length];
        ctx.fillRect(bx, by, barW, barH);
        ctx.strokeStyle = "#1e293b";
        ctx.strokeRect(bx, by, barW, barH);
      }
      ctx.restore();
    } else if (type === "pictograph") {
      const data = shape.data || [3, 5, 2, 4, 3];
      const padL = 30;
      const padR = 20;
      const padT = 20;
      const padB = 25;
      const chartW = w - padL - padR;
      const chartH = h - padT - padB;
      if (chartW <= 0 || chartH <= 0) { ctx.restore(); return; }
      const n = data.length;
      const rowH = chartH / n;
      const maxCount = Math.max(...data, 1);
      const symbolColors = ["#2563eb", "#16a34a", "#eab308", "#ea580c", "#7c3aed"];
      const symbolShape = shape.symbolShape || "circle";
      ctx.save();
      ctx.strokeStyle = shape.color || "#374151";
      ctx.strokeRect(x1 + padL, y1 + padT, chartW, chartH);
      for (let i = 0; i < n; i++) {
        const count = data[i];
        const cellW = (chartW - 8) / Math.max(maxCount, count);
        const symSize = Math.min(cellW * 0.75, rowH * 0.5, 28);
        const sy = y1 + padT + (i + 0.5) * rowH;
        ctx.fillStyle = symbolColors[i % symbolColors.length];
        for (let j = 0; j < count; j++) {
          const sx = x1 + padL + 4 + j * cellW + (cellW - symSize) / 2;
          const cx = sx + symSize / 2;
          const r = symSize / 2;
          ctx.beginPath();
          if (symbolShape === "circle") {
            ctx.arc(cx, sy, r, 0, Math.PI * 2);
          } else if (symbolShape === "square") {
            ctx.rect(cx - r, sy - r, symSize, symSize);
          } else if (symbolShape === "triangle") {
            const h = r * Math.sqrt(3);
            ctx.moveTo(cx, sy - r);
            ctx.lineTo(cx - r, sy + h * 0.5);
            ctx.lineTo(cx + r, sy + h * 0.5);
            ctx.closePath();
          } else if (symbolShape === "star") {
            const spikes = 5;
            const outer = r;
            const inner = r * 0.4;
            for (let k = 0; k < spikes * 2; k++) {
              const rad = k % 2 === 0 ? outer : inner;
              const angle = -Math.PI / 2 + (Math.PI * k) / spikes;
              const px = cx + rad * Math.cos(angle);
              const py = sy + rad * Math.sin(angle);
              if (k === 0) ctx.moveTo(px, py);
              else ctx.lineTo(px, py);
            }
            ctx.closePath();
          } else if (symbolShape === "diamond") {
            ctx.moveTo(cx, sy - r);
            ctx.lineTo(cx + r, sy);
            ctx.lineTo(cx, sy + r);
            ctx.lineTo(cx - r, sy);
            ctx.closePath();
          } else {
            ctx.arc(cx, sy, r, 0, Math.PI * 2);
          }
          ctx.fill();
          ctx.strokeStyle = "#1e293b";
          ctx.lineWidth = 0.8;
          ctx.stroke();
        }
      }
      ctx.restore();
    } else if (type === "image" && shape.dataUrl) {
      const img = getCachedImage(shape.dataUrl);
      if (img && img.complete) {
        ctx.save();
        const iw = img.width;
        const ih = img.height;
        if (iw > 0 && ih > 0) {
          ctx.drawImage(img, x1, y1, w, h);
        }
        ctx.restore();
      }
    }

    if (!isPreview && selectedShapes && selectedShapes.includes(shape)) {
      const pad = 4;
      const boxX = Math.min(start.x, end.x) - pad;
      const boxY = Math.min(start.y, end.y) - pad;
      const boxW = Math.abs(end.x - start.x) + pad * 2;
      const boxH = Math.abs(end.y - start.y) + pad * 2;

      ctx.setLineDash([4, 3]);
      ctx.strokeStyle = shape.locked ? "#6b7280" : "#eab308";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.rect(boxX, boxY, boxW, boxH);
      ctx.stroke();

      if (shape.locked || shape.type === "group") {
        shape._resizeHandles = undefined;
        shape._duplicateHandle = undefined;
        shape._deleteHandle = undefined;
        shape._lockHandle = undefined;
        if (shape.type === "group") {
          const btnH = 18;
          const plusPad = 4;
          const plusSize = 14;
          const boxX = Math.min(start.x, end.x) - pad;
          const boxY = Math.min(start.y, end.y) - pad;
          const boxW = Math.abs(end.x - start.x) + pad * 2;
          const plusX = boxX + boxW + plusPad;
          const btnY = boxY - btnH - 4;
          const delSize = 14;
          const delPad = 6;
          const delX = plusX - delSize - delPad;
          const delY = btnY;
          const lockSize = 14;
          const lockPad = 6;
          const lockX = delX - lockSize - lockPad;
          const lockY = delY;
          ctx.setLineDash([]);
          ctx.fillStyle = "#22c55e";
          ctx.strokeStyle = "#14532d";
          ctx.lineWidth = 1;
          ctx.beginPath();
          if (ctx.roundRect) ctx.roundRect(plusX, btnY, plusSize, plusSize, 4);
          else ctx.rect(plusX, btnY, plusSize, plusSize);
          ctx.fill();
          ctx.stroke();
          ctx.beginPath();
          ctx.strokeStyle = "#022c22";
          ctx.lineWidth = 2;
          const cxPlus = plusX + plusSize / 2;
          const cyPlus = btnY + plusSize / 2;
          const arm = plusSize * 0.3;
          ctx.moveTo(cxPlus - arm, cyPlus);
          ctx.lineTo(cxPlus + arm, cyPlus);
          ctx.moveTo(cxPlus, cyPlus - arm);
          ctx.lineTo(cxPlus, cyPlus + arm);
          ctx.stroke();
          shape._duplicateHandle = { x: plusX, y: btnY, w: plusSize, h: plusSize };
          ctx.fillStyle = "#dc2626";
          ctx.strokeStyle = "#7f1d1d";
          ctx.beginPath();
          if (ctx.roundRect) ctx.roundRect(delX, delY, delSize, delSize, 4);
          else ctx.rect(delX, delY, delSize, delSize);
          ctx.fill();
          ctx.stroke();
          ctx.beginPath();
          ctx.strokeStyle = "#fef2f2";
          ctx.lineWidth = 2;
          const cxDel = delX + delSize / 2;
          const cyDel = delY + delSize / 2;
          const armDel = delSize * 0.35;
          ctx.moveTo(cxDel - armDel, cyDel - armDel);
          ctx.lineTo(cxDel + armDel, cyDel + armDel);
          ctx.moveTo(cxDel - armDel, cyDel + armDel);
          ctx.lineTo(cxDel + armDel, cyDel - armDel);
          ctx.stroke();
          shape._deleteHandle = { x: delX, y: delY, w: delSize, h: delSize };
          ctx.fillStyle = "#4b5563";
          ctx.strokeStyle = "#374151";
          ctx.beginPath();
          if (ctx.roundRect) ctx.roundRect(lockX, lockY, lockSize, lockSize, 4);
          else ctx.rect(lockX, lockY, lockSize, lockSize);
          ctx.fill();
          ctx.stroke();
          ctx.strokeStyle = "#e5e7eb";
          ctx.lineWidth = 1.5;
          const cxLock = lockX + lockSize / 2;
          const cyLock = lockY + lockSize / 2;
          ctx.beginPath();
          ctx.arc(cxLock, cyLock - 1.5, 3, Math.PI * 0.5, Math.PI * 1.5);
          ctx.stroke();
          ctx.beginPath();
          if (ctx.roundRect) ctx.roundRect(lockX + 3.5, cyLock + 1, 7, 4.5, 1);
          else ctx.rect(lockX + 3.5, cyLock + 1, 7, 4.5);
          ctx.stroke();
          shape._lockHandle = { x: lockX, y: lockY, w: lockSize, h: lockSize };
        } else {
        const btnH = 18;
        const plusPad = 4;
        const plusSize = 14;
        const plusX = boxX + boxW + plusPad;
        const btnX = plusX - 14 - 6 - 14 - 6 - 44;
        const btnY = boxY - btnH - 4;
        const btnW = 50;
        ctx.setLineDash([]);
        ctx.fillStyle = "#6b7280";
        ctx.strokeStyle = "#4b5563";
        ctx.lineWidth = 1;
        ctx.beginPath();
        if (ctx.roundRect) ctx.roundRect(btnX, btnY, btnW, btnH, 6);
        else ctx.rect(btnX, btnY, btnW, btnH);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = "#e5e7eb";
        ctx.font = "10px Arial";
        ctx.textBaseline = "middle";
        ctx.fillText("Unlock", btnX + 18, btnY + btnH / 2);
        ctx.strokeStyle = "#e5e7eb";
        ctx.lineWidth = 1.2;
        const cxLock = btnX + 10;
        const cyLock = btnY + btnH / 2;
        ctx.beginPath();
        ctx.arc(cxLock + 1.5, cyLock - 1.5, 2.5, Math.PI * 0.2, Math.PI * 1.2);
        ctx.stroke();
        ctx.beginPath();
        if (ctx.roundRect) ctx.roundRect(btnX + 2.5, cyLock + 0.5, 5, 3.5, 1);
        else ctx.rect(btnX + 2.5, cyLock + 0.5, 5, 3.5);
        ctx.stroke();
        shape._unlockHandle = { x: btnX, y: btnY, w: btnW, h: btnH };
        }
      } else {
        const handles = [
          { corner: "tl", x: boxX, y: boxY },
          { corner: "tr", x: boxX + boxW, y: boxY },
          { corner: "br", x: boxX + boxW, y: boxY + boxH },
          { corner: "bl", x: boxX, y: boxY + boxH },
        ];
        ctx.setLineDash([]);
        ctx.fillStyle = "#eab308";
        const s = 8;
        handles.forEach((h) => {
          ctx.fillRect(h.x - s / 2, h.y - s / 2, s, s);
        });
        shape._resizeHandles = handles;

        const plusSize = 14;
        const plusPad = 4;
        const plusX = boxX + boxW + plusPad;
        const plusY = boxY - plusSize - plusPad;
        ctx.fillStyle = "#22c55e";
        ctx.strokeStyle = "#14532d";
        ctx.lineWidth = 1;
        ctx.beginPath();
        if (ctx.roundRect) ctx.roundRect(plusX, plusY, plusSize, plusSize, 4);
        else ctx.rect(plusX, plusY, plusSize, plusSize);
        ctx.fill();
        ctx.stroke();
        ctx.beginPath();
        ctx.strokeStyle = "#022c22";
        ctx.lineWidth = 2;
        const cxPlus = plusX + plusSize / 2;
        const cyPlus = plusY + plusSize / 2;
        const arm = plusSize * 0.3;
        ctx.moveTo(cxPlus - arm, cyPlus);
        ctx.lineTo(cxPlus + arm, cyPlus);
        ctx.moveTo(cxPlus, cyPlus - arm);
        ctx.lineTo(cxPlus, cyPlus + arm);
        ctx.stroke();
        shape._duplicateHandle = { x: plusX, y: plusY, w: plusSize, h: plusSize };

        const delSize = 14;
        const delPad = 6;
        const delX = plusX - delSize - delPad;
        const delY = plusY;
        ctx.fillStyle = "#dc2626";
        ctx.strokeStyle = "#7f1d1d";
        ctx.lineWidth = 1;
        ctx.beginPath();
        if (ctx.roundRect) ctx.roundRect(delX, delY, delSize, delSize, 4);
        else ctx.rect(delX, delY, delSize, delSize);
        ctx.fill();
        ctx.stroke();
        ctx.beginPath();
        ctx.strokeStyle = "#fef2f2";
        ctx.lineWidth = 2;
        const cxDel = delX + delSize / 2;
        const cyDel = delY + delSize / 2;
        const armDel = delSize * 0.35;
        ctx.moveTo(cxDel - armDel, cyDel - armDel);
        ctx.lineTo(cxDel + armDel, cyDel + armDel);
        ctx.moveTo(cxDel - armDel, cyDel + armDel);
        ctx.lineTo(cxDel + armDel, cyDel - armDel);
        ctx.stroke();
        shape._deleteHandle = { x: delX, y: delY, w: delSize, h: delSize };

        const lockSize = 14;
        const lockPad = 6;
        const lockX = delX - lockSize - lockPad;
        const lockY = delY;
        ctx.fillStyle = "#4b5563";
        ctx.strokeStyle = "#374151";
        ctx.lineWidth = 1;
        ctx.beginPath();
        if (ctx.roundRect) ctx.roundRect(lockX, lockY, lockSize, lockSize, 4);
        else ctx.rect(lockX, lockY, lockSize, lockSize);
        ctx.fill();
        ctx.stroke();
        ctx.strokeStyle = "#e5e7eb";
        ctx.lineWidth = 1.5;
        const cxLock = lockX + lockSize / 2;
        const cyLock = lockY + lockSize / 2;
        ctx.beginPath();
        ctx.arc(cxLock, cyLock - 1.5, 3, Math.PI * 0.5, Math.PI * 1.5);
        ctx.stroke();
        ctx.beginPath();
        if (ctx.roundRect) ctx.roundRect(lockX + 3.5, cyLock + 1, 7, 4.5, 1);
        else ctx.rect(lockX + 3.5, cyLock + 1, 7, 4.5);
        ctx.stroke();
        shape._lockHandle = { x: lockX, y: lockY, w: lockSize, h: lockSize };
      }
    }

    ctx.restore();
  }

  function updateBoardInfoLabel() {
    if (!boardInfoLabel) return;
    const typeLabel =
      currentBoardType === "white"
        ? "Whiteboard"
        : currentBoardType === "black"
        ? "Blackboard"
        : "Green board";
    boardInfoLabel.textContent = `${typeLabel} - Page ${
      currentPageIndex + 1
    }`;
  }

  function updateZoomLabel() {
    if (!zoomLabel) return;
    zoomLabel.textContent = `${Math.round(zoom * 100)}%`;
  }

  function setBoardType(type) {
    currentBoardType = type;
    Array.from(
      boardTypeToggle.querySelectorAll(".board-type-button")
    ).forEach((btn) => {
      const isActive = btn.getAttribute("data-board") === type;
      btn.classList.toggle("board-type-button--active", isActive);
    });
    // Adjust default drawing colors based on board background
    if (type === "black" || type === "green") {
      penSettings.color = "#ffffff";
      textSettings.color = "#ffffff";
      shapeSettings.color = "#ffffff";
    } else {
      penSettings.color = "#0f172a";
      textSettings.color = "#0f172a";
      shapeSettings.color = "#0f172a";
    }
    updateBoardAppearance();
    updateBoardInfoLabel();
  }

  function setZoom(newZoom) {
    zoom = Math.min(2, Math.max(0.5, newZoom));
    updateZoomLabel();
    updateBoardAppearance();
  }

  function updateLayoutForPanels() {
    if (!mainLayout) return;
    const leftHidden = !leftPanel || leftPanel.classList.contains("is-hidden");
    const rightHidden = !rightPanel || rightPanel.classList.contains("is-hidden");
    mainLayout.classList.toggle("no-left", leftHidden);
    mainLayout.classList.toggle("no-right", rightHidden);
  }

  function handleToolSelection(tool) {
    currentTool = tool;
    toolButtons.forEach((btn) => {
      const isActive = btn.getAttribute("data-tool") === tool;
      btn.classList.toggle("tool-button--active", isActive);
    });

    if (!propertiesContent) return;
    propertiesContent.innerHTML = "";

    const heading = document.createElement("h3");
    if (tool === "stamps") {
      heading.textContent = "Saved images";
    } else if (tool === "math") {
      heading.textContent = "Symbols";
    } else if (tool === "notes") {
      heading.textContent = "Sticky notes";
    } else {
      heading.textContent = tool[0].toUpperCase() + tool.slice(1) + " tool";
    }
    heading.style.fontSize = "0.85rem";
    heading.style.margin = "0 0 0.4rem";

    propertiesContent.appendChild(heading);

    if (tool === "pen" || tool === "highlighter") {
      renderPenOptions(tool);
    } else if (tool === "eraser") {
      renderEraserOptions();
    } else if (tool === "shapes") {
      renderShapeOptions();
    } else if (tool === "text") {
      renderTextOptions();
    } else if (tool === "notes") {
      renderStickyOptions();
    } else if (tool === "math") {
      renderMathSymbolsOptions();
    } else if (tool === "select") {
      renderSelectOptions();
    } else if (tool === "charts") {
      renderChartOptions();
    } else if (tool === "stamps") {
      renderStampOptions();
    } else if (tool === "time") {
      heading.textContent = "Clock, timer & stopwatch";
      renderTimeOptions();
    } else if (tool === "poll") {
      heading.textContent = "Poll";
      renderPollOptions();
    } else if (tool === "grid") {
      const wrap = document.createElement("div");
      wrap.className = "tool-options-group";
      const p = document.createElement("p");
      p.style.fontSize = "0.8rem";
      p.style.color = "#9ca3af";
      p.style.margin = "0";
      p.textContent = "1cm×1cm grid. Click the Grid button to show; click it again to remove.";
      wrap.appendChild(p);
      propertiesContent.appendChild(wrap);
    } else if (tool === "lists") {
      renderListsOptions();
    } else if (tool === "graphs") {
      const wrap = document.createElement("div");
      wrap.className = "tool-options-group";
      const p = document.createElement("p");
      p.style.fontSize = "0.8rem";
      p.style.color = "#9ca3af";
      p.style.margin = "0";
      p.textContent = "Graphs tool shows a full-page graph with horizontal and vertical axes and four quadrants while this tool is active. Use Pen/Highlighter to draw on it.";
      wrap.appendChild(p);
      propertiesContent.appendChild(wrap);
    } else {
      const text = document.createElement("p");
      text.style.fontSize = "0.8rem";
      text.style.color = "#9ca3af";
      text.style.margin = "0";
      text.textContent =
        "Tool options will appear here as we add more controls.";
      propertiesContent.appendChild(text);
    }

    // Redraw when switching tools so Graphs background (and others) appear immediately
    updateBoardAppearance();
  }

  function applyFormatToSelectedTexts(prop, value) {
    selectedTexts.forEach((t) => { t[prop] = value; });
    updateBoardAppearance();
  }

  function moveSelectedToBack() {
    const page = pages[currentPageIndex];
    if (!page) return;
    if (!page.shapes) page.shapes = [];
    if (!page.texts) page.texts = [];
    const hasAny = (selectedShapes && selectedShapes.length) || (selectedTexts && selectedTexts.length);
    if (!hasAny) return;
    pushUndo();
    if (selectedShapes.length) {
      const set = new Set(selectedShapes);
      const selected = [];
      const rest = [];
      for (const s of page.shapes) {
        if (set.has(s)) selected.push(s);
        else rest.push(s);
      }
      page.shapes = selected.concat(rest);
    }
    if (selectedTexts.length) {
      const setT = new Set(selectedTexts);
      const selectedT = [];
      const restT = [];
      for (const t of page.texts) {
        if (setT.has(t)) selectedT.push(t);
        else restT.push(t);
      }
      page.texts = selectedT.concat(restT);
    }
    updateBoardAppearance();
  }

  function copyStyle() {
    if (selectedShapes.length > 0) {
      const s = selectedShapes[0];
      styleClipboard.shapeStyle = {
        color: s.color != null ? s.color : "#0f172a",
        width: s.width != null ? s.width : 2,
        fillMode: s.fillMode != null ? s.fillMode : "hollow",
        fillOpacity: s.fillOpacity != null ? s.fillOpacity : 1,
      };
    }
    if (selectedTexts.length > 0) {
      const t = selectedTexts[0];
      styleClipboard.textStyle = {
        color: t.color != null ? t.color : "#0f172a",
        fontSize: t.fontSize != null ? t.fontSize : 32,
        fontFamily: t.fontFamily != null ? t.fontFamily : "Arial",
        bold: !!t.bold,
        italic: !!t.italic,
        underline: !!t.underline,
        stickyColor: t.sticky ? (t.stickyColor != null ? t.stickyColor : "#fef08a") : undefined,
        stickyOpacity: t.sticky && t.stickyOpacity != null ? t.stickyOpacity : undefined,
        subscript: !!t.subscript,
        superscript: !!t.superscript,
        strikethrough: !!t.strikethrough,
        rotation: !t.sticky && t.rotation != null ? t.rotation : undefined,
      };
    }
    if (selectedShapes.length === 0 && selectedTexts.length === 0) {
      styleClipboard.shapeStyle = null;
      styleClipboard.textStyle = null;
    }
    const page = pages[currentPageIndex];
    if (page) {
      styleClipboard.widgets = (page.widgets || [])
        .filter((w) => w.type === "clock" || w.type === "timer" || w.type === "stopwatch")
        .map((w) => JSON.parse(JSON.stringify(w)));
      styleClipboard.imageShapes = (page.shapes || [])
        .filter((s) => s.type === "image")
        .map((s) => JSON.parse(JSON.stringify(s)));
    } else {
      styleClipboard.widgets = [];
      styleClipboard.imageShapes = [];
    }
  }

  function pasteStyle() {
    const hasShapeClip = styleClipboard.shapeStyle != null;
    const hasTextClip = styleClipboard.textStyle != null;
    const hasWidgets = styleClipboard.widgets && styleClipboard.widgets.length > 0;
    const hasImageShapes = styleClipboard.imageShapes && styleClipboard.imageShapes.length > 0;
    if (!hasShapeClip && !hasTextClip && !hasWidgets && !hasImageShapes) return;
    pushUndo();
    if (hasShapeClip && selectedShapes.length > 0) {
      const clip = styleClipboard.shapeStyle;
      selectedShapes.forEach((s) => {
        s.color = clip.color;
        s.width = clip.width;
        s.fillMode = clip.fillMode;
        if (clip.fillOpacity != null) s.fillOpacity = clip.fillOpacity;
      });
    }
    if (hasTextClip && selectedTexts.length > 0) {
      const clip = styleClipboard.textStyle;
      selectedTexts.forEach((t) => {
        t.color = clip.color;
        t.fontSize = clip.fontSize;
        t.fontFamily = clip.fontFamily;
        t.bold = clip.bold;
        t.italic = clip.italic;
        t.underline = clip.underline;
        if (t.sticky && clip.stickyColor != null) t.stickyColor = clip.stickyColor;
        if (t.sticky && clip.stickyOpacity != null) t.stickyOpacity = clip.stickyOpacity;
        if (clip.subscript != null) t.subscript = clip.subscript;
        if (clip.superscript != null) t.superscript = clip.superscript;
        if (clip.strikethrough != null) t.strikethrough = clip.strikethrough;
        if (!t.sticky && clip.rotation != null) t.rotation = clip.rotation;
      });
    }
    if (hasShapeClip && selectedTexts.length > 0 && selectedShapes.length === 0) {
      selectedTexts.forEach((t) => { t.color = styleClipboard.shapeStyle.color; });
    }
    if (hasTextClip && selectedShapes.length > 0 && selectedTexts.length === 0) {
      selectedShapes.forEach((s) => { s.color = styleClipboard.textStyle.color; });
    }
    const page = pages[currentPageIndex];
    if (page && hasWidgets) {
      if (!page.widgets) page.widgets = [];
      styleClipboard.widgets.forEach((w) => {
        const clone = JSON.parse(JSON.stringify(w));
        clone.id = generateId();
        if (clone.type === "timer" && clone.durationSeconds) {
          clone.endTime = Date.now() + clone.durationSeconds * 1000;
        } else if (clone.type === "stopwatch") {
          clone.startTime = Date.now();
          clone.elapsedMs = 0;
          clone.running = true;
          clone.ended = false;
        }
        page.widgets.push(clone);
      });
    }
    if (page && hasImageShapes) {
      if (!page.shapes) page.shapes = [];
      styleClipboard.imageShapes.forEach((s) => {
        const clone = JSON.parse(JSON.stringify(s));
        if (clone.id != null) clone.id = generateId();
        page.shapes.push(clone);
      });
    }
    updateBoardAppearance();
    if (currentTool === "select") handleToolSelection("select");
  }

    function addStockImageToBoard(dataUrl) {
      const page = pages[currentPageIndex];

      const scale = window.devicePixelRatio || 1;
      const logicalW = boardCanvas ? boardCanvas.width / (scale * zoom) : 800;
      const logicalH = boardCanvas ? boardCanvas.height / (scale * zoom) : 600;
      const cx = logicalW / 2;
      const cy = logicalH / 2;
      const halfW = 150;
      const halfH = 150;
      const newShape = {
        type: "image",
        color: "#ffffff",
        width: 1,
        fillMode: "solid",
        dataUrl,
        start: { x: cx - halfW, y: cy - halfH },
        end: { x: cx + halfW, y: cy + halfH },
      };
      page.shapes.push(newShape);

      selectedShapes = [newShape];

      updateBoardAppearance();
      if (propertiesContent) handleToolSelection("select");

    function urlToDataURL(url) {
      return fetch(url, { mode: "cors" })
        .then((r) => r.blob())
        .then((blob) => new Promise((resolve, reject) => {
          const r = new FileReader();
          r.onload = () => resolve(r.result);
          r.onerror = reject;
          r.readAsDataURL(blob);
        }));
    }

    function renderPhotoResult(thumbUrl, fullUrl, wrap) {
      if (!thumbUrl) return;
      const img = document.createElement("img");
      img.src = thumbUrl;
      img.alt = "";
      img.style.width = "72px";
      img.style.height = "72px";
      img.style.objectFit = "cover";
      img.style.display = "block";
      wrap.appendChild(img);
      wrap.addEventListener("click", () => {
        wrap.disabled = true;
        wrap.style.opacity = "0.6";
        urlToDataURL(fullUrl).then((dataUrl) => {
          addStockImageToBoard(dataUrl);
        }).catch(() => {
          resultsDiv.insertAdjacentHTML("beforeend", "<p style=\"font-size:0.7rem;color:#f87171;\">Could not load image. Try another.</p>");
          wrap.disabled = false;
          wrap.style.opacity = "1";
        });
      });
      resultsDiv.appendChild(wrap);
    }

    searchBtn.addEventListener("click", () => {
      const query = (searchInput.value || "").trim();
      const source = sourceSelect.value || "pixabay";
      let apiKey = keyInput.value.trim();
      if (!apiKey && source === "pixabay") apiKey = (localStorage.getItem(PIXABAY_API_KEY_STORAGE) || "").trim();
      if (!apiKey && source === "unsplash") apiKey = (localStorage.getItem(UNSPLASH_ACCESS_KEY_STORAGE) || "").trim();
      if (!apiKey && source === "pexels") apiKey = (localStorage.getItem(PEXELS_API_KEY_STORAGE) || "").trim();
      if (!query) return;
      if (!apiKey) {
        resultsDiv.innerHTML = "<p style=\"font-size:0.75rem;color:#f87171;margin:0;\">Enter your " + (source.charAt(0).toUpperCase() + source.slice(1)) + " API key above.</p>";
        return;
      }
      resultsDiv.innerHTML = "<p style=\"font-size:0.75rem;color:#9ca3af;margin:0;\">Searching…</p>";
      if (source === "pexels") {
        fetch("https://api.pexels.com/v1/search?query=" + encodeURIComponent(query) + "&per_page=12", { headers: { Authorization: apiKey } })
          .then((r) => r.ok ? r.json() : Promise.reject(new Error("Search failed")))
          .then((data) => {
            const photos = data.photos || [];
            resultsDiv.innerHTML = "";
            if (!photos.length) { resultsDiv.innerHTML = "<p style=\"font-size:0.75rem;color:#9ca3af;margin:0;\">No images found. Try another word.</p>"; return; }
            photos.forEach((photo) => {
              const src = photo.src || {};
              const wrap = document.createElement("button");

              wrap.style.padding = "0"; wrap.style.border = "2px solid #374151"; wrap.style.borderRadius = "8px"; wrap.style.cursor = "pointer"; wrap.style.background = "none"; wrap.style.overflow = "hidden";
              renderPhotoResult(src.small || src.medium || src.large, src.large || src.medium || src.original, wrap);
            });
          })
          .catch(() => { resultsDiv.innerHTML = "<p style=\"font-size:0.75rem;color:#f87171;margin:0;\">Search failed. Check your API key and connection.</p>"; });
      } else if (source === "unsplash") {
        fetch("https://api.unsplash.com/search/photos?query=" + encodeURIComponent(query) + "&per_page=12", { headers: { Authorization: "Client-ID " + apiKey } })
          .then((r) => r.ok ? r.json() : Promise.reject(new Error("Search failed")))
          .then((data) => {
            const results = data.results || [];
            resultsDiv.innerHTML = "";
            if (!results.length) { resultsDiv.innerHTML = "<p style=\"font-size:0.75rem;color:#9ca3af;margin:0;\">No images found. Try another word.</p>"; return; }
            results.forEach((photo) => {
              const urls = photo.urls || {};
              const wrap = document.createElement("button");
              wrap.type = "button"; wrap.title = "Add to board";
              wrap.style.padding = "0"; wrap.style.border = "2px solid #374151"; wrap.style.borderRadius = "8px"; wrap.style.cursor = "pointer"; wrap.style.background = "none"; wrap.style.overflow = "hidden";
              renderPhotoResult(urls.small || urls.thumb, urls.regular || urls.full || urls.small, wrap);
            });
          })
          .catch(() => { resultsDiv.innerHTML = "<p style=\"font-size:0.75rem;color:#f87171;margin:0;\">Search failed. Check your API key and connection.</p>"; });
      } else {
        fetch("https://pixabay.com/api/?key=" + encodeURIComponent(apiKey) + "&q=" + encodeURIComponent(query) + "&image_type=photo&per_page=12")
          .then((r) => r.ok ? r.json() : Promise.reject(new Error("Search failed")))
          .then((data) => {
            const hits = data.hits || [];
            resultsDiv.innerHTML = "";
            if (!hits.length) { resultsDiv.innerHTML = "<p style=\"font-size:0.75rem;color:#9ca3af;margin:0;\">No images found. Try another word.</p>"; return; }

              renderPhotoResult(photo.previewURL || photo.webformatURL, photo.largeImageURL || photo.webformatURL || photo.previewURL, wrap);
            });
          })
          .catch(() => { resultsDiv.innerHTML = "<p style=\"font-size:0.75rem;color:#f87171;margin:0;\">Search failed. Check your API key and connection.</p>"; });
      }
    });

    searchInput.addEventListener("keydown", (e) => {

  function getVisibleBoardCenter() {
    const container = boardCanvas && boardCanvas.closest(".canvas-container");
    if (!container) {
      const scale = window.devicePixelRatio || 1;
      const logicalW = boardCanvas ? boardCanvas.width / (scale * zoom) : 800;
      const logicalH = boardCanvas ? boardCanvas.height / (scale * zoom) : 600;
      return { x: logicalW / 2, y: logicalH / 2 };
    }
    const scrollTop = container.scrollTop;
    const clientHeight = container.clientHeight;
    const scale = window.devicePixelRatio || 1;
    const logicalW = boardCanvas ? boardCanvas.width / (scale * zoom) : 800;
    return {
      x: logicalW / 2,
      y: (scrollTop + clientHeight / 2) / zoom,
    };
  }
