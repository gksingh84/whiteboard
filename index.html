  function getWidgetDisplayText(widget) {
    const now = Date.now();
    if (widget.type === "clock") {
      const d = new Date();
      const h = d.getHours();
      const m = d.getMinutes();
      const s = d.getSeconds();
      return [h, m, s].map((n) => String(n).padStart(2, "0")).join(":");
    }
    if (widget.type === "timer") {
      const end = widget.endTime || 0;
      const left = Math.max(0, Math.ceil((end - now) / 1000));
      const h = Math.floor(left / 3600);
      const m = Math.floor((left % 3600) / 60);
      const s = left % 60;
      if (h > 0) {
        return h + ":" + String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0");
      }
      return m + ":" + String(s).padStart(2, "0");
    }
    if (widget.type === "stopwatch") {
      let elapsed = widget.elapsedMs || 0;
      if (widget.running && !widget.ended) elapsed += now - (widget.startTime || now);
      const totalMs = elapsed;
      const m = Math.floor(totalMs / 60000);
      const s = Math.floor((totalMs % 60000) / 1000);
      return m + ":" + String(s).padStart(2, "0");
    }
    if (widget.type === "poll") return "";
    return "";
  }

  function cloneTimeWidgetForOtherPage(widget) {
    const clone = JSON.parse(JSON.stringify(widget));
    clone.id = generateId();
    if (clone.type === "timer" && clone.durationSeconds) {
      clone.endTime = Date.now() + clone.durationSeconds * 1000;
    } else if (clone.type === "stopwatch") {
      clone.startTime = Date.now();
      clone.elapsedMs = 0;
      clone.running = true;
      clone.ended = false;
    }
    return clone;
  }

    const cur = currentPageIndex;

      if (!p.widgets) p.widgets = [];

  function getCanvasPoint(evt) {
    const rect = boardCanvas.getBoundingClientRect();
    const scale = window.devicePixelRatio || 1;
    const logicalWidth = boardCanvas.width / scale;
    const logicalHeight = boardCanvas.height / scale;

    const xRatio = (evt.clientX - rect.left) / rect.width;
    const yRatio = (evt.clientY - rect.top) / rect.height;

    return {
      x: (xRatio * logicalWidth) / zoom,
      y: (yRatio * logicalHeight) / zoom,
    };
  }

  function interpolatePoints(p1, p2, maxSegmentLen) {
    const dx = p2.x - p1.x;
    const dy = p2.y - p1.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist <= maxSegmentLen) return [p1, p2];
    const n = Math.max(2, Math.ceil(dist / maxSegmentLen));
    const out = [p1];
    for (let i = 1; i < n; i++) {
      const t = i / n;
      out.push({ x: p1.x + dx * t, y: p1.y + dy * t });
    }
    out.push(p2);
    return out;
  }

  function drawSmoothStrokePath(ctx, points) {
    if (!points || points.length < 2) return;
    ctx.moveTo(points[0].x, points[0].y);
    if (points.length === 2) {
      ctx.lineTo(points[1].x, points[1].y);
      return;
    }
    for (let i = 1; i < points.length - 1; i++) {
      const c = points[i];
      const next = points[i + 1];
      const endX = (c.x + next.x) / 2;
      const endY = (c.y + next.y) / 2;
      ctx.quadraticCurveTo(c.x, c.y, endX, endY);
    }
    ctx.lineTo(points[points.length - 1].x, points[points.length - 1].y);
  }

  function hitTestShape(point) {
    const page = pages[currentPageIndex];
    if (!page || !page.shapes) return null;
    const padding = 8;
    for (let i = page.shapes.length - 1; i >= 0; i--) {
      const shape = page.shapes[i];
      const { start, end } = shape;
      if (!start || !end) continue;
      const x1 = Math.min(start.x, end.x) - padding;
      const y1 = Math.min(start.y, end.y) - padding;
      const x2 = Math.max(start.x, end.x) + padding;
      const y2 = Math.max(start.y, end.y) + padding;
      if (point.x >= x1 && point.x <= x2 && point.y >= y1 && point.y <= y2) {
        return { shape, index: i };
      }
    }
    return null;
  }

  function shapesInBox(box) {
    const page = pages[currentPageIndex];
    if (!page || !page.shapes) return [];
    const { start, end } = box;
    const bx1 = Math.min(start.x, end.x);
    const by1 = Math.min(start.y, end.y);
    const bx2 = Math.max(start.x, end.x);
    const by2 = Math.max(start.y, end.y);
    return page.shapes.filter((shape) => {
      const { start: s, end: e } = shape;
      if (!s || !e) return false;
      const sx1 = Math.min(s.x, e.x);
      const sy1 = Math.min(s.y, e.y);
      const sx2 = Math.max(s.x, e.x);
      const sy2 = Math.max(s.y, e.y);
      return !(sx2 < bx1 || sx1 > bx2 || sy2 < by1 || sy1 > by2);
    });
  }

  function getTextBounds(item) {
    const fs = item.fontSize ?? 24;
    const hasInline = item.inlineFormats && item.inlineFormats.length > 0;
    const extraTop = hasInline && item.inlineFormats.some((r) => r.superscript) ? fs * 0.45 : 0;
    const extraBottom = hasInline && item.inlineFormats.some((r) => r.subscript) ? fs * 0.45 : 0;
    function expand(b) {
      if (extraTop || extraBottom) return { x: b.x, y: b.y - extraTop, w: b.w, h: b.h + extraTop + extraBottom };
      return b;
    }
    if (item.sticky) {
      const maxW = item.w ?? stickyNotesSettings.maxWidth ?? 220;
      const { width, height } = wrapStickyText(item, maxW);
      return expand({ x: item.x, y: item.y, w: item.w ?? width, h: item.h ?? height });
    }
    if (item.w != null && item.h != null) {
      return { x: item.x, y: item.y, w: item.w, h: item.h };
    }
    const text = item.text || "";
    if (text.includes("\n")) {
      const lines = text.split("\n");
      const w = Math.max(20, ...lines.map((l) => l.length * fs * 0.6));
      return expand({ x: item.x, y: item.y, w, h: lines.length * fs });
    }
    const w = Math.max(20, text.length * fs * 0.6);
    return expand({ x: item.x, y: item.y, w, h: fs });
  }

  function pointInRotatedRect(px, py, cx, cy, w, h, angleDeg) {
    const rad = (angleDeg * Math.PI) / 180;
    const dx = px - cx;
    const dy = py - cy;
    const qx = dx * Math.cos(rad) + dy * Math.sin(rad);
    const qy = -dx * Math.sin(rad) + dy * Math.cos(rad);
    return Math.abs(qx) <= w / 2 && Math.abs(qy) <= h / 2;
  }

  function boardPointToTextLocal(px, py, item) {
    if (item.sticky) return { x: px, y: py };
    const rot = (item.rotation || 0) * Math.PI / 180;
    if (rot === 0) return { x: px, y: py };
    const b = getTextBounds(item);
    const cx = b.x + b.w / 2;
    const cy = b.y + b.h / 2;
    const lx = cx + (px - cx) * Math.cos(rot) + (py - cy) * Math.sin(rot);
    const ly = cy - (px - cx) * Math.sin(rot) + (py - cy) * Math.cos(rot);
    return { x: lx, y: ly };
  }

  function hitTestText(point) {
    const page = pages[currentPageIndex];
    if (!page || !page.texts) return null;
    for (let i = page.texts.length - 1; i >= 0; i--) {
      const item = page.texts[i];
      const b = getTextBounds(item);
      const pad = item.sticky ? 14 : 8;
      const rx = b.x - pad;
      const ry = b.y - pad;
      const rw = b.w + pad * 2;
      const rh = b.h + pad * 2;
      const cx = rx + rw / 2;
      const cy = ry + rh / 2;
      const rot = !item.sticky && (item.rotation != null && item.rotation !== 0) ? Number(item.rotation) : 0;
      const inside = rot
        ? pointInRotatedRect(point.x, point.y, cx, cy, rw, rh, rot)
        : (point.x >= rx && point.x <= rx + rw && point.y >= ry && point.y <= ry + rh);
      if (inside) return { item, index: i };
    }
    return null;
  }

  function textsInBox(box) {
    const page = pages[currentPageIndex];
    if (!page || !page.texts) return [];
    const { start, end } = box;
    const bx1 = Math.min(start.x, end.x);
    const by1 = Math.min(start.y, end.y);
    const bx2 = Math.max(start.x, end.x);
    const by2 = Math.max(start.y, end.y);
    return page.texts.filter((item) => {
      const b = getTextBounds(item);
      const pad = item.sticky ? 12 : 0;
      const x1 = b.x - pad, y1 = b.y - pad, x2 = b.x + b.w + pad, y2 = b.y + b.h + pad;
      return !(x2 < bx1 || x1 > bx2 || y2 < by1 || y1 > by2);
    });
  }

  function duplicateSelected() {
    const page = pages[currentPageIndex];
    if (!page) return;
    if (!page.shapes) page.shapes = [];
    if (!page.texts) page.texts = [];
    const hasAny = (selectedShapes && selectedShapes.length) || (selectedTexts && selectedTexts.length);
    if (!hasAny) return;
    pushUndo();
    const newShapes = [];
    const newTexts = [];
    const OFFSET = 20;

    if (selectedShapes.length) {
      const set = new Set(selectedShapes);
      for (const shape of page.shapes) {
        if (!set.has(shape)) continue;
        const clone = JSON.parse(JSON.stringify(shape));
        clone.id = generateId();
        clone.locked = false;
        if (clone.start && clone.end) {
          clone.start = { x: clone.start.x + OFFSET, y: clone.start.y + OFFSET };
          clone.end = { x: clone.end.x + OFFSET, y: clone.end.y + OFFSET };
        }
        if (clone.type === "group" && clone.children) {
          (clone.children.shapes || []).forEach((s) => {
            s.id = generateId();
            if (s.start) { s.start.x += OFFSET; s.start.y += OFFSET; }
            if (s.end) { s.end.x += OFFSET; s.end.y += OFFSET; }
          });
          (clone.children.texts || []).forEach((t) => {
            t.id = generateId();
            t.x = (t.x || 0) + OFFSET;
            t.y = (t.y || 0) + OFFSET;
          });
        }
        newShapes.push(clone);
      }
      page.shapes = page.shapes.concat(newShapes);
      selectedShapes = newShapes;
    }
    if (selectedTexts.length) {
      const setT = new Set(selectedTexts);
      for (const t of page.texts) {
        if (!setT.has(t)) continue;
        const cloneT = JSON.parse(JSON.stringify(t));
        cloneT.id = generateId();
        cloneT.locked = false;
        cloneT.x += OFFSET;
        cloneT.y += OFFSET;
        newTexts.push(cloneT);
      }
      page.texts = page.texts.concat(newTexts);
      selectedTexts = newTexts;
    }
    updateBoardAppearance();
    if (propertiesContent && currentTool === "select") handleToolSelection("select");
  }

  function lockSelected() {
    if (selectedShapes.length === 0 && selectedTexts.length === 0 && selectedWidgets.length === 0) return;
    pushUndo();
    selectedShapes.forEach((s) => { s.locked = true; });
    selectedTexts.forEach((t) => { t.locked = true; });
    selectedWidgets.forEach((w) => { w.locked = true; });
    updateBoardAppearance();
    if (propertiesContent && currentTool === "select") handleToolSelection("select");
  }

  function unlockSelected() {
    if (selectedShapes.length === 0 && selectedTexts.length === 0 && selectedWidgets.length === 0) return;
    pushUndo();
    selectedShapes.forEach((s) => { s.locked = false; delete s.locked; });
    selectedTexts.forEach((t) => { t.locked = false; delete t.locked; });
    selectedWidgets.forEach((w) => { w.locked = false; delete w.locked; });
    updateBoardAppearance();
    if (propertiesContent && currentTool === "select") handleToolSelection("select");
  }

  function groupSelected() {
    const total = (selectedShapes.length || 0) + (selectedTexts.length || 0);
    if (total < 2) return;
    const page = pages[currentPageIndex];
    if (!page) return;
    pushUndo();
    let x1 = Infinity, y1 = Infinity, x2 = -Infinity, y2 = -Infinity;
    selectedShapes.forEach((s) => {
      if (!s.start || !s.end) return;
      x1 = Math.min(x1, s.start.x, s.end.x);
      y1 = Math.min(y1, s.start.y, s.end.y);
      x2 = Math.max(x2, s.start.x, s.end.x);
      y2 = Math.max(y2, s.start.y, s.end.y);
    });
    selectedTexts.forEach((t) => {
      const b = getTextBounds(t);
      x1 = Math.min(x1, b.x);
      y1 = Math.min(y1, b.y);
      x2 = Math.max(x2, b.x + b.w);
      y2 = Math.max(y2, b.y + b.h);
    });
    const pad = 8;
    const group = {
      type: "group",
      id: generateId(),
      start: { x: x1 - pad, y: y1 - pad },
      end: { x: x2 + pad, y: y2 + pad },
      children: {
        shapes: selectedShapes.slice(),
        texts: selectedTexts.slice(),
      },
    };
    if (!page.shapes) page.shapes = [];
    if (!page.texts) page.texts = [];
    page.shapes = page.shapes.filter((s) => !selectedShapes.includes(s));
    page.texts = page.texts.filter((t) => !selectedTexts.includes(t));
    page.shapes.push(group);
    selectedShapes = [group];
    selectedTexts = [];
    updateBoardAppearance();
    if (propertiesContent && currentTool === "select") handleToolSelection("select");
  }

  function ungroupSelected() {
    if (selectedShapes.length !== 1 || selectedTexts.length !== 0) return;
    const group = selectedShapes[0];
    if (!group || group.type !== "group" || !group.children) return;
    const page = pages[currentPageIndex];
    if (!page) return;
    pushUndo();
    const childShapes = group.children.shapes || [];
    const childTexts = group.children.texts || [];
    if (!page.shapes) page.shapes = [];
    if (!page.texts) page.texts = [];
    page.shapes = page.shapes.filter((s) => s !== group);
    page.shapes.push(...childShapes);
    page.texts.push(...childTexts);
    selectedShapes = childShapes.slice();
    selectedTexts = childTexts.slice();
    updateBoardAppearance();
    if (propertiesContent && currentTool === "select") handleToolSelection("select");
  }

  function deleteSelected() {
    const hasShapesOrTexts = selectedShapes.length > 0 || selectedTexts.length > 0;
    const hasWidgets = selectedWidgets.length > 0;
    if (!hasShapesOrTexts && !hasWidgets) return;
    pushUndo();
    const page = pages[currentPageIndex];
    if (page) {
      if (page.shapes) page.shapes = page.shapes.filter((s) => !selectedShapes.includes(s));
      if (page.texts) page.texts = page.texts.filter((t) => !selectedTexts.includes(t));
      if (page.widgets) page.widgets = page.widgets.filter((w) => !selectedWidgets.includes(w));
    }
    selectedShapes = [];
    selectedTexts = [];
    selectedWidgets = [];
    updateBoardAppearance();
    if (propertiesContent && currentTool === "select") handleToolSelection("select");
  }

  function hitTestWidget(point) {
    const page = pages[currentPageIndex];
    if (!page || !page.widgets) return null;
    const pad = 12;
    for (let i = page.widgets.length - 1; i >= 0; i--) {
      const w = page.widgets[i];
      const b = getWidgetBounds(w);
      if (point.x >= b.x - pad && point.x <= b.x + b.w + pad && point.y >= b.y - pad && point.y <= b.y + b.h + pad) {
        return { widget: w, index: i };
      }
    }
    return null;
  }

  function drawPollWidget(ctx, widget, zoomFactor) {
    const zoom = zoomFactor != null ? zoomFactor : 1;
    const fs = Math.max(14, (widget.fontSize || 20) * zoom);
    const fontFamily = widget.fontFamily || "Arial";
    const color = widget.color || "#0f172a";
    const lineH = fs * 1.2;
    const question = widget.question || "New Poll";
    const options = widget.options || [];
    const totalLines = 1 + options.length + (widget.ended ? 1 : 0);
    let y = widget.y - (totalLines * lineH) / 2 + lineH / 2;
    ctx.save();
    ctx.fillStyle = color;
    ctx.textBaseline = "middle";
    ctx.textAlign = "left";
    if (widget.ended) {
      ctx.font = `bold ${fs}px ${fontFamily}`;
      ctx.fillText("— Final results —", widget.x, y);
      y += lineH;
    }
    ctx.font = `bold ${fs}px ${fontFamily}`;
    ctx.fillText(question, widget.x, y);
    y += lineH;
    ctx.font = `${fs}px ${fontFamily}`;
    options.forEach((o) => {
      const label = o.text || "Option";
      const votes = o.votes ?? 0;
      const text = widget.ended ? label + ": " + votes + " vote(s)" : label + " — " + votes;
      ctx.fillText(text, widget.x, y);
      y += lineH;
    });
    ctx.restore();
  }

  function getPollBounds(widget) {
    const fs = Math.max(14, widget.fontSize || 20);
    const fontFamily = widget.fontFamily || "Arial";
    const ctx = boardCanvas ? boardCanvas.getContext("2d") : null;
    if (!ctx) {
      const qLen = (widget.question || "").length;
      const maxOpt = Math.max(0, ...(widget.options || []).map((o) => (o.text || "").length + 6));
      const w = Math.max(80, Math.max(qLen, maxOpt) * fs * 0.55);
      const lines = 1 + (widget.options || []).length;
      return { x: widget.x, y: widget.y - (lines * fs * 1.2) / 2, w, h: lines * fs * 1.2 };
    }
    ctx.save();
    ctx.font = `bold ${fs}px ${fontFamily}`;
    let maxW = ctx.measureText(widget.question || "?").width;
    ctx.font = `${fs}px ${fontFamily}`;
    (widget.options || []).forEach((o) => {
      const line = (o.text || "") + ": " + (o.votes ?? 0) + " vote(s)";
      maxW = Math.max(maxW, ctx.measureText(line).width);
    });
    if (widget.ended) {
      ctx.font = `bold ${fs}px ${fontFamily}`;
      const endLine = "— Final results —";
      maxW = Math.max(maxW, ctx.measureText(endLine).width);
    }
    ctx.restore();
    const lineH = fs * 1.2;
    const lines = 1 + (widget.options || []).length + (widget.ended ? 1 : 0);
    return { x: widget.x, y: widget.y - (lines * lineH) / 2, w: maxW + 16, h: lines * lineH };
  }

  function getWidgetBounds(widget) {
    if (widget.type === "poll") return getPollBounds(widget);
    const text = getWidgetDisplayText(widget);
    const fs = widget.fontSize || 28;
    const approxW = Math.max(40, text.length * fs * 0.6);
    const h = fs;
    return { x: widget.x, y: widget.y - h / 2, w: approxW, h };
  }

  function widgetsInBox(box) {
    const page = pages[currentPageIndex];
    if (!page || !page.widgets) return [];
    const { start, end } = box;
    const bx1 = Math.min(start.x, end.x);
    const by1 = Math.min(start.y, end.y);
    const bx2 = Math.max(start.x, end.x);
    const by2 = Math.max(start.y, end.y);
    return page.widgets.filter((w) => {
      const b = getWidgetBounds(w);
      return !(b.x + b.w < bx1 || b.x > bx2 || b.y + b.h < by1 || b.y > by2);
    });
  }

  function handlePointerDown(evt) {
    if (!boardCanvas) return;
    if (evt.pointerType === "touch") return; /* tablet: we use touch handlers instead */
    if (typeof evt.preventDefault === "function") evt.preventDefault();
    try { boardCanvas.setPointerCapture(evt.pointerId); } catch (_) {}

    if (currentTool === "time") {
      const point = getCanvasPoint(evt);
      placeTimeWidget(point);
      return;
    }
    if (currentTool === "poll") {
      const point = getCanvasPoint(evt);
      placePollWidget(point);
      return;
    }
    if (currentTool === "lists") {
      const point = getCanvasPoint(evt);
      placeList(point);
      return;
    }
    if (currentTool === "pen" || currentTool === "highlighter") {
      pushUndo();
      isDrawing = true;
      const point = getCanvasPoint(evt);
      const settings = currentTool === "pen" ? penSettings : highlighterSettings;
      const color = settings.color;
      const alpha = currentTool === "pen" ? 1 : settings.alpha ?? 0.4;
      const width = settings.width;
      activeStroke = {
        tool: currentTool,
        color,
        alpha,
        width,
        points: [point],
      };
      if (!pages[currentPageIndex]) {
        pages[currentPageIndex] = { strokes: [], shapes: [], texts: [], widgets: [], background: null };
      }
      pages[currentPageIndex].strokes.push(activeStroke);
    } else if (currentTool === "text") {
      if (typeof evt.preventDefault === "function") evt.preventDefault();
      const point = getCanvasPoint(evt);
      const page = pages[currentPageIndex];
      if (!page) return;
      if (!page.texts) page.texts = [];
      pushUndo();
      showInlineTextInput(point);
    } else if (currentTool === "notes") {
      if (typeof evt.preventDefault === "function") evt.preventDefault();
      const point = getCanvasPoint(evt);
      const page = pages[currentPageIndex];
      if (!page) return;
      if (!page.texts) page.texts = [];
      pushUndo();
      showInlineTextInput(point, true);
    } else if (currentTool === "eraser") {
      pushUndo();
      isDrawing = true;
      handleEraserMove(evt);
    } else if (currentTool === "shapes") {
      pushUndo();
      isDrawing = true;
      const point = getCanvasPoint(evt);
      activeShape = {
        type: shapeSettings.type,
        color: shapeSettings.color,
        width: shapeSettings.width,
        fillMode: shapeSettings.fillMode,
        fillOpacity: shapeSettings.fillOpacity ?? 1,
        start: point,
        end: point,
      };
      updateBoardAppearance();
    } else if (currentTool === "charts") {
      pushUndo();
      isDrawing = true;
      const point = getCanvasPoint(evt);
      const chartType = chartSettings.type || "barChart";
      const pictographSymbols = ["circle", "square", "triangle", "star", "diamond"];
      activeShape = {
        type: chartType,
        color: "#374151",
        width: 2,
        fillMode: "hollow",
        start: point,
        end: point,
        data: getRandomChartData(chartType),
        symbolShape: chartType === "pictograph" ? pictographSymbols[Math.floor(Math.random() * pictographSymbols.length)] : undefined,
      };
      updateBoardAppearance();
    } else if (currentTool === "select") {
      const point = getCanvasPoint(evt);

      // check controls on the selection (order: unlock, duplicate, delete, lock)
      for (const shape of selectedShapes) {
        const uh = shape._unlockHandle;
        if (uh && point.x >= uh.x && point.x <= uh.x + uh.w && point.y >= uh.y && point.y <= uh.y + uh.h) {
          unlockSelected();
          return;
        }
        const dh = shape._duplicateHandle;
        if (dh && point.x >= dh.x && point.x <= dh.x + dh.w && point.y >= dh.y && point.y <= dh.y + dh.h) {
          duplicateSelected();
          return;
        }
        const delH = shape._deleteHandle;
        if (delH && point.x >= delH.x && point.x <= delH.x + delH.w && point.y >= delH.y && point.y <= delH.y + delH.h) {
          deleteSelected();
          return;
        }
        const lh = shape._lockHandle;
        if (lh && point.x >= lh.x && point.x <= lh.x + lh.w && point.y >= lh.y && point.y <= lh.y + lh.h) {
          lockSelected();
          return;
        }
      }
      for (const textItem of selectedTexts) {
        const pt = boardPointToTextLocal(point.x, point.y, textItem);
        const uh = textItem._unlockHandle;
        if (uh && pt.x >= uh.x && pt.x <= uh.x + uh.w && pt.y >= uh.y && pt.y <= uh.y + uh.h) {
          unlockSelected();
          return;
        }
        const dh = textItem._duplicateHandle;
        if (dh && pt.x >= dh.x && pt.x <= dh.x + dh.w && pt.y >= dh.y && pt.y <= dh.y + dh.h) {
          duplicateSelected();
          return;
        }
        const delH = textItem._deleteHandle;
        if (delH && pt.x >= delH.x && pt.x <= delH.x + delH.w && pt.y >= delH.y && pt.y <= delH.y + delH.h) {
          deleteSelected();
          return;
        }
        const lh = textItem._lockHandle;
        if (lh && pt.x >= lh.x && pt.x <= lh.x + lh.w && pt.y >= lh.y && pt.y <= lh.y + lh.h) {
          lockSelected();
          return;
        }
      }
      for (const widget of selectedWidgets) {
        const uh = widget._unlockHandle;
        if (uh && point.x >= uh.x && point.x <= uh.x + uh.w && point.y >= uh.y && point.y <= uh.y + uh.h) {
          unlockSelected();
          return;
        }
        const lh = widget._lockHandle;
        if (lh && point.x >= lh.x && point.x <= lh.x + lh.w && point.y >= lh.y && point.y <= lh.y + lh.h) {
          lockSelected();
          return;
        }
      }

      // check resize handles first (shapes, then texts)
      const page = pages[currentPageIndex];
      const radius = 12;
      if (page) {
        if (page.shapes && page.shapes.length) {
          for (let i = page.shapes.length - 1; i >= 0; i--) {
            const sh = page.shapes[i];
            if (!sh || sh.locked || sh.type === "group" || !sh._resizeHandles || !Array.isArray(sh._resizeHandles)) continue;
            for (const h of sh._resizeHandles) {
              const dx = point.x - h.x;
              const dy = point.y - h.y;
              if (Math.sqrt(dx * dx + dy * dy) <= radius) {
                pushUndo();
                resizeState = {
                  kind: "shape",
                  shape: sh,
                  corner: h.corner,
                  startBounds: {
                    start: { x: sh.start.x, y: sh.start.y },
                    end: { x: sh.end.x, y: sh.end.y },
                  },
                };
                isDrawing = true;
                isDraggingShape = false;
                dragShapeStartPoint = null;
                dragShapeOriginals = null;
                dragGroupChildrenOriginals = null;
                dragTextOriginals = null;
                return;
              }
            }
          }
        }
        if (page.texts && page.texts.length) {
          for (let i = page.texts.length - 1; i >= 0; i--) {
            const t = page.texts[i];
            if (!t || t.locked || !t._resizeHandles || !Array.isArray(t._resizeHandles)) continue;
            const pt = boardPointToTextLocal(point.x, point.y, t);
            for (const h of t._resizeHandles) {
              const dx = pt.x - h.x;
              const dy = pt.y - h.y;
              if (Math.sqrt(dx * dx + dy * dy) <= radius) {
                pushUndo();
                const b = getTextBounds(t);
                resizeState = {
                  kind: "text",
                  text: t,
                  corner: h.corner,
                  startBoundsText: { x: b.x, y: b.y, w: b.w, h: b.h },
                };
                isDrawing = true;
                isDraggingShape = false;
                dragShapeStartPoint = null;
                dragShapeOriginals = null;
                dragGroupChildrenOriginals = null;
                dragTextOriginals = null;
                return;
              }
            }
          }
        }
      }
      if (selectedWidgets.length > 0) {
        for (const w of selectedWidgets) {
          const h = w._resizeHandle;
          if (h && point.x >= h.x && point.x <= h.x + h.w && point.y >= h.y && point.y <= h.y + h.h) {
            pushUndo();
            resizeState = {
              kind: "widget",
              widget: w,
              startFontSize: w.fontSize || 28,
              startPoint: { x: point.x, y: point.y },
            };
            isDrawing = true;
            isDraggingShape = false;
            isDraggingWidget = false;
            dragShapeStartPoint = null;
            dragShapeOriginals = null;
            dragGroupChildrenOriginals = null;
            dragWidgetOriginals = null;
            dragTextOriginals = null;
            return;
          }
        }
      }

      const widgetHit = hitTestWidget(point);
      const shapeHit = hitTestShape(point);
      const textHit = hitTestText(point);
      const shift = evt.shiftKey;

      if (widgetHit) {
        if (shift) {
          const idx = selectedWidgets.indexOf(widgetHit.widget);
          if (idx >= 0) {
            selectedWidgets = selectedWidgets.slice(0, idx).concat(selectedWidgets.slice(idx + 1));
          } else {
            selectedWidgets = selectedWidgets.concat([widgetHit.widget]);
          }
        } else {
          if (!selectedWidgets.includes(widgetHit.widget)) {
            selectedWidgets = [widgetHit.widget];
            selectedShapes = [];
            selectedTexts = [];
          } else {
            const anyWidgetLocked = selectedWidgets.some((w) => w.locked);
            if (!anyWidgetLocked) {
              pushUndo();
              isDrawing = true;
              isDraggingWidget = true;
              dragShapeStartPoint = point;
              dragWidgetOriginals = selectedWidgets.map((w) => ({ x: w.x, y: w.y }));
              dragShapeOriginals = null;
              dragGroupChildrenOriginals = null;
              dragTextOriginals = null;
            }
          }
        }
        if (!isDraggingWidget) {
          isDrawing = false;
          isDraggingShape = false;
          dragShapeStartPoint = null;
          dragShapeOriginals = null;
          dragGroupChildrenOriginals = null;
          dragTextOriginals = null;
          if (propertiesContent) handleToolSelection("select");
        }
      } else if (shapeHit) {
        if (shift) {
          const idx = selectedShapes.indexOf(shapeHit.shape);
          if (idx >= 0) {
            selectedShapes = selectedShapes.slice(0, idx).concat(selectedShapes.slice(idx + 1));
          } else {
            selectedShapes = selectedShapes.concat([shapeHit.shape]);
          }
          isDrawing = false;
          isDraggingShape = false;
          dragShapeStartPoint = null;
          dragShapeOriginals = null;
          dragGroupChildrenOriginals = null;
          dragTextOriginals = null;
          if (propertiesContent) handleToolSelection("select");
        } else {
          if (!selectedShapes.includes(shapeHit.shape)) {
            selectedShapes = [shapeHit.shape];
            selectedTexts = [];
            selectedWidgets = [];
          }
          const anyLocked = selectedShapes.some((s) => s.locked) || selectedTexts.some((t) => t.locked);
          if (!anyLocked) {
            pushUndo();
            isDrawing = true;
            isDraggingShape = true;
            dragShapeStartPoint = point;
            dragShapeOriginals = selectedShapes.map((s) => ({
            start: { x: s.start.x, y: s.start.y },
            end: { x: s.end.x, y: s.end.y },
          }));
          dragTextOriginals = selectedTexts.map((t) => ({ x: t.x, y: t.y }));
          dragGroupChildrenOriginals = null;
          if (selectedShapes.length === 1 && selectedShapes[0].type === "group" && selectedShapes[0].children) {
            const g = selectedShapes[0];
            dragGroupChildrenOriginals = {
              shapes: (g.children.shapes || []).map((s) => ({
                start: s.start ? { x: s.start.x, y: s.start.y } : null,
                end: s.end ? { x: s.end.x, y: s.end.y } : null,
              })),
              texts: (g.children.texts || []).map((t) => ({ x: t.x, y: t.y })),
            };
          }
          if (propertiesContent) handleToolSelection("select");
          }
        }
      } else if (textHit) {
        if (shift) {
          const idx = selectedTexts.indexOf(textHit.item);
          if (idx >= 0) {
            selectedTexts = selectedTexts.slice(0, idx).concat(selectedTexts.slice(idx + 1));
          } else {
            selectedTexts = selectedTexts.concat([textHit.item]);
          }
          isDrawing = false;
          isDraggingShape = false;
          dragShapeStartPoint = null;
          dragShapeOriginals = null;
          dragTextOriginals = null;
          if (propertiesContent) handleToolSelection("select");
        } else {
          const wasAlreadyOnlySelection = selectedTexts.length === 1 && selectedTexts[0] === textHit.item;
          const isDoubleTap = selectedTexts.length === 1 && selectedTexts[0] === textHit.item &&
            (Date.now() - lastTextTap.time) < 450 && lastTextTap.item === textHit.item;
          lastTextTap = { time: Date.now(), item: textHit.item };
          if (isDoubleTap) {
            openEditTextInput(textHit.item);
            updateBoardAppearance();
            return;
          }
          if (!selectedTexts.includes(textHit.item)) {
            selectedTexts = [textHit.item];
            selectedShapes = [];
            selectedWidgets = [];
          }
          const anyLockedText = selectedShapes.some((s) => s.locked) || selectedTexts.some((t) => t.locked);
          if (!anyLockedText) {
            const onlyText = selectedShapes.length === 0 && selectedWidgets.length === 0;
            const deferCoarseUndo = prefersCoarsePointer() && onlyText && wasAlreadyOnlySelection &&
              selectedTexts.length === 1 && selectedTexts[0] === textHit.item;
            if (!deferCoarseUndo) pushUndo();
            else coarseTextDragDeferredUndo = true;
            isDrawing = true;
            isDraggingShape = true;
            dragShapeStartPoint = point;
            dragShapeOriginals = [];
            dragGroupChildrenOriginals = null;
            dragTextOriginals = selectedTexts.map((t) => ({ x: t.x, y: t.y }));
            if (propertiesContent) handleToolSelection("select");
          }
        }
      } else {
        if (shift) {
          selectedShapes = [];
          selectedTexts = [];
          selectedWidgets = [];
          if (propertiesContent) handleToolSelection("select");
        } else {
          activeSelectionBox = { start: point, end: point };
          isDrawing = true;
          selectedWidgets = [];
        }
        isDraggingShape = false;
        isDraggingWidget = false;
        dragShapeStartPoint = null;
        dragShapeOriginals = null;
        dragGroupChildrenOriginals = null;
        dragWidgetOriginals = null;
        dragTextOriginals = null;
      }
      updateBoardAppearance();
    }
  }

  function handlePointerMove(evt) {
    if (evt.pointerType === "touch") return; /* tablet: we use touch handlers instead */
    if (!isDrawing) return;
    if (typeof evt.preventDefault === "function") evt.preventDefault();
    if (resizeState && currentTool === "select") {
      const point = getCanvasPoint(evt);
      const { kind } = resizeState;
      if (kind === "shape") {
        const { shape, corner, startBounds } = resizeState;
        if (!shape || !startBounds) return;

        const origStart = startBounds.start;
        const origEnd = startBounds.end;
        const xMin = Math.min(origStart.x, origEnd.x);
        const yMin = Math.min(origStart.y, origEnd.y);
        const xMax = Math.max(origStart.x, origEnd.x);
        const yMax = Math.max(origStart.y, origEnd.y);

        let newStart = { x: origStart.x, y: origStart.y };
        let newEnd = { x: origEnd.x, y: origEnd.y };

        let finalW = Math.abs(origEnd.x - origStart.x);
        let finalH = Math.abs(origEnd.y - origStart.y);

        if (shape.type === "image" && shape.dataUrl) {
          const img = getCachedImage(shape.dataUrl);
          if (img && img.complete && img.width > 0 && img.height > 0) {
            const aspect = img.width / img.height;
            let desiredW, desiredH, fixedX, fixedY;
            if (corner === "br") {
              fixedX = xMin; fixedY = yMin;
              desiredW = point.x - fixedX;
              desiredH = point.y - fixedY;
            } else if (corner === "tl") {
              fixedX = xMax; fixedY = yMax;
              desiredW = fixedX - point.x;
              desiredH = fixedY - point.y;
            } else if (corner === "tr") {
              fixedX = xMin; fixedY = yMax;
              desiredW = point.x - fixedX;
              desiredH = fixedY - point.y;
            } else {
              fixedX = xMax; fixedY = yMin;
              desiredW = fixedX - point.x;
              desiredH = point.y - fixedY;
            }
            desiredW = Math.max(1, desiredW);
            desiredH = Math.max(1, desiredH);
            const byWidth = desiredW / aspect;
            if (byWidth <= desiredH) {
              finalW = desiredW;
              finalH = byWidth;
            } else {
              finalH = desiredH;
              finalW = desiredH * aspect;
            }
            finalW = Math.max(5, finalW);
            finalH = Math.max(5, finalH);
            if (corner === "br") {
              newStart = { x: fixedX, y: fixedY };
              newEnd = { x: fixedX + finalW, y: fixedY + finalH };
            } else if (corner === "tl") {
              newStart = { x: fixedX - finalW, y: fixedY - finalH };
              newEnd = { x: fixedX, y: fixedY };
            } else if (corner === "tr") {
              newStart = { x: fixedX, y: fixedY - finalH };
              newEnd = { x: fixedX + finalW, y: fixedY };
            } else {
              newStart = { x: fixedX - finalW, y: fixedY };
              newEnd = { x: fixedX, y: fixedY + finalH };
            }
          } else {
            if (corner === "tl") { newStart.x = point.x; newStart.y = point.y; } else if (corner === "tr") { newEnd.x = point.x; newStart.y = point.y; } else if (corner === "br") { newEnd.x = point.x; newEnd.y = point.y; } else { newStart.x = point.x; newEnd.y = point.y; }
            finalW = Math.abs(newEnd.x - newStart.x);
            finalH = Math.abs(newEnd.y - newStart.y);
          }
        } else {
          if (corner === "tl") {
            newStart.x = point.x;
            newStart.y = point.y;
          } else if (corner === "tr") {
            newEnd.x = point.x;
            newStart.y = point.y;
          } else if (corner === "br") {
            newEnd.x = point.x;
            newEnd.y = point.y;
          } else if (corner === "bl") {
            newStart.x = point.x;
            newEnd.y = point.y;
          }
        }

        const minSize = 5;
        if (shape.type !== "image" || !shape.dataUrl) {

            shape.start = newStart;
            shape.end = newEnd;
          }
        } else {
          if (finalW >= minSize && finalH >= minSize) {
            shape.start = newStart;
            shape.end = newEnd;
          }
        }

        updateBoardAppearance();
        return;
      } else if (kind === "text") {
        const { text, corner, startBoundsText } = resizeState;
        if (!text || !startBoundsText) return;

        const orig = startBoundsText;
        let newX = orig.x, newY = orig.y, newW = orig.w, newH = orig.h;
        if (corner === "tl") {
          newX = point.x;
          newY = point.y;
          newW = orig.x + orig.w - point.x;
          newH = orig.y + orig.h - point.y;
        } else if (corner === "tr") {
          newY = point.y;
          newW = point.x - orig.x;
          newH = orig.y + orig.h - point.y;
        } else if (corner === "br") {
          newW = point.x - orig.x;
          newH = point.y - orig.y;
        } else if (corner === "bl") {
          newX = point.x;
          newW = orig.x + orig.w - point.x;
          newH = point.y - orig.y;
        }
        const minSize = 20;
        if (newW >= minSize && newH >= minSize) {
          text.x = newX;
          text.y = newY;
          text.w = newW;
          text.h = newH;
        }
        updateBoardAppearance();
        return;

        const { widget, startFontSize, startPoint } = resizeState;
        if (widget) {
          const deltaX = point.x - startPoint.x;

      const dy = point.y - dragShapeStartPoint.y;

          shape.end = { x: orig.end.x + dx, y: orig.end.y + dy };

          if (!selectedTexts.includes(t)) return true;
          if (t.locked) return true;
          return false;
        });
        selectedTexts = selectedTexts.filter((t) => !t.locked);

        page.texts = page.texts.filter((item) => {

          const pad = eraserRadius;
          return !(point.x >= b.x - pad && point.x <= b.x + b.w + pad && point.y >= b.y - pad && point.y <= b.y + b.h + pad);

      }
    }
    updateBoardAppearance();
  }

    boardCanvas.addEventListener("touchmove", onTouchMove, touchOpt);
    boardCanvas.addEventListener("touchend", onTouchEnd, touchOpt);
    boardCanvas.addEventListener("touchcancel", onTouchEnd, touchOpt);
    if (wrapper && wrapper !== boardCanvas) {
      wrapper.addEventListener("touchstart", onTouchStart, touchOpt);
      wrapper.addEventListener("touchmove", onTouchMove, touchOpt);
      wrapper.addEventListener("touchend", onTouchEnd, touchOpt);
      wrapper.addEventListener("touchcancel", onTouchEnd, touchOpt);
    }
  }

  setInterval(() => {
    const page = pages[currentPageIndex];
    if (page && page.widgets && page.widgets.length) updateBoardAppearance();
  }, 1000);

  loadPagesFromStorage().then(() => {
    resizeCanvas();
    setBoardType("white");
    updateZoomLabel();
    handleToolSelection("select");
  });
})();


</script>
  </body>
</html>
