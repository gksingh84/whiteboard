  function getCanvasPoint(evt) {
    const rect = boardCanvas.getBoundingClientRect();
    const scale = window.devicePixelRatio || 1;
    const logicalWidth = boardCanvas.width / scale;
    const logicalHeight = boardCanvas.height / scale;

    const xRatio = (evt.clientX - rect.left) / rect.width;
    const yRatio = (evt.clientY - rect.top) / rect.height;

    return {
      x: (xRatio * logicalWidth) / zoom,
      y: (yRatio * logicalHeight) / zoom,
    };
  }

  function interpolatePoints(p1, p2, maxSegmentLen) {
    const dx = p2.x - p1.x;
    const dy = p2.y - p1.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist <= maxSegmentLen) return [p1, p2];
    const n = Math.max(2, Math.ceil(dist / maxSegmentLen));
    const out = [p1];
    for (let i = 1; i < n; i++) {
      const t = i / n;
      out.push({ x: p1.x + dx * t, y: p1.y + dy * t });
    }
    out.push(p2);
    return out;
  }

  function drawSmoothStrokePath(ctx, points) {
    if (!points || points.length < 2) return;
    ctx.moveTo(points[0].x, points[0].y);
    if (points.length === 2) {
      ctx.lineTo(points[1].x, points[1].y);
      return;
    }
    for (let i = 1; i < points.length - 1; i++) {
      const c = points[i];
      const next = points[i + 1];
      const endX = (c.x + next.x) / 2;
      const endY = (c.y + next.y) / 2;
      ctx.quadraticCurveTo(c.x, c.y, endX, endY);
    }
    ctx.lineTo(points[points.length - 1].x, points[points.length - 1].y);
  }

  function hitTestShape(point) {
    const page = pages[currentPageIndex];
    if (!page || !page.shapes) return null;
    const padding = 8;
    for (let i = page.shapes.length - 1; i >= 0; i--) {
      const shape = page.shapes[i];
      const { start, end } = shape;
      if (!start || !end) continue;
      const x1 = Math.min(start.x, end.x) - padding;
      const y1 = Math.min(start.y, end.y) - padding;
      const x2 = Math.max(start.x, end.x) + padding;
      const y2 = Math.max(start.y, end.y) + padding;
      if (point.x >= x1 && point.x <= x2 && point.y >= y1 && point.y <= y2) {
        return { shape, index: i };
      }
    }
    return null;
  }

  function shapesInBox(box) {
    const page = pages[currentPageIndex];
    if (!page || !page.shapes) return [];
    const { start, end } = box;
    const bx1 = Math.min(start.x, end.x);
    const by1 = Math.min(start.y, end.y);
    const bx2 = Math.max(start.x, end.x);
    const by2 = Math.max(start.y, end.y);
    return page.shapes.filter((shape) => {
      const { start: s, end: e } = shape;
      if (!s || !e) return false;
      const sx1 = Math.min(s.x, e.x);
      const sy1 = Math.min(s.y, e.y);
      const sx2 = Math.max(s.x, e.x);
      const sy2 = Math.max(s.y, e.y);
      return !(sx2 < bx1 || sx1 > bx2 || sy2 < by1 || sy1 > by2);
    });
  }

  function getTextBounds(item) {
    const fs = item.fontSize ?? 24;
    if (item.sticky) {
      const maxW = item.w ?? stickyNotesSettings.maxWidth ?? 220;
      const { width, height } = wrapStickyText(item, maxW);
      return {
        x: item.x,
        y: item.y,
        w: item.w ?? width,
        h: item.h ?? height,
      };
    }
    if (item.w != null && item.h != null) {
      return { x: item.x, y: item.y, w: item.w, h: item.h };
    }
    const w = Math.max(20, (item.text || "").length * fs * 0.6);
    return { x: item.x, y: item.y, w, h: fs };
  }

  function hitTestText(point) {
    const page = pages[currentPageIndex];
    if (!page || !page.texts) return null;
    for (let i = page.texts.length - 1; i >= 0; i--) {
      const item = page.texts[i];
      const b = getTextBounds(item);
      const pad = item.sticky ? 14 : 8;
      if (point.x >= b.x - pad && point.x <= b.x + b.w + pad && point.y >= b.y - pad && point.y <= b.y + b.h + pad) {
        return { item, index: i };
      }
    }
    return null;
  }

  function textsInBox(box) {
    const page = pages[currentPageIndex];
    if (!page || !page.texts) return [];
    const { start, end } = box;
    const bx1 = Math.min(start.x, end.x);
    const by1 = Math.min(start.y, end.y);
    const bx2 = Math.max(start.x, end.x);
    const by2 = Math.max(start.y, end.y);
    return page.texts.filter((item) => {
      const b = getTextBounds(item);
      const pad = item.sticky ? 12 : 0;
      const x1 = b.x - pad, y1 = b.y - pad, x2 = b.x + b.w + pad, y2 = b.y + b.h + pad;
      return !(x2 < bx1 || x1 > bx2 || y2 < by1 || y1 > by2);
    });
  }

  function duplicateSelected() {
    const page = pages[currentPageIndex];
    if (!page) return;
    if (!page.shapes) page.shapes = [];
    if (!page.texts) page.texts = [];
    const hasAny = (selectedShapes && selectedShapes.length) || (selectedTexts && selectedTexts.length);
    if (!hasAny) return;
    pushUndo();
    const newShapes = [];
    const newTexts = [];
    const OFFSET = 20;

    if (selectedShapes.length) {
      const set = new Set(selectedShapes);
      for (const shape of page.shapes) {
        if (!set.has(shape)) continue;
        const clone = JSON.parse(JSON.stringify(shape));
        clone.id = generateId();
        clone.locked = false;
        if (clone.start && clone.end) {
          clone.start = { x: clone.start.x + OFFSET, y: clone.start.y + OFFSET };
          clone.end = { x: clone.end.x + OFFSET, y: clone.end.y + OFFSET };
        }
        if (clone.type === "group" && clone.children) {
          (clone.children.shapes || []).forEach((s) => {
            s.id = generateId();
            if (s.start) { s.start.x += OFFSET; s.start.y += OFFSET; }
            if (s.end) { s.end.x += OFFSET; s.end.y += OFFSET; }
          });
          (clone.children.texts || []).forEach((t) => {
            t.id = generateId();
            t.x = (t.x || 0) + OFFSET;
            t.y = (t.y || 0) + OFFSET;
          });
        }
        newShapes.push(clone);
      }
      page.shapes = page.shapes.concat(newShapes);
      selectedShapes = newShapes;
    }
    if (selectedTexts.length) {
      const setT = new Set(selectedTexts);
      for (const t of page.texts) {
        if (!setT.has(t)) continue;
        const cloneT = JSON.parse(JSON.stringify(t));
        cloneT.id = generateId();
        cloneT.locked = false;
        cloneT.x += OFFSET;
        cloneT.y += OFFSET;
        newTexts.push(cloneT);
      }
      page.texts = page.texts.concat(newTexts);
      selectedTexts = newTexts;
    }
    updateBoardAppearance();
    if (propertiesContent && currentTool === "select") handleToolSelection("select");
  }

  function lockSelected() {
    if (selectedShapes.length === 0 && selectedTexts.length === 0) return;
    pushUndo();
    selectedShapes.forEach((s) => { s.locked = true; });
    selectedTexts.forEach((t) => { t.locked = true; });
    updateBoardAppearance();
    if (propertiesContent && currentTool === "select") handleToolSelection("select");
  }

  function unlockSelected() {
    if (selectedShapes.length === 0 && selectedTexts.length === 0) return;
    pushUndo();
    selectedShapes.forEach((s) => { s.locked = false; delete s.locked; });
    selectedTexts.forEach((t) => { t.locked = false; delete t.locked; });
    updateBoardAppearance();
    if (propertiesContent && currentTool === "select") handleToolSelection("select");
  }

  function groupSelected() {
    const total = (selectedShapes.length || 0) + (selectedTexts.length || 0);
    if (total < 2) return;
    const page = pages[currentPageIndex];
    if (!page) return;
    pushUndo();
    let x1 = Infinity, y1 = Infinity, x2 = -Infinity, y2 = -Infinity;
    selectedShapes.forEach((s) => {
      if (!s.start || !s.end) return;
      x1 = Math.min(x1, s.start.x, s.end.x);
      y1 = Math.min(y1, s.start.y, s.end.y);
      x2 = Math.max(x2, s.start.x, s.end.x);
      y2 = Math.max(y2, s.start.y, s.end.y);
    });
    selectedTexts.forEach((t) => {
      const b = getTextBounds(t);
      x1 = Math.min(x1, b.x);
      y1 = Math.min(y1, b.y);
      x2 = Math.max(x2, b.x + b.w);
      y2 = Math.max(y2, b.y + b.h);
    });
    const pad = 8;
    const group = {
      type: "group",
      id: generateId(),
      start: { x: x1 - pad, y: y1 - pad },
      end: { x: x2 + pad, y: y2 + pad },
      children: {
        shapes: selectedShapes.slice(),
        texts: selectedTexts.slice(),
      },
    };
    if (!page.shapes) page.shapes = [];
    if (!page.texts) page.texts = [];
    page.shapes = page.shapes.filter((s) => !selectedShapes.includes(s));
    page.texts = page.texts.filter((t) => !selectedTexts.includes(t));
    page.shapes.push(group);
    selectedShapes = [group];
    selectedTexts = [];
    updateBoardAppearance();
    if (propertiesContent && currentTool === "select") handleToolSelection("select");
  }

  function ungroupSelected() {
    if (selectedShapes.length !== 1 || selectedTexts.length !== 0) return;
    const group = selectedShapes[0];
    if (!group || group.type !== "group" || !group.children) return;
    const page = pages[currentPageIndex];
    if (!page) return;
    pushUndo();
    const childShapes = group.children.shapes || [];
    const childTexts = group.children.texts || [];
    if (!page.shapes) page.shapes = [];
    if (!page.texts) page.texts = [];
    page.shapes = page.shapes.filter((s) => s !== group);
    page.shapes.push(...childShapes);
    page.texts.push(...childTexts);
    selectedShapes = childShapes.slice();
    selectedTexts = childTexts.slice();
    updateBoardAppearance();
    if (propertiesContent && currentTool === "select") handleToolSelection("select");
  }

  function deleteSelected() {
    if (selectedShapes.length === 0 && selectedTexts.length === 0) return;
    pushUndo();
    const page = pages[currentPageIndex];
    if (page) {
      if (page.shapes) page.shapes = page.shapes.filter((s) => !selectedShapes.includes(s));
      if (page.texts) page.texts = page.texts.filter((t) => !selectedTexts.includes(t));
    }
    selectedShapes = [];
    selectedTexts = [];
    updateBoardAppearance();
    if (propertiesContent && currentTool === "select") handleToolSelection("select");
  }

  function handlePointerDown(evt) {
    if (!boardCanvas) return;
    if (evt.pointerType === "touch") return; /* tablet: we use touch handlers instead */
    evt.preventDefault();
    try { boardCanvas.setPointerCapture(evt.pointerId); } catch (_) {}

    if (currentTool === "pen" || currentTool === "highlighter") {
      pushUndo();
      isDrawing = true;
      const point = getCanvasPoint(evt);
      const settings = currentTool === "pen" ? penSettings : highlighterSettings;
      const color = settings.color;
      const alpha = currentTool === "pen" ? 1 : settings.alpha ?? 0.4;
      const width = settings.width;
      activeStroke = {
        tool: currentTool,
        color,
        alpha,
        width,
        points: [point],
      };
      if (!pages[currentPageIndex]) {
        pages[currentPageIndex] = { strokes: [], shapes: [], texts: [], background: null };
      }
      pages[currentPageIndex].strokes.push(activeStroke);
    } else if (currentTool === "text") {
      evt.preventDefault();
      const point = getCanvasPoint(evt);
      const page = pages[currentPageIndex];
      if (!page) return;
      if (!page.texts) page.texts = [];
      pushUndo();
      showInlineTextInput(point);
    } else if (currentTool === "notes") {
      evt.preventDefault();
      const point = getCanvasPoint(evt);
      const page = pages[currentPageIndex];
      if (!page) return;
      if (!page.texts) page.texts = [];
      pushUndo();
      showInlineTextInput(point, true);
    } else if (currentTool === "eraser") {
      pushUndo();
      isDrawing = true;
      handleEraserMove(evt);
    } else if (currentTool === "shapes") {
      pushUndo();
      isDrawing = true;
      const point = getCanvasPoint(evt);
      activeShape = {
        type: shapeSettings.type,
        color: shapeSettings.color,
        width: shapeSettings.width,
        fillMode: shapeSettings.fillMode,
        start: point,
        end: point,
      };
      updateBoardAppearance();
    } else if (currentTool === "charts") {
      pushUndo();
      isDrawing = true;
      const point = getCanvasPoint(evt);
      const chartType = chartSettings.type || "barChart";
      activeShape = {
        type: chartType,
        color: "#374151",
        width: 2,
        fillMode: "hollow",
        start: point,
        end: point,
        data: getRandomChartData(chartType),
      };
      updateBoardAppearance();
    } else if (currentTool === "select") {
      const point = getCanvasPoint(evt);

      // check controls on the selection (order: unlock, duplicate, delete, lock)
      for (const shape of selectedShapes) {
        const uh = shape._unlockHandle;
        if (uh && point.x >= uh.x && point.x <= uh.x + uh.w && point.y >= uh.y && point.y <= uh.y + uh.h) {
          unlockSelected();
          return;
        }
        const dh = shape._duplicateHandle;
        if (dh && point.x >= dh.x && point.x <= dh.x + dh.w && point.y >= dh.y && point.y <= dh.y + dh.h) {
          duplicateSelected();
          return;
        }
        const delH = shape._deleteHandle;
        if (delH && point.x >= delH.x && point.x <= delH.x + delH.w && point.y >= delH.y && point.y <= delH.y + delH.h) {
          deleteSelected();
          return;
        }
        const lh = shape._lockHandle;
        if (lh && point.x >= lh.x && point.x <= lh.x + lh.w && point.y >= lh.y && point.y <= lh.y + lh.h) {
          lockSelected();
          return;
        }
      }
      for (const textItem of selectedTexts) {
        const uh = textItem._unlockHandle;
        if (uh && point.x >= uh.x && point.x <= uh.x + uh.w && point.y >= uh.y && point.y <= uh.y + uh.h) {
          unlockSelected();
          return;
        }
        const dh = textItem._duplicateHandle;
        if (dh && point.x >= dh.x && point.x <= dh.x + dh.w && point.y >= dh.y && point.y <= dh.y + dh.h) {
          duplicateSelected();
          return;
        }
        const delH = textItem._deleteHandle;
        if (delH && point.x >= delH.x && point.x <= delH.x + delH.w && point.y >= delH.y && point.y <= delH.y + delH.h) {
          deleteSelected();
          return;
        }
        const lh = textItem._lockHandle;
        if (lh && point.x >= lh.x && point.x <= lh.x + lh.w && point.y >= lh.y && point.y <= lh.y + lh.h) {
          lockSelected();
          return;
        }
      }

      // check resize handles first (shapes, then texts)
      const page = pages[currentPageIndex];
      const radius = 12;
      if (page) {
        if (page.shapes && page.shapes.length) {
          for (let i = page.shapes.length - 1; i >= 0; i--) {
            const sh = page.shapes[i];
            if (!sh || sh.locked || sh.type === "group" || !sh._resizeHandles || !Array.isArray(sh._resizeHandles)) continue;
            for (const h of sh._resizeHandles) {
              const dx = point.x - h.x;
              const dy = point.y - h.y;
              if (Math.sqrt(dx * dx + dy * dy) <= radius) {
                pushUndo();
                resizeState = {
                  kind: "shape",
                  shape: sh,
                  corner: h.corner,
                  startBounds: {
                    start: { x: sh.start.x, y: sh.start.y },
                    end: { x: sh.end.x, y: sh.end.y },
                  },
                };
                isDrawing = true;
                isDraggingShape = false;
                dragShapeStartPoint = null;
                dragShapeOriginals = null;
                dragGroupChildrenOriginals = null;
                dragTextOriginals = null;
                return;
              }
            }
          }
        }
        if (page.texts && page.texts.length) {
          for (let i = page.texts.length - 1; i >= 0; i--) {
            const t = page.texts[i];
            if (!t || t.locked || !t._resizeHandles || !Array.isArray(t._resizeHandles)) continue;
            for (const h of t._resizeHandles) {
              const dx = point.x - h.x;
              const dy = point.y - h.y;
              if (Math.sqrt(dx * dx + dy * dy) <= radius) {
                pushUndo();
                const b = getTextBounds(t);
                resizeState = {
                  kind: "text",
                  text: t,
                  corner: h.corner,
                  startBoundsText: { x: b.x, y: b.y, w: b.w, h: b.h },
                };
                isDrawing = true;
                isDraggingShape = false;
                dragShapeStartPoint = null;
                dragShapeOriginals = null;
                dragGroupChildrenOriginals = null;
                dragTextOriginals = null;
                return;
              }
            }
          }
        }
      }

      const shapeHit = hitTestShape(point);
      const textHit = hitTestText(point);
      const shift = evt.shiftKey;

      if (shapeHit) {
        if (shift) {
          const idx = selectedShapes.indexOf(shapeHit.shape);
          if (idx >= 0) {
            selectedShapes = selectedShapes.slice(0, idx).concat(selectedShapes.slice(idx + 1));
          } else {
            selectedShapes = selectedShapes.concat([shapeHit.shape]);
          }
          isDrawing = false;
          isDraggingShape = false;
          dragShapeStartPoint = null;
          dragShapeOriginals = null;
          dragGroupChildrenOriginals = null;
          dragTextOriginals = null;
          if (propertiesContent) handleToolSelection("select");
        } else {
          if (!selectedShapes.includes(shapeHit.shape)) {
            selectedShapes = [shapeHit.shape];
            selectedTexts = [];
          }
          const anyLocked = selectedShapes.some((s) => s.locked) || selectedTexts.some((t) => t.locked);
          if (!anyLocked) {
            pushUndo();
            isDrawing = true;
            isDraggingShape = true;
            dragShapeStartPoint = point;
            dragShapeOriginals = selectedShapes.map((s) => ({
            start: { x: s.start.x, y: s.start.y },
            end: { x: s.end.x, y: s.end.y },
          }));
          dragTextOriginals = selectedTexts.map((t) => ({ x: t.x, y: t.y }));
          dragGroupChildrenOriginals = null;
          if (selectedShapes.length === 1 && selectedShapes[0].type === "group" && selectedShapes[0].children) {
            const g = selectedShapes[0];
            dragGroupChildrenOriginals = {
              shapes: (g.children.shapes || []).map((s) => ({
                start: s.start ? { x: s.start.x, y: s.start.y } : null,
                end: s.end ? { x: s.end.x, y: s.end.y } : null,
              })),
              texts: (g.children.texts || []).map((t) => ({ x: t.x, y: t.y })),
            };
          }
          if (propertiesContent) handleToolSelection("select");
          }
        }
      } else if (textHit) {
        if (shift) {
          const idx = selectedTexts.indexOf(textHit.item);
          if (idx >= 0) {
            selectedTexts = selectedTexts.slice(0, idx).concat(selectedTexts.slice(idx + 1));
          } else {
            selectedTexts = selectedTexts.concat([textHit.item]);
          }
          isDrawing = false;
          isDraggingShape = false;
          dragShapeStartPoint = null;
          dragShapeOriginals = null;
          dragTextOriginals = null;
          if (propertiesContent) handleToolSelection("select");
        } else {
          const isDoubleTap = selectedTexts.length === 1 && selectedTexts[0] === textHit.item &&
            (Date.now() - lastTextTap.time) < 450 && lastTextTap.item === textHit.item;
          lastTextTap = { time: Date.now(), item: textHit.item };
          if (isDoubleTap) {
            openEditTextInput(textHit.item);
            updateBoardAppearance();
            return;
          }
          if (!selectedTexts.includes(textHit.item)) {
            selectedTexts = [textHit.item];
            selectedShapes = [];
          }
          const anyLockedText = selectedShapes.some((s) => s.locked) || selectedTexts.some((t) => t.locked);
          if (!anyLockedText) {
            pushUndo();
            isDrawing = true;
            isDraggingShape = true;
            dragShapeStartPoint = point;
            dragShapeOriginals = [];
            dragGroupChildrenOriginals = null;
            dragTextOriginals = selectedTexts.map((t) => ({ x: t.x, y: t.y }));
            if (propertiesContent) handleToolSelection("select");
          }
        }
      } else {
        if (shift) {
          selectedShapes = [];
          selectedTexts = [];
          if (propertiesContent) handleToolSelection("select");
        } else {
          activeSelectionBox = { start: point, end: point };
          isDrawing = true;
        }
        isDraggingShape = false;
        dragShapeStartPoint = null;
        dragShapeOriginals = null;
        dragGroupChildrenOriginals = null;
        dragTextOriginals = null;
      }
      updateBoardAppearance();
    }
  }

  function handlePointerMove(evt) {
    if (evt.pointerType === "touch") return; /* tablet: we use touch handlers instead */
    if (!isDrawing) return;
    evt.preventDefault();
    if (resizeState && currentTool === "select") {
      const point = getCanvasPoint(evt);
      const { kind } = resizeState;
      if (kind === "shape") {
        const { shape, corner, startBounds } = resizeState;
        if (!shape || !startBounds) return;

        const origStart = startBounds.start;
        const origEnd = startBounds.end;
        let newStart = { x: origStart.x, y: origStart.y };
        let newEnd = { x: origEnd.x, y: origEnd.y };

        if (corner === "tl") {
          newStart.x = point.x;
          newStart.y = point.y;
        } else if (corner === "tr") {
          newEnd.x = point.x;
          newStart.y = point.y;
        } else if (corner === "br") {
          newEnd.x = point.x;
          newEnd.y = point.y;
        } else if (corner === "bl") {
          newStart.x = point.x;
          newEnd.y = point.y;
        }

        const minSize = 5;
        if (Math.abs(newEnd.x - newStart.x) >= minSize && Math.abs(newEnd.y - newStart.y) >= minSize) {
          shape.start = newStart;
          shape.end = newEnd;
        }

        updateBoardAppearance();
        return;
      } else if (kind === "text") {
        const { text, corner, startBoundsText } = resizeState;
        if (!text || !startBoundsText) return;

        const orig = startBoundsText;
        let newX = orig.x, newY = orig.y, newW = orig.w, newH = orig.h;
        if (corner === "tl") {
          newX = point.x;
          newY = point.y;
          newW = orig.x + orig.w - point.x;
          newH = orig.y + orig.h - point.y;
        } else if (corner === "tr") {
          newY = point.y;
          newW = point.x - orig.x;
          newH = orig.y + orig.h - point.y;
        } else if (corner === "br") {
          newW = point.x - orig.x;
          newH = point.y - orig.y;
        } else if (corner === "bl") {
          newX = point.x;
          newW = orig.x + orig.w - point.x;
          newH = point.y - orig.y;
        }
        const minSize = 20;
        if (newW >= minSize && newH >= minSize) {
          text.x = newX;
          text.y = newY;
          text.w = newW;
          text.h = newH;
        }
        updateBoardAppearance();
        return;
      }
    }

    if (currentTool === "pen" || currentTool === "highlighter") {
      if (!activeStroke) return;
      const point = getCanvasPoint(evt);
      const pts = activeStroke.points;
      const last = pts[pts.length - 1];
      if (last) {
        const segs = interpolatePoints(last, point, 8);
        for (let j = 1; j < segs.length; j++) pts.push(segs[j]);
      } else {
        pts.push(point);
      }
      updateBoardAppearance();
    } else if (currentTool === "eraser") {
      handleEraserMove(evt);
    } else if (currentTool === "shapes" || currentTool === "charts") {
      if (!activeShape) return;
      const point = getCanvasPoint(evt);
      activeShape.end = point;
      updateBoardAppearance();
    } else if (currentTool === "select" && isDraggingShape && dragShapeStartPoint && (selectedShapes.length || selectedTexts.length)) {
      const point = getCanvasPoint(evt);
      const dx = point.x - dragShapeStartPoint.x;
      const dy = point.y - dragShapeStartPoint.y;
      if (dragShapeOriginals) {
        selectedShapes.forEach((shape, i) => {
          const orig = dragShapeOriginals[i];
          if (!orig) return;
          shape.start = { x: orig.start.x + dx, y: orig.start.y + dy };
          shape.end = { x: orig.end.x + dx, y: orig.end.y + dy };
          if (shape.type === "group" && shape.children && dragGroupChildrenOriginals) {
            const origShapes = dragGroupChildrenOriginals.shapes || [];
            (shape.children.shapes || []).forEach((s, j) => {
              const o = origShapes[j];
              if (o && o.start) s.start = { x: o.start.x + dx, y: o.start.y + dy };
              if (o && o.end) s.end = { x: o.end.x + dx, y: o.end.y + dy };
            });
            const origTexts = dragGroupChildrenOriginals.texts || [];
            (shape.children.texts || []).forEach((t, j) => {
              const o = origTexts[j];
              if (o) { t.x = o.x + dx; t.y = o.y + dy; }
            });
          }
        });
      }
      if (dragTextOriginals) {
        selectedTexts.forEach((t, i) => {
          const orig = dragTextOriginals[i];
          if (!orig) return;
          t.x = orig.x + dx;
          t.y = orig.y + dy;
        });
      }
      updateBoardAppearance();
    } else if (currentTool === "select" && activeSelectionBox) {
      activeSelectionBox.end = getCanvasPoint(evt);
      updateBoardAppearance();
    }
  }

  function handlePointerUp(evt) {
    if (!boardCanvas) return;
    if (evt.pointerType === "touch") return; /* tablet: we use touch handlers instead */
    try { boardCanvas.releasePointerCapture(evt.pointerId); } catch (_) {}
    if (resizeState && currentTool === "select") {
      resizeState = null;
      isDrawing = false;
      updateBoardAppearance();
      return;
    }
    if ((currentTool === "shapes" || currentTool === "charts") && activeShape) {
      const page = pages[currentPageIndex];
      if (page) {
        if (!page.shapes) page.shapes = [];
        const a = { ...activeShape };
        const dx = a.end.x - a.start.x;
        const dy = a.end.y - a.start.y;
        const len = Math.sqrt(dx * dx + dy * dy);
        if (len >= 10) {
          page.shapes.push(a);
          currentTool = "select";
          selectedShapes = [a];
          selectedTexts = [];
          toolButtons.forEach((btn) => {
            const isActive = btn.getAttribute("data-tool") === "select";
            btn.classList.toggle("tool-button--active", isActive);
          });
          if (propertiesContent) handleToolSelection("select");
        }
      }
      activeShape = null;
    }
    if (currentTool === "select" && activeSelectionBox) {
      selectedShapes = shapesInBox(activeSelectionBox);
      selectedTexts = textsInBox(activeSelectionBox);
      activeSelectionBox = null;
      if (propertiesContent) handleToolSelection("select");
    }
    isDrawing = false;
    isDraggingShape = false;
    dragShapeStartPoint = null;
    dragShapeOriginals = null;
    dragGroupChildrenOriginals = null;
    dragTextOriginals = null;
    activeStroke = null;
    activeShape = null;
    updateBoardAppearance();
  }

  function handleEraserMove(evt) {
    const point = getCanvasPoint(evt);
    const page = pages[currentPageIndex];
    if (!page) return;

    page.strokes = page.strokes.filter((stroke) => {
      return !stroke.points.some((p) => {
        const dx = p.x - point.x;
        const dy = p.y - point.y;
        return Math.sqrt(dx * dx + dy * dy) <= eraserRadius;
      });
    });
    if (page.shapes) {
      const hitSelected = selectedShapes.length && page.shapes.some((shape) => {
        if (!selectedShapes.includes(shape)) return false;
        const { start, end } = shape;
        if (!start || !end) return false;
        const x1 = Math.min(start.x, end.x) - eraserRadius;
        const y1 = Math.min(start.y, end.y) - eraserRadius;
        const x2 = Math.max(start.x, end.x) + eraserRadius;
        const y2 = Math.max(start.y, end.y) + eraserRadius;
        return point.x >= x1 && point.x <= x2 && point.y >= y1 && point.y <= y2;
      });
      if (hitSelected) {
        page.shapes = page.shapes.filter((s) => !selectedShapes.includes(s));
        selectedShapes = [];
      } else {
        page.shapes = page.shapes.filter((shape) => {
          const { start, end } = shape;
          if (!start || !end) return true;
          const x1 = Math.min(start.x, end.x) - eraserRadius;
          const y1 = Math.min(start.y, end.y) - eraserRadius;
          const x2 = Math.max(start.x, end.x) + eraserRadius;
          const y2 = Math.max(start.y, end.y) + eraserRadius;
          return !(
            point.x >= x1 &&
            point.x <= x2 &&
            point.y >= y1 &&
            point.y <= y2
          );
        });
      }
    }
    if (page.texts) {
      const hitSelectedText = selectedTexts.length && page.texts.some((t) => {
        if (!selectedTexts.includes(t)) return false;
        const b = getTextBounds(t);
        const pad = eraserRadius;
        return point.x >= b.x - pad && point.x <= b.x + b.w + pad && point.y >= b.y - pad && point.y <= b.y + b.h + pad;
      });
      if (hitSelectedText) {
        page.texts = page.texts.filter((t) => !selectedTexts.includes(t));
        selectedTexts = [];
      } else {
        page.texts = page.texts.filter((item) => {
          const b = getTextBounds(item);
          const pad = eraserRadius;
          return !(point.x >= b.x - pad && point.x <= b.x + b.w + pad && point.y >= b.y - pad && point.y <= b.y + b.h + pad);
        });
      }
    }
    updateBoardAppearance();
  }

  function ensureImageFileInput() {
    if (imageFileInput) return;
    imageFileInput = document.createElement("input");
    imageFileInput.type = "file";
    imageFileInput.accept = "image/*";
    imageFileInput.style.display = "none";
    document.body.appendChild(imageFileInput);
    imageFileInput.addEventListener("change", () => {
      const file = imageFileInput?.files?.[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        const dataUrl = e.target?.result;
        if (typeof dataUrl !== "string") return;
        const page = pages[currentPageIndex];
        if (!page) return;
        page.background = { dataUrl };
        updateBoardAppearance();
      };
      reader.readAsDataURL(file);
      imageFileInput.value = "";
    });
  }

  function ensureShapeImageFileInput() {
    if (shapeImageFileInput) return;
    shapeImageFileInput = document.createElement("input");
    shapeImageFileInput.type = "file";
    shapeImageFileInput.accept = "image/*";
    shapeImageFileInput.style.display = "none";
    document.body.appendChild(shapeImageFileInput);
    shapeImageFileInput.addEventListener("change", () => {
      const file = shapeImageFileInput?.files?.[0];
      if (!file || !boardCanvas) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        const dataUrl = e.target?.result;
        if (typeof dataUrl !== "string") return;
        const page = pages[currentPageIndex];
        if (!page) return;
        if (!page.shapes) page.shapes = [];
        const scale = window.devicePixelRatio || 1;
        const logicalW = boardCanvas.width / (scale * zoom);
        const logicalH = boardCanvas.height / (scale * zoom);
        const cx = logicalW / 2;
        const cy = logicalH / 2;
        const halfW = 150;
        const halfH = 150;
        const newShape = {
          type: "image",
          color: "#ffffff",
          width: 1,
          fillMode: "solid",
          dataUrl,
          start: { x: cx - halfW, y: cy - halfH },
          end: { x: cx + halfW, y: cy + halfH },
        };
        page.shapes.push(newShape);
        currentTool = "select";
        selectedShapes = [newShape];
        selectedTexts = [];
        toolButtons.forEach((btn) => {
          const isActive = btn.getAttribute("data-tool") === "select";
          btn.classList.toggle("tool-button--active", isActive);
        });
        updateBoardAppearance();
        if (propertiesContent) handleToolSelection("select");
      };
      reader.readAsDataURL(file);
      shapeImageFileInput.value = "";
    });
  }

  if (boardTypeToggle) {
    boardTypeToggle.addEventListener("click", (event) => {
      const target = event.target;
      if (!(target instanceof HTMLElement)) return;
      const type = target.getAttribute("data-board");
      if (!type) return;
      setBoardType(type);
    });
  }

  zoomInButton?.addEventListener("click", () => {
    setZoom(zoom + 0.1);
  });

  zoomOutButton?.addEventListener("click", () => {
    setZoom(zoom - 0.1);
  });

  addPageButton?.addEventListener("click", () => {
    addNewPage();
  });

  document.getElementById("undoButton")?.addEventListener("click", undo);
  document.getElementById("redoButton")?.addEventListener("click", redo);

  (function setupExportDropdown() {
    const dropdown = document.getElementById("exportDropdown");
    const exportBtn = document.getElementById("exportButton");
    const menu = document.getElementById("exportMenu");
    if (!dropdown || !exportBtn || !menu) return;
    exportBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      dropdown.classList.toggle("is-open");
      menu.setAttribute("aria-hidden", dropdown.classList.contains("is-open") ? "false" : "true");
    });
    document.addEventListener("click", () => {
      dropdown.classList.remove("is-open");
      menu.setAttribute("aria-hidden", "true");
    });
    dropdown.addEventListener("click", (e) => e.stopPropagation());
    document.getElementById("exportFullPage")?.addEventListener("click", () => {
      dropdown.classList.remove("is-open");
      exportPageAsPNG();
    });
    document.getElementById("exportCurrentView")?.addEventListener("click", () => {
      dropdown.classList.remove("is-open");
      exportCurrentViewAsPNG();
    });
    document.getElementById("exportSelection")?.addEventListener("click", () => {
      dropdown.classList.remove("is-open");
      exportSelectionAsPNG();
    });
    document.getElementById("exportPDF")?.addEventListener("click", () => {
      dropdown.classList.remove("is-open");
      exportToPDF();
    });
  })();

  zoomResetButton?.addEventListener("click", () => {
    setZoom(1);
  });

  const clearPageConfirmEl = document.getElementById("clearPageConfirm");
  const clearPageCancelBtn = document.getElementById("clearPageCancel");
  const clearPageConfirmBtn = document.getElementById("clearPageConfirmBtn");
  const deletePageButton = document.getElementById("deletePageButton");
  const deletePageConfirmEl = document.getElementById("deletePageConfirm");
  const deletePageCancelBtn = document.getElementById("deletePageCancel");
  const deletePageConfirmBtn = document.getElementById("deletePageConfirmBtn");

  function clearCurrentPage() {
    const page = pages[currentPageIndex];
    if (!page) return;
    pushUndo();
    page.strokes = [];
    page.shapes = [];
    page.texts = [];
    if (page.background && page.background.dataUrl) {
      imageCache.delete(page.background.dataUrl);
    }
    page.background = null;
    selectedShapes = [];
    selectedTexts = [];
    if (clearPageConfirmEl) {
      clearPageConfirmEl.classList.remove("is-visible");
      clearPageConfirmEl.setAttribute("aria-hidden", "true");
    }
    updateBoardAppearance();
    if (currentTool === "select" && propertiesContent) handleToolSelection("select");
  }

  function hideClearConfirm() {
    if (clearPageConfirmEl) {
      clearPageConfirmEl.classList.remove("is-visible");
      clearPageConfirmEl.setAttribute("aria-hidden", "true");
    }
  }

  document.getElementById("clearPageButton")?.addEventListener("click", () => {
    if (clearPageConfirmEl) {
      clearPageConfirmEl.classList.add("is-visible");
      clearPageConfirmEl.setAttribute("aria-hidden", "false");
    }
  });

  clearPageCancelBtn?.addEventListener("click", hideClearConfirm);
  clearPageConfirmBtn?.addEventListener("click", clearCurrentPage);

  deletePageButton?.addEventListener("click", () => {
    if (!deletePageConfirmEl) return;
    if (pages.length <= 1) return;
    deletePageConfirmEl.classList.add("is-visible");
    deletePageConfirmEl.setAttribute("aria-hidden", "false");
  });

  deletePageCancelBtn?.addEventListener("click", () => {
    if (!deletePageConfirmEl) return;
    deletePageConfirmEl.classList.remove("is-visible");
    deletePageConfirmEl.setAttribute("aria-hidden", "true");
  });

  deletePageConfirmBtn?.addEventListener("click", () => {
    if (!deletePageConfirmEl) return;
    deletePage(currentPageIndex);
    deletePageConfirmEl.classList.remove("is-visible");
    deletePageConfirmEl.setAttribute("aria-hidden", "true");
  });

  syncPageStrip();

  pagesStrip?.addEventListener("click", (event) => {
    const target = event.target;
    if (!(target instanceof HTMLElement)) return;
    const thumb = target.closest(".page-thumbnail");
    if (thumb) {
      const idx = Number(thumb.dataset.index);
      if (!Number.isNaN(idx)) selectPage(idx);
    }
  });

  if (toggleLeftPanelButton && leftPanel) {
    toggleLeftPanelButton.addEventListener("click", () => {
      const hidden = leftPanel.classList.toggle("is-hidden");
      toggleLeftPanelButton.textContent = hidden ? "Show tools" : "Toggle tools";
      updateLayoutForPanels();
      resizeCanvas();
      updateBoardAppearance();
    });
  }

  if (toggleRightPanelButton && rightPanel) {
    toggleRightPanelButton.addEventListener("click", () => {
      const hidden = rightPanel.classList.toggle("is-hidden");
      toggleRightPanelButton.textContent = hidden ? "Show options" : "Toggle options";
      updateLayoutForPanels();
      resizeCanvas();
      updateBoardAppearance();
    });
  }

  function isFullScreen() {
    return !!(document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement);
  }
  function enterFullScreen() {
    const el = appRoot || document.documentElement;
    if (el.requestFullscreen) el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    else if (el.mozRequestFullScreen) el.mozRequestFullScreen();
    else if (el.msRequestFullscreen) el.msRequestFullscreen();
  }
  function exitFullScreen() {
    if (document.exitFullscreen) document.exitFullscreen();
    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
    else if (document.mozCancelFullScreen) document.mozCancelFullScreen();
    else if (document.msExitFullscreen) document.msExitFullscreen();
  }
  function updateFullScreenButton() {
    if (!fullScreenButton) return;
    const full = isFullScreen();
    fullScreenButton.textContent = full ? "Exit full screen" : "Full screen";
    fullScreenButton.title = full ? "Exit full screen" : "Enter full screen";
    resizeCanvas();
    updateBoardAppearance();
  }
  if (fullScreenButton && appRoot) {
    fullScreenButton.addEventListener("click", () => {
      if (isFullScreen()) exitFullScreen();
      else enterFullScreen();
    });
    document.addEventListener("fullscreenchange", updateFullScreenButton);
    document.addEventListener("webkitfullscreenchange", updateFullScreenButton);
    document.addEventListener("mozfullscreenchange", updateFullScreenButton);
    document.addEventListener("MSFullscreenChange", updateFullScreenButton);
  }

  toolButtons.forEach((btn) => {
    const tool = btn.getAttribute("data-tool");
    if (tool) {
      const label = btn.textContent.trim();
      if (!btn.hasAttribute("title")) {
        btn.setAttribute("title", label || tool);
      }
    }
    btn.addEventListener("click", () => {
      if (!tool) return;
      handleToolSelection(tool);
    });
  });

  window.addEventListener("resize", () => {
    resizeCanvas();
    updateBoardAppearance();
  });

  document.addEventListener("keydown", (evt) => {
    if ((evt.key === "Delete" || evt.key === "Backspace") && (selectedShapes.length > 0 || selectedTexts.length > 0)) {
      const target = evt.target;
      if (target && (target.tagName === "INPUT" || target.tagName === "TEXTAREA")) return;
      evt.preventDefault();
      deleteSelected();
    }
  });

  function syntheticPointerEvt(touch) {
    return { clientX: touch.clientX, clientY: touch.clientY, pointerId: touch.identifier };
  }
  if (boardCanvas) {
    boardCanvas.addEventListener("pointerdown", handlePointerDown);
    boardCanvas.addEventListener("pointermove", handlePointerMove);
    boardCanvas.addEventListener("pointerup", handlePointerUp);
    boardCanvas.addEventListener("pointercancel", handlePointerUp);
    var touchOpt = { passive: false, capture: true };
    var wrapper = boardCanvas.closest(".canvas-wrapper");
    function isOnCanvasArea(el) {
      return el === boardCanvas || (wrapper && wrapper.contains(el));
    }
    function onTouchStart(e) {
      if (!isOnCanvasArea(e.target)) return;
      e.preventDefault();
      e.stopPropagation();
      if (e.touches.length === 2) {
        // start pinch-zoom
        var t1 = e.touches[0];
        var t2 = e.touches[1];
        var dx = t2.clientX - t1.clientX;
        var dy = t2.clientY - t1.clientY;
        pinchStartDistance = Math.sqrt(dx * dx + dy * dy) || null;
        pinchStartZoom = zoom;
        activeTouchId = null; // disable drawing while pinching
        return;
      }
      if (e.touches.length === 1) {
        pinchStartDistance = null;
        var t = e.touches[0];
        activeTouchId = t.identifier;
        handlePointerDown(syntheticPointerEvt(t));
      }
    }
    function onTouchMove(e) {
      if (!isOnCanvasArea(e.target)) return;
      e.preventDefault();
      e.stopPropagation();
      if (e.touches.length === 2 && pinchStartDistance != null) {
        var t1 = e.touches[0];
        var t2 = e.touches[1];
        var dx = t2.clientX - t1.clientX;
        var dy = t2.clientY - t1.clientY;
        var dist = Math.sqrt(dx * dx + dy * dy);
        if (dist > 0) {
          var factor = dist / pinchStartDistance;
          setZoom(pinchStartZoom * factor);
        }
        return;
      }
      if (activeTouchId == null) return;
      var t = Array.from(e.touches).find(function (x) { return x.identifier === activeTouchId; });
      if (!t) return;
      handlePointerMove(syntheticPointerEvt(t));
    }
    function onTouchEnd(e) {
      if (!isOnCanvasArea(e.target)) return;
      e.preventDefault();
      e.stopPropagation();
      if (e.touches.length < 2) {
        pinchStartDistance = null;
      }
      var t = Array.from(e.changedTouches || []).find(function (x) { return x.identifier === activeTouchId; });
      if (t && activeTouchId != null) {
        handlePointerUp(syntheticPointerEvt(t));
        try { boardCanvas.releasePointerCapture(t.identifier); } catch (_) {}
      }
      if (e.touches.length === 0) {
        activeTouchId = null;
      }
    }
    boardCanvas.addEventListener("touchstart", onTouchStart, touchOpt);
    boardCanvas.addEventListener("touchmove", onTouchMove, touchOpt);
    boardCanvas.addEventListener("touchend", onTouchEnd, touchOpt);
    boardCanvas.addEventListener("touchcancel", onTouchEnd, touchOpt);
    if (wrapper && wrapper !== boardCanvas) {
      wrapper.addEventListener("touchstart", onTouchStart, touchOpt);
      wrapper.addEventListener("touchmove", onTouchMove, touchOpt);
      wrapper.addEventListener("touchend", onTouchEnd, touchOpt);
      wrapper.addEventListener("touchcancel", onTouchEnd, touchOpt);
    }
  }

  resizeCanvas();
  setBoardType("white");
  updateZoomLabel();
  handleToolSelection("select");
})();


</script>
  </body>
</html>
