  function getCachedImage(dataUrl) {
    if (!imageCache.has(dataUrl)) {
      const img = new Image();
      img.src = dataUrl;
      imageCache.set(dataUrl, img);
    }
    return imageCache.get(dataUrl);
  }

  function drawGraphBackground(ctx, w, h) {
    const cx = w / 2;
    const cy = h / 2;
    const minorStep = 20;
    const majorStep = 100;
    ctx.save();
    // minor grid
    ctx.strokeStyle = "rgba(148, 163, 184, 0.35)";
    ctx.lineWidth = 0.5;
    for (let x = cx; x < w; x += minorStep) {
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, h);
      ctx.stroke();
    }
    for (let x = cx - minorStep; x >= 0; x -= minorStep) {
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, h);
      ctx.stroke();
    }
    for (let y = cy; y < h; y += minorStep) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(w, y);
      ctx.stroke();
    }
    for (let y = cy - minorStep; y >= 0; y -= minorStep) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(w, y);
      ctx.stroke();
    }
    // major grid
    ctx.strokeStyle = "rgba(148, 163, 184, 0.8)";
    ctx.lineWidth = 0.9;
    for (let x = cx; x < w; x += majorStep) {
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, h);
      ctx.stroke();
    }
    for (let x = cx - majorStep; x >= 0; x -= majorStep) {
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, h);
      ctx.stroke();
    }
    for (let y = cy; y < h; y += majorStep) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(w, y);
      ctx.stroke();
    }
    for (let y = cy - majorStep; y >= 0; y -= majorStep) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(w, y);
      ctx.stroke();
    }
    // axes
    ctx.strokeStyle = "#111827";
    ctx.lineWidth = 1.4;
    ctx.beginPath();
    ctx.moveTo(cx, 0);
    ctx.lineTo(cx, h);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0, cy);
    ctx.lineTo(w, cy);
    ctx.stroke();
    ctx.restore();
  }

  function drawPageContent(ctx, backgroundColor) {
    const page = pages[currentPageIndex];
    ctx.fillStyle = backgroundColor;
    const w = boardCanvas ? boardCanvas.width / (window.devicePixelRatio || 1) / zoom : 800;
    const h = boardCanvas ? boardCanvas.height / (window.devicePixelRatio || 1) / zoom : 600;
    ctx.fillRect(0, 0, w, h);
    if (!page) return;

    // 1) Special backgrounds, otherwise optional background image
    if (currentTool === "graphs") {
      drawGraphBackground(ctx, w, h);
    } else if (page.background && page.background.dataUrl) {
      const img = getCachedImage(page.background.dataUrl);
      if (img && img.complete) {
        const iw = img.width;
        const ih = img.height;
        if (iw > 0 && ih > 0) {
          const scale = Math.min(w / iw, h / ih);
          const dw = iw * scale;
          const dh = ih * scale;
          const dx = (w - dw) / 2;
          const dy = (h - dh) / 2;
          ctx.drawImage(img, dx, dy, dw, dh);
        }
      }
    }

    // 2) Draw all shapes (including image shapes) and text first
    if (page.shapes) {
      page.shapes.forEach((shape) => drawShape(ctx, shape, false));
    }
    if (page.texts) {
      page.texts.forEach((item) => drawTextItem(ctx, item, false));
    }

    // 3) Draw strokes (pen / highlighter) LAST so they always appear over images and shapes
    page.strokes.forEach((stroke) => {
      const points = stroke.points;
      if (!points || points.length < 2) return;
      ctx.save();
      ctx.globalAlpha = stroke.alpha ?? 1;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.strokeStyle = stroke.color;
      ctx.lineWidth = stroke.width ?? 3;
      ctx.beginPath();
      drawSmoothStrokePath(ctx, points);
      ctx.stroke();
      ctx.restore();
    });
  }

  function getTextFontString(item) {
    const fs = item.fontSize ?? 24;
    const style = item.italic ? "italic " : "";
    const weight = item.bold ? "bold " : "";
    const family = item.fontFamily ?? "Arial";
    return `${style}${weight}${fs}px ${family}`;
  }

  function wrapStickyTextWithCtx(ctx, text, fontSize, maxWidth) {
    const fs = fontSize ?? 24;
    if (!text || !text.trim()) return { lines: [""], width: 20, height: fs };
    const words = text.split(/\s+/);
    const lines = [];
    let current = [];
    let currentW = 0;
    for (let i = 0; i < words.length; i++) {
      const w = ctx.measureText(words[i]).width;
      if (current.length && currentW + (current.length > 1 ? ctx.measureText(" ").width : 0) + w > maxWidth) {
        lines.push(current.join(" "));
        current = [words[i]];
        currentW = w;
      } else {
        if (current.length) currentW += ctx.measureText(" ").width;
        current.push(words[i]);
        currentW += w;
      }
    }
    if (current.length) lines.push(current.join(" "));
    let width = 20;
    for (const line of lines) {
      const lw = ctx.measureText(line).width;
      if (lw > width) width = lw;
    }
    return { lines, width, height: lines.length * fs };
  }

  function wrapStickyText(item, maxWidth) {
    const text = item.text || "";
    const fs = item.fontSize ?? 24;
    if (!text.trim()) return { lines: [""], width: 20, height: fs };
    const approxCharWidth = fs * 0.55;
    const words = text.split(/\s+/);
    const lines = [];
    let current = [];
    let currentW = 0;
    for (let i = 0; i < words.length; i++) {
      const word = words[i];
      const wordW = word.length * approxCharWidth;
      if (current.length && currentW + wordW > maxWidth) {
        lines.push(current.join(" "));
        current = [word];
        currentW = wordW;
      } else {
        current.push(word);
        currentW += (current.length > 1 ? 1 : 0) * approxCharWidth + wordW;
      }
    }
    if (current.length) lines.push(current.join(" "));
    const width = Math.max(20, ...lines.map((l) => l.length * approxCharWidth));
    const height = lines.length * fs;
    return { lines, width, height };
  }

  function drawTextItem(ctx, item, isSelected) {
    if (!item || item.text == null || item.text === "") return;
    ctx.save();
    const fontStr = getTextFontString(item);
    ctx.font = fontStr;
    const fs = item.fontSize ?? 24;
    const pad = 12;
    const defaultMaxW = stickyNotesSettings.maxWidth ?? 220;
    const b = getTextBounds(item);
    const hasExplicitSize = item.w != null && item.h != null && Number(item.w) > 0 && Number(item.h) > 0;
    const shouldWrap = item.sticky || hasExplicitSize;
    const wrapWidth = shouldWrap ? Math.max(20, Number(b.w) || Number(item.w) || defaultMaxW) : 0;
    let wrappedLines = null;
    if (shouldWrap && wrapWidth > 0 && item.text) {
      wrappedLines = wrapStickyTextWithCtx(ctx, String(item.text), fs, wrapWidth);
    }
    if (item.sticky) {
      const x1 = b.x - pad;
      const y1 = b.y - pad;
      const x2 = b.x + b.w + pad;
      const y2 = b.y + b.h + pad;
      const r = 6;
      const foldSize = 18;
      ctx.shadowColor = "rgba(0,0,0,0.2)";
      ctx.shadowBlur = 8;
      ctx.shadowOffsetX = 2;
      ctx.shadowOffsetY = 2;
      ctx.fillStyle = item.stickyColor || stickyNotesSettings.color || "#fef08a";
      ctx.beginPath();
      if (ctx.roundRect) {
        ctx.roundRect(x1, y1, x2 - x1, y2 - y1, r);
      } else {
        ctx.rect(x1, y1, x2 - x1, y2 - y1);
      }
      ctx.fill();
      ctx.shadowColor = "transparent";
      ctx.shadowBlur = 0;
      ctx.shadowOffsetX = 0;
      ctx.shadowOffsetY = 0;
      ctx.fillStyle = "rgba(0,0,0,0.08)";
      ctx.beginPath();
      ctx.moveTo(x2 - foldSize, y1);
      ctx.lineTo(x2, y1);
      ctx.lineTo(x2, y1 + foldSize);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = "rgba(0,0,0,0.1)";
      ctx.lineWidth = 1;
      ctx.stroke();
    }
    ctx.fillStyle = item.color ?? "#0f172a";
    ctx.textBaseline = "top";
    if (wrappedLines && wrappedLines.lines && wrappedLines.lines.length > 0) {
      const boxHeight = hasExplicitSize && item.h > 0 ? item.h : 1e9;
      if (hasExplicitSize && b.w > 0 && b.h > 0) {
        ctx.save();
        ctx.beginPath();
        ctx.rect(b.x, b.y, b.w, b.h);
        ctx.clip();
      }
      for (let i = 0; i < wrappedLines.lines.length; i++) {
        const ly = item.y + i * fs;
        if (ly + fs > item.y + boxHeight) break;
        ctx.fillText(wrappedLines.lines[i], item.x, ly);
      }
      if (hasExplicitSize && b.w > 0 && b.h > 0) ctx.restore();
    } else {
      ctx.fillText(item.text || "", item.x, item.y);
    }
    if (item.underline && !item.sticky) {
      const m = ctx.measureText(item.text);
      const underY = item.y + fs + 2;
      ctx.strokeStyle = item.color ?? "#0f172a";
      ctx.lineWidth = Math.max(1, Math.round(fs / 16));
      ctx.beginPath();
      ctx.moveTo(item.x, underY);
      ctx.lineTo(item.x + m.width, underY);
      ctx.stroke();
    }
    if (isSelected) {
      const selPad = item.sticky ? 12 : 4;
      const boxX = b.x - selPad;
      const boxY = b.y - selPad;
      const boxW = b.w + selPad * 2;
      const boxH = b.h + selPad * 2;

      // selection rectangle
      ctx.strokeStyle = item.locked ? "#6b7280" : "#eab308";
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 3]);
      ctx.strokeRect(boxX, boxY, boxW, boxH);

      if (item.locked) {
        item._resizeHandles = undefined;
        item._duplicateHandle = undefined;
        item._deleteHandle = undefined;
        item._lockHandle = undefined;
        const btnH = 18;
        const plusPad = 4;
        const plusSize = 14;
        const plusX = boxX + boxW + plusPad;
        const btnX = plusX - 14 - 6 - 14 - 6 - 44;
        const btnY = boxY - btnH - 4;
        const btnW = 50;
        ctx.setLineDash([]);
        ctx.fillStyle = "#6b7280";
        ctx.strokeStyle = "#4b5563";
        ctx.lineWidth = 1;
        ctx.beginPath();
        if (ctx.roundRect) ctx.roundRect(btnX, btnY, btnW, btnH, 6);
        else ctx.rect(btnX, btnY, btnW, btnH);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = "#e5e7eb";
        ctx.font = "10px Arial";
        ctx.textBaseline = "middle";
        ctx.fillText("Unlock", btnX + 18, btnY + btnH / 2);
        ctx.strokeStyle = "#e5e7eb";
        ctx.lineWidth = 1.2;
        const cxLock = btnX + 10;
        const cyLock = btnY + btnH / 2;
        ctx.beginPath();
        ctx.arc(cxLock + 1.5, cyLock - 1.5, 2.5, Math.PI * 0.2, Math.PI * 1.2);
        ctx.stroke();
        ctx.beginPath();
        if (ctx.roundRect) ctx.roundRect(btnX + 2.5, cyLock + 0.5, 5, 3.5, 1);
        else ctx.rect(btnX + 2.5, cyLock + 0.5, 5, 3.5);
        ctx.stroke();
        item._unlockHandle = { x: btnX, y: btnY, w: btnW, h: btnH };
      } else {
        const handles = [
          { corner: "tl", x: boxX, y: boxY },
          { corner: "tr", x: boxX + boxW, y: boxY },
          { corner: "br", x: boxX + boxW, y: boxY + boxH },
          { corner: "bl", x: boxX, y: boxY + boxH },
        ];
        ctx.setLineDash([]);
        ctx.fillStyle = "#eab308";
        const s = 8;
        handles.forEach((h) => {
          ctx.fillRect(h.x - s / 2, h.y - s / 2, s, s);
        });
        item._resizeHandles = handles;

        const plusSize = 14;
        const plusPad = 4;
        const plusX = boxX + boxW + plusPad;
        const plusY = boxY - plusSize - plusPad;
        ctx.fillStyle = "#22c55e";
        ctx.strokeStyle = "#14532d";
        ctx.lineWidth = 1;
        ctx.setLineDash([]);
        ctx.beginPath();
        if (ctx.roundRect) ctx.roundRect(plusX, plusY, plusSize, plusSize, 4);
        else ctx.rect(plusX, plusY, plusSize, plusSize);
        ctx.fill();
        ctx.stroke();
        ctx.beginPath();
        ctx.strokeStyle = "#022c22";
        ctx.lineWidth = 2;
        const cxPlus = plusX + plusSize / 2;
        const cyPlus = plusY + plusSize / 2;
        const arm = plusSize * 0.3;
        ctx.moveTo(cxPlus - arm, cyPlus);
        ctx.lineTo(cxPlus + arm, cyPlus);
        ctx.moveTo(cxPlus, cyPlus - arm);
        ctx.lineTo(cxPlus, cyPlus + arm);
        ctx.stroke();
        item._duplicateHandle = { x: plusX, y: plusY, w: plusSize, h: plusSize };

        const delSize = 14;
        const delPad = 6;
        const delX = plusX - delSize - delPad;
        const delY = plusY;
        ctx.fillStyle = "#dc2626";
        ctx.strokeStyle = "#7f1d1d";
        ctx.lineWidth = 1;
        ctx.beginPath();
        if (ctx.roundRect) ctx.roundRect(delX, delY, delSize, delSize, 4);
        else ctx.rect(delX, delY, delSize, delSize);
        ctx.fill();
        ctx.stroke();
        ctx.beginPath();
        ctx.strokeStyle = "#fef2f2";
        ctx.lineWidth = 2;
        const cxDel = delX + delSize / 2;
        const cyDel = delY + delSize / 2;
        const armDel = delSize * 0.35;
        ctx.moveTo(cxDel - armDel, cyDel - armDel);
        ctx.lineTo(cxDel + armDel, cyDel + armDel);
        ctx.moveTo(cxDel - armDel, cyDel + armDel);
        ctx.lineTo(cxDel + armDel, cyDel - armDel);
        ctx.stroke();
        item._deleteHandle = { x: delX, y: delY, w: delSize, h: delSize };

        const lockSize = 14;
        const lockPad = 6;
        const lockX = delX - lockSize - lockPad;
        const lockY = delY;
        ctx.fillStyle = "#4b5563";
        ctx.strokeStyle = "#374151";
        ctx.lineWidth = 1;
        ctx.beginPath();
        if (ctx.roundRect) ctx.roundRect(lockX, lockY, lockSize, lockSize, 4);
        else ctx.rect(lockX, lockY, lockSize, lockSize);
        ctx.fill();
        ctx.stroke();
        ctx.strokeStyle = "#e5e7eb";
        ctx.lineWidth = 1.5;
        const cxLock = lockX + lockSize / 2;
        const cyLock = lockY + lockSize / 2;
        ctx.beginPath();
        ctx.arc(cxLock, cyLock - 1.5, 3, Math.PI * 0.5, Math.PI * 1.5);
        ctx.stroke();
        ctx.beginPath();
        if (ctx.roundRect) ctx.roundRect(lockX + 3.5, cyLock + 1, 7, 4.5, 1);
        else ctx.rect(lockX + 3.5, cyLock + 1, 7, 4.5);
        ctx.stroke();
        item._lockHandle = { x: lockX, y: lockY, w: lockSize, h: lockSize };
      }
    }
    ctx.restore();
  }

  function exportPageAsPNG() {
    const scale = window.devicePixelRatio || 1;
    const logicalW = boardCanvas ? boardCanvas.width / (scale * zoom) : 800;
    const logicalH = boardCanvas ? boardCanvas.height / (scale * zoom) : 600;
    const exportScale = 2;
    const canvas = document.createElement("canvas");
    canvas.width = logicalW * exportScale;
    canvas.height = logicalH * exportScale;
    const ctx = canvas.getContext("2d");
    if (!ctx) return;
    ctx.scale(exportScale, exportScale);
    drawPageContent(ctx, getBoardBackgroundColor());
    const dataUrl = canvas.toDataURL("image/png");
    const a = document.createElement("a");
    a.href = dataUrl;
    a.download = `Gauravs-Board-page-${currentPageIndex + 1}.png`;
    a.click();
  }

  /** Draw a specific page to ctx (for export). w,h in logical units. No connectors. */
  function drawPageContentForExport(ctx, pageIndex, w, h, backgroundColor) {
    const page = pages[pageIndex];
    ctx.fillStyle = backgroundColor;
    ctx.fillRect(0, 0, w, h);
    if (!page) return;
    if (page.background && page.background.dataUrl) {
      const img = getCachedImage(page.background.dataUrl);
      if (img && img.complete) {
        const iw = img.width;
        const ih = img.height;
        if (iw > 0 && ih > 0) {
          const scale = Math.min(w / iw, h / ih);
          const dw = iw * scale;
          const dh = ih * scale;
          const dx = (w - dw) / 2;
          const dy = (h - dh) / 2;
          ctx.drawImage(img, dx, dy, dw, dh);
        }
      }
    }
    if (page.shapes) {
      page.shapes.forEach((shape) => drawShape(ctx, shape, false));
    }
    if (page.texts) {
      page.texts.forEach((item) => drawTextItem(ctx, item, false));
    }
    (page.strokes || []).forEach((stroke) => {
      const points = stroke.points;
      if (!points || points.length < 2) return;
      ctx.save();
      ctx.globalAlpha = stroke.alpha ?? 1;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.strokeStyle = stroke.color;
      ctx.lineWidth = stroke.width ?? 3;
      ctx.beginPath();
      drawSmoothStrokePath(ctx, points);
      ctx.stroke();
      ctx.restore();
    });
  }

  function getSelectionBounds() {
    let x1 = Infinity, y1 = Infinity, x2 = -Infinity, y2 = -Infinity;
    const page = pages[currentPageIndex];
    if (!page) return null;
    selectedShapes.forEach((shape) => {
      if (!shape.start || !shape.end) return;
      const sx1 = Math.min(shape.start.x, shape.end.x);
      const sy1 = Math.min(shape.start.y, shape.end.y);
      const sx2 = Math.max(shape.start.x, shape.end.x);
      const sy2 = Math.max(shape.start.y, shape.end.y);
      x1 = Math.min(x1, sx1);
      y1 = Math.min(y1, sy1);
      x2 = Math.max(x2, sx2);
      y2 = Math.max(y2, sy2);
    });
    selectedTexts.forEach((item) => {
      const b = getTextBounds(item);
      x1 = Math.min(x1, b.x);
      y1 = Math.min(y1, b.y);
      x2 = Math.max(x2, b.x + b.w);
      y2 = Math.max(y2, b.y + b.h);
    });
    if (x1 === Infinity || y1 === Infinity) return null;
    return { x: x1, y: y1, w: x2 - x1, h: y2 - y1 };
  }

  function exportCurrentViewAsPNG() {
    const container = boardCanvas.closest(".canvas-container");
    const scale = window.devicePixelRatio || 1;
    const logicalW = boardCanvas ? boardCanvas.width / (scale * zoom) : 800;
    const logicalH = boardCanvas ? boardCanvas.height / (scale * zoom) : 600;
    const scrollTop = container ? container.scrollTop : 0;
    const viewHeight = container ? container.clientHeight : 600;
    const viewWidth = container ? container.clientWidth : logicalW;
    const logicalViewY = scrollTop / zoom;
    const logicalViewH = viewHeight / zoom;
    const logicalViewW = Math.min(logicalW, viewWidth / zoom);
    const exportScale = 2;
    const fullCanvas = document.createElement("canvas");
    fullCanvas.width = logicalW * exportScale;
    fullCanvas.height = logicalH * exportScale;
    const fullCtx = fullCanvas.getContext("2d");
    if (!fullCtx) return;
    fullCtx.scale(exportScale, exportScale);
    drawPageContent(fullCtx, getBoardBackgroundColor());
    const outCanvas = document.createElement("canvas");
    outCanvas.width = logicalViewW * exportScale;
    outCanvas.height = logicalViewH * exportScale;
    const outCtx = outCanvas.getContext("2d");
    if (!outCtx) return;
    outCtx.drawImage(
      fullCanvas,
      0, logicalViewY * exportScale, logicalViewW * exportScale, logicalViewH * exportScale,
      0, 0, outCanvas.width, outCanvas.height
    );
    const dataUrl = outCanvas.toDataURL("image/png");
    const a = document.createElement("a");
    a.href = dataUrl;
    a.download = `Gauravs-Board-view-page-${currentPageIndex + 1}.png`;
    a.click();
  }

  function exportSelectionAsPNG() {
    const bounds = getSelectionBounds();
    if (!bounds || (selectedShapes.length === 0 && selectedTexts.length === 0)) {
      alert("Select one or more shapes or text items first.");
      return;
    }
    const pad = 16;
    const exportScale = 2;
    const w = (bounds.w + pad * 2) * exportScale;
    const h = (bounds.h + pad * 2) * exportScale;
    const canvas = document.createElement("canvas");
    canvas.width = w;
    canvas.height = h;
    const ctx = canvas.getContext("2d");
    if (!ctx) return;
    ctx.scale(exportScale, exportScale);
    ctx.translate(pad - bounds.x, pad - bounds.y);
    ctx.fillStyle = getBoardBackgroundColor();
    ctx.fillRect(bounds.x, bounds.y, bounds.w, bounds.h);
    selectedShapes.forEach((shape) => drawShape(ctx, shape, false));
    selectedTexts.forEach((item) => drawTextItem(ctx, item, false));
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    const dataUrl = canvas.toDataURL("image/png");
    const a = document.createElement("a");
    a.href = dataUrl;
    a.download = `Gauravs-Board-selection.png`;
    a.click();
  }

  function exportToPDF() {
    if (typeof jspdf !== "undefined" && jspdf.jsPDF) {
      doExportToPDF();
      return;
    }
    const script = document.createElement("script");
    script.src = "https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";
    script.onload = () => {
      doExportToPDF();
    };
    script.onerror = () => {
      alert("Could not load PDF library. Check your internet connection.");
    };
    document.head.appendChild(script);
  }

  function doExportToPDF() {
    const scale = window.devicePixelRatio || 1;
    const logicalW = boardCanvas ? boardCanvas.width / (scale * zoom) : 800;
    const logicalH = boardCanvas ? boardCanvas.height / (scale * zoom) : 600;
    const exportScale = 2;
    const orientation = logicalW > logicalH ? "landscape" : "portrait";
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({
      orientation,
      unit: "pt",
      format: "a4",
    });
    const pdfW = pdf.internal.pageSize.getWidth();
    const pdfH = pdf.internal.pageSize.getHeight();
    const scaleToFit = Math.min(pdfW / logicalW, pdfH / logicalH);
    const drawW = logicalW * scaleToFit;
    const drawH = logicalH * scaleToFit;
    const offsetX = (pdfW - drawW) / 2;
    const offsetY = (pdfH - drawH) / 2;
    const tempCanvas = document.createElement("canvas");
    tempCanvas.width = logicalW * exportScale;
    tempCanvas.height = logicalH * exportScale;
    const tempCtx = tempCanvas.getContext("2d");
    if (!tempCtx) return;
    for (let i = 0; i < pages.length; i++) {
      if (i > 0) pdf.addPage("a4", orientation);
      tempCtx.setTransform(1, 0, 0, 1, 0, 0);
      tempCtx.scale(exportScale, exportScale);
      const bg = getBoardBackgroundColor();
      drawPageContentForExport(tempCtx, i, logicalW, logicalH, bg);
      const imgData = tempCanvas.toDataURL("image/png");
      pdf.addImage(imgData, "PNG", offsetX, offsetY, drawW, drawH);
    }
    pdf.save("Gauravs-Board.pdf");
  }

  function drawAllStrokes(ctx) {
    const page = pages[currentPageIndex];
    if (!page) return;

    page.strokes.forEach((stroke) => {
      const points = stroke.points;
      if (!points || points.length < 2) return;

      ctx.save();
      ctx.globalAlpha = stroke.alpha ?? 1;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.strokeStyle = stroke.color;
      ctx.lineWidth = stroke.width ?? 3;

      ctx.beginPath();
      drawSmoothStrokePath(ctx, points);
      ctx.stroke();
      ctx.restore();
    });

    if (page.shapes && page.shapes.length) {
      page.shapes.forEach((shape) => {
        drawShape(ctx, shape, false);
      });
    }

    if (page.texts && page.texts.length) {
      page.texts.forEach((item) => {
        drawTextItem(ctx, item, selectedTexts.includes(item));
      });
    }

    if (activeShape) {
      drawShape(ctx, activeShape, true);
    }

    if (activeSelectionBox) {
      const { start, end } = activeSelectionBox;
      const x = Math.min(start.x, end.x);
      const y = Math.min(start.y, end.y);
      const w = Math.abs(end.x - start.x);
      const h = Math.abs(end.y - start.y);
      ctx.save();
      ctx.setLineDash([6, 4]);
      ctx.strokeStyle = "#38bdf8";
      ctx.lineWidth = 2;
      ctx.strokeRect(x, y, w, h);
      ctx.restore();
    }
  }

  function drawShape(ctx, shape, isPreview) {
    const { start, end } = shape;
    if (!start || !end) return;

    const type = shape.type;
    if (type === "group") {
      if (shape.children) {
        (shape.children.shapes || []).forEach((s) => drawShape(ctx, s, false));
        (shape.children.texts || []).forEach((t) => drawTextItem(ctx, t, false));
      }
      return;
    }

    ctx.save();
    if (isPreview) {
      ctx.setLineDash([6, 4]);
    }
    ctx.globalAlpha = 1;
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ctx.strokeStyle = shape.color;
    ctx.lineWidth = shape.width ?? 2;
    ctx.fillStyle = shape.fillMode === "solid" ? shape.color : "transparent";
    ctx.beginPath();

    const x1 = Math.min(start.x, end.x);
    const y1 = Math.min(start.y, end.y);
    const x2 = Math.max(start.x, end.x);
    const y2 = Math.max(start.y, end.y);
    const cx = (x1 + x2) / 2;
    const cy = (y1 + y2) / 2;
    const w = x2 - x1 || 1;
    const h = y2 - y1 || 1;
    const r = Math.min(w, h) / 2;

    if (type === "line" || type === "ray") {
      ctx.moveTo(start.x, start.y);
      ctx.lineTo(end.x, end.y);
      ctx.stroke();

      if (type === "ray") {
        const dx = end.x - start.x;
        const dy = end.y - start.y;
        const len = Math.sqrt(dx * dx + dy * dy) || 1;
        const ux = dx / len;
        const uy = dy / len;
        const headLength = 10 + (shape.width ?? 2) * 1.5;
        const hx = end.x - ux * headLength;
        const hy = end.y - uy * headLength;
        ctx.beginPath();
        ctx.moveTo(end.x, end.y);
        ctx.lineTo(hx - uy * (headLength / 2), hy + ux * (headLength / 2));
        ctx.moveTo(end.x, end.y);
        ctx.lineTo(hx + uy * (headLength / 2), hy - ux * (headLength / 2));
        ctx.stroke();
      }
    } else if (type === "rectangle") {
      ctx.rect(x1, y1, w, h);
      if (shape.fillMode === "solid") ctx.fill();
      ctx.stroke();
    } else if (type === "circle") {
      const dx = end.x - start.x;
      const dy = end.y - start.y;
      const rad = Math.sqrt(dx * dx + dy * dy);
      ctx.arc(start.x, start.y, rad, 0, Math.PI * 2);
      if (shape.fillMode === "solid") ctx.fill();
      ctx.stroke();
    } else if (type === "triangle") {
      const midX = (x1 + x2) / 2;
      ctx.moveTo(midX, y1);
      ctx.lineTo(x1, y2);
      ctx.lineTo(x2, y2);
      ctx.closePath();
      if (shape.fillMode === "solid") ctx.fill();
      ctx.stroke();
    } else if (type === "rhombus" || type === "diamond") {
      ctx.moveTo(cx, y1);
      ctx.lineTo(x2, cy);
      ctx.lineTo(cx, y2);
      ctx.lineTo(x1, cy);
      ctx.closePath();
      if (shape.fillMode === "solid") ctx.fill();
      ctx.stroke();
    } else if (type === "parallelogram") {
      const skew = w * 0.25;
      ctx.moveTo(x1 + skew, y1);
      ctx.lineTo(x2 + skew, y1);
      ctx.lineTo(x2 - skew, y2);
      ctx.lineTo(x1 - skew, y2);
      ctx.closePath();
      if (shape.fillMode === "solid") ctx.fill();
      ctx.stroke();
    } else if (type === "trapezium") {
      const topInset = w * 0.2;
      const topLeft = x1 + topInset;
      const topRight = x2 - topInset;
      ctx.moveTo(topLeft, y1);
      ctx.lineTo(topRight, y1);
      ctx.lineTo(x2, y2);
      ctx.lineTo(x1, y2);
      ctx.closePath();
      if (shape.fillMode === "solid") ctx.fill();
      ctx.stroke();
    } else if (type === "pentagon") {
      for (let k = 0; k < 5; k++) {
        const angle = -Math.PI / 2 + (2 * Math.PI * k) / 5;
        const px = cx + r * Math.cos(angle);
        const py = cy + r * Math.sin(angle);
        if (k === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath();
      if (shape.fillMode === "solid") ctx.fill();
      ctx.stroke();
    } else if (type === "hexagon") {
      for (let k = 0; k < 6; k++) {
        const angle = (Math.PI / 2) - (2 * Math.PI * k) / 6;
        const px = cx + r * Math.cos(angle);
        const py = cy + r * Math.sin(angle);
        if (k === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath();
      if (shape.fillMode === "solid") ctx.fill();
      ctx.stroke();
    } else if (type === "star") {
      const innerR = r * 0.4;
      for (let k = 0; k < 10; k++) {
        const angle = -Math.PI / 2 + (Math.PI * k) / 5;
        const rad = k % 2 === 0 ? r : innerR;
        const px = cx + rad * Math.cos(angle);
        const py = cy + rad * Math.sin(angle);
        if (k === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath();
      if (shape.fillMode === "solid") ctx.fill();
      ctx.stroke();
    } else if (type === "cube" || type === "cuboid") {
      const depth = Math.min(w, h) * 0.35;
      const dx = depth;
      const dy = -depth * 0.6;

      // fill front face
      if (shape.fillMode === "solid") {
        ctx.beginPath();
        ctx.rect(x1, y1, w, h);
        ctx.fill();
      }

      // outline front face
      ctx.beginPath();
      ctx.rect(x1, y1, w, h);
      ctx.stroke();

      // back face
      ctx.beginPath();
      ctx.moveTo(x1 + dx, y1 + dy);
      ctx.lineTo(x2 + dx, y1 + dy);
      ctx.lineTo(x2 + dx, y2 + dy);
      ctx.lineTo(x1 + dx, y2 + dy);
      ctx.closePath();
      ctx.stroke();

      // connectors
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x1 + dx, y1 + dy);
      ctx.moveTo(x2, y1);
      ctx.lineTo(x2 + dx, y1 + dy);
      ctx.moveTo(x2, y2);
      ctx.lineTo(x2 + dx, y2 + dy);
      ctx.moveTo(x1, y2);
      ctx.lineTo(x1 + dx, y2 + dy);
      ctx.stroke();
    } else if (type === "cylinder") {
      const rx = w / 2;
      const ry = Math.max(4, h * 0.15);
      const topY = y1 + ry;
      const bottomY = y2 - ry;
      ctx.save();
      // body fill
      if (shape.fillMode === "solid") {
        ctx.beginPath();
        ctx.rect(x1, topY, w, bottomY - topY);
        ctx.fill();
      }
      // top ellipse (full)
      ctx.beginPath();
      ctx.ellipse(cx, topY, rx, ry, 0, 0, Math.PI * 2);
      ctx.stroke();
      // sides
      ctx.beginPath();
      ctx.moveTo(x1, topY);
      ctx.lineTo(x1, bottomY);
      ctx.moveTo(x2, topY);
      ctx.lineTo(x2, bottomY);
      ctx.stroke();
      // bottom ellipse: full visible circle for clearer 3D look
      ctx.setLineDash([]);
      ctx.beginPath();
      ctx.ellipse(cx, bottomY, rx, ry, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    } else if (type === "cone") {
      const rx = w / 2;
      const ry = Math.max(4, w * 0.25);
      const baseY = y2;
      // fill body using triangle (apex to base)
      if (shape.fillMode === "solid") {
        ctx.beginPath();
        ctx.moveTo(cx, y1);
        ctx.lineTo(x1, baseY);
        ctx.lineTo(x2, baseY);
        ctx.closePath();
        ctx.fill();
      }
      // outline only the two slant edges (no straight bottom line)
      ctx.beginPath();
      ctx.moveTo(cx, y1);
      ctx.lineTo(x1, baseY);
      ctx.moveTo(cx, y1);
      ctx.lineTo(x2, baseY);
      ctx.stroke();
      // base ellipse centred on base line
      ctx.setLineDash([]);
      ctx.beginPath();
      ctx.ellipse(cx, baseY, rx, ry, 0, 0, Math.PI * 2);
      ctx.stroke();
    } else if (type === "sphere") {
      const rad = Math.min(w, h) / 2;
      ctx.beginPath();
      ctx.arc(cx, cy, rad, 0, Math.PI * 2);
      if (shape.fillMode === "solid") ctx.fill();
      ctx.stroke();
      ctx.beginPath();
      ctx.ellipse(cx, cy, rad, rad * 0.45, 0, 0, Math.PI * 2);
      ctx.stroke();
    } else if (type === "pie3d") {
      const rad = Math.min(w, h) / 2;
      const sliceAngle = Math.PI * 0.6; // 108Â°
      const startAngle = -Math.PI / 2;
      const endAngle = startAngle + sliceAngle;
      // outer circle
      ctx.beginPath();
      ctx.arc(cx, cy, rad, 0, Math.PI * 2);
      ctx.stroke();
      // slice
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, rad, startAngle, endAngle);
      ctx.closePath();
      if (shape.fillMode === "solid") ctx.fill();
      ctx.stroke();
    } else if (type === "barChart") {
      const data = shape.data || [40, 65, 50, 80, 55];
      const padL = 40;
      const padR = 20;
      const padT = 25;
      const padB = 35;
      const chartW = w - padL - padR;
      const chartH = h - padT - padB;
      if (chartW <= 0 || chartH <= 0) { ctx.restore(); return; }
      const maxVal = Math.max(...data, 1);
      const n = data.length;
      const barW = Math.max(8, (chartW / n) * 0.6);
      const gap = (chartW - n * barW) / (n + 1);
      ctx.save();
      ctx.strokeStyle = shape.color || "#374151";
      ctx.fillStyle = shape.color || "#374151";
      ctx.lineWidth = 1;
      ctx.strokeRect(x1 + padL, y1 + padT, chartW, chartH);
      const barColors = ["#2563eb", "#16a34a", "#eab308", "#ea580c", "#7c3aed"];
      for (let i = 0; i < n; i++) {
        const barH = (data[i] / maxVal) * chartH;
        const bx = x1 + padL + gap + i * (barW + gap);
        const by = y1 + padT + chartH - barH;
        ctx.fillStyle = barColors[i % barColors.length];
        ctx.fillRect(bx, by, barW, barH);
        ctx.strokeStyle = "#1e293b";
        ctx.strokeRect(bx, by, barW, barH);
      }
      ctx.restore();
    } else if (type === "pieChart") {
      const data = shape.data || [30, 25, 20, 15, 10];
      const total = data.reduce((s, v) => s + v, 0) || 1;
      const rad = Math.min(w, h) / 2 - 10;
      if (rad <= 0) { ctx.restore(); return; }
      const sliceColors = ["#2563eb", "#16a34a", "#eab308", "#ea580c", "#7c3aed"];
      let startA = -Math.PI / 2;
      ctx.save();
      for (let i = 0; i < data.length; i++) {
        const sweep = (data[i] / total) * Math.PI * 2;
        const endA = startA + sweep;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, rad, startA, endA);
        ctx.closePath();
        ctx.fillStyle = sliceColors[i % sliceColors.length];
        ctx.fill();
        ctx.strokeStyle = "#1e293b";
        ctx.lineWidth = 1;
        ctx.stroke();
        startA = endA;
      }
      ctx.restore();
    } else if (type === "horizontalBarChart") {
      const data = shape.data || [40, 65, 50, 80, 55];
      const padL = 25;
      const padR = 20;
      const padT = 25;
      const padB = 40;
      const chartW = w - padL - padR;
      const chartH = h - padT - padB;
      if (chartW <= 0 || chartH <= 0) { ctx.restore(); return; }
      const maxVal = Math.max(...data, 1);
      const n = data.length;
      const barH = Math.max(6, (chartH / n) * 0.6);
      const gap = (chartH - n * barH) / (n + 1);
      ctx.save();
      ctx.strokeStyle = shape.color || "#374151";
      ctx.strokeRect(x1 + padL, y1 + padT, chartW, chartH);
      const barColors = ["#2563eb", "#16a34a", "#eab308", "#ea580c", "#7c3aed"];
      for (let i = 0; i < n; i++) {
        const barW = (data[i] / maxVal) * chartW;
        const bx = x1 + padL;
        const by = y1 + padT + gap + i * (barH + gap);
        ctx.fillStyle = barColors[i % barColors.length];
        ctx.fillRect(bx, by, barW, barH);
        ctx.strokeStyle = "#1e293b";
        ctx.strokeRect(bx, by, barW, barH);
      }
      ctx.restore();
    } else if (type === "pictograph") {
      const data = shape.data || [3, 5, 2, 4, 3];
      const padL = 30;
      const padR = 20;
      const padT = 20;
      const padB = 25;
      const chartW = w - padL - padR;
      const chartH = h - padT - padB;
      if (chartW <= 0 || chartH <= 0) { ctx.restore(); return; }
      const n = data.length;
      const rowH = chartH / n;
      const maxCount = Math.max(...data, 1);
      const symbolColors = ["#2563eb", "#16a34a", "#eab308", "#ea580c", "#7c3aed"];
      ctx.save();
      ctx.strokeStyle = shape.color || "#374151";
      ctx.strokeRect(x1 + padL, y1 + padT, chartW, chartH);
      for (let i = 0; i < n; i++) {
        const count = data[i];
        const cellW = (chartW - 8) / Math.max(maxCount, count);
        const symSize = Math.min(cellW * 0.75, rowH * 0.5, 14);
        const sy = y1 + padT + (i + 0.5) * rowH;
        ctx.fillStyle = symbolColors[i % symbolColors.length];
        for (let j = 0; j < count; j++) {
          const sx = x1 + padL + 4 + j * cellW + (cellW - symSize) / 2;
          ctx.beginPath();
          ctx.arc(sx + symSize / 2, sy, symSize / 2, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = "#1e293b";
          ctx.lineWidth = 0.8;
          ctx.stroke();
        }
      }
      ctx.restore();
    } else if (type === "image" && shape.dataUrl) {
      const img = getCachedImage(shape.dataUrl);
      if (img && img.complete) {
        ctx.save();
        const iw = img.width;
        const ih = img.height;
        if (iw > 0 && ih > 0) {
          ctx.drawImage(img, x1, y1, w, h);
        }
        ctx.restore();
      }
    }

    if (!isPreview && selectedShapes && selectedShapes.includes(shape)) {
      const pad = 4;
      const boxX = Math.min(start.x, end.x) - pad;
      const boxY = Math.min(start.y, end.y) - pad;
      const boxW = Math.abs(end.x - start.x) + pad * 2;
      const boxH = Math.abs(end.y - start.y) + pad * 2;

      ctx.setLineDash([4, 3]);
      ctx.strokeStyle = shape.locked ? "#6b7280" : "#eab308";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.rect(boxX, boxY, boxW, boxH);
      ctx.stroke();

      if (shape.locked || shape.type === "group") {
        shape._resizeHandles = undefined;
        shape._duplicateHandle = undefined;
        shape._deleteHandle = undefined;
        shape._lockHandle = undefined;
        if (shape.type === "group") {
          const btnH = 18;
          const plusPad = 4;
          const plusSize = 14;
          const boxX = Math.min(start.x, end.x) - pad;
          const boxY = Math.min(start.y, end.y) - pad;
          const boxW = Math.abs(end.x - start.x) + pad * 2;
          const plusX = boxX + boxW + plusPad;
          const btnY = boxY - btnH - 4;
          const delSize = 14;
          const delPad = 6;
          const delX = plusX - delSize - delPad;
          const delY = btnY;
          const lockSize = 14;
          const lockPad = 6;
          const lockX = delX - lockSize - lockPad;
          const lockY = delY;
          ctx.setLineDash([]);
          ctx.fillStyle = "#22c55e";
          ctx.strokeStyle = "#14532d";
          ctx.lineWidth = 1;
          ctx.beginPath();
          if (ctx.roundRect) ctx.roundRect(plusX, btnY, plusSize, plusSize, 4);
          else ctx.rect(plusX, btnY, plusSize, plusSize);
          ctx.fill();
          ctx.stroke();
          ctx.beginPath();
          ctx.strokeStyle = "#022c22";
          ctx.lineWidth = 2;
          const cxPlus = plusX + plusSize / 2;
          const cyPlus = btnY + plusSize / 2;
          const arm = plusSize * 0.3;
          ctx.moveTo(cxPlus - arm, cyPlus);
          ctx.lineTo(cxPlus + arm, cyPlus);
          ctx.moveTo(cxPlus, cyPlus - arm);
          ctx.lineTo(cxPlus, cyPlus + arm);
          ctx.stroke();
          shape._duplicateHandle = { x: plusX, y: btnY, w: plusSize, h: plusSize };
          ctx.fillStyle = "#dc2626";
          ctx.strokeStyle = "#7f1d1d";
          ctx.beginPath();
          if (ctx.roundRect) ctx.roundRect(delX, delY, delSize, delSize, 4);
          else ctx.rect(delX, delY, delSize, delSize);
          ctx.fill();
          ctx.stroke();
          ctx.beginPath();
          ctx.strokeStyle = "#fef2f2";
          ctx.lineWidth = 2;
          const cxDel = delX + delSize / 2;
          const cyDel = delY + delSize / 2;
          const armDel = delSize * 0.35;
          ctx.moveTo(cxDel - armDel, cyDel - armDel);
          ctx.lineTo(cxDel + armDel, cyDel + armDel);
          ctx.moveTo(cxDel - armDel, cyDel + armDel);
          ctx.lineTo(cxDel + armDel, cyDel - armDel);
          ctx.stroke();
          shape._deleteHandle = { x: delX, y: delY, w: delSize, h: delSize };
          ctx.fillStyle = "#4b5563";
          ctx.strokeStyle = "#374151";
          ctx.beginPath();
          if (ctx.roundRect) ctx.roundRect(lockX, lockY, lockSize, lockSize, 4);
          else ctx.rect(lockX, lockY, lockSize, lockSize);
          ctx.fill();
          ctx.stroke();
          ctx.strokeStyle = "#e5e7eb";
          ctx.lineWidth = 1.5;
          const cxLock = lockX + lockSize / 2;
          const cyLock = lockY + lockSize / 2;
          ctx.beginPath();
          ctx.arc(cxLock, cyLock - 1.5, 3, Math.PI * 0.5, Math.PI * 1.5);
          ctx.stroke();
          ctx.beginPath();
          if (ctx.roundRect) ctx.roundRect(lockX + 3.5, cyLock + 1, 7, 4.5, 1);
          else ctx.rect(lockX + 3.5, cyLock + 1, 7, 4.5);
          ctx.stroke();
          shape._lockHandle = { x: lockX, y: lockY, w: lockSize, h: lockSize };
        } else {
        const btnH = 18;
        const plusPad = 4;
        const plusSize = 14;
        const plusX = boxX + boxW + plusPad;
        const btnX = plusX - 14 - 6 - 14 - 6 - 44;
        const btnY = boxY - btnH - 4;
        const btnW = 50;
        ctx.setLineDash([]);
        ctx.fillStyle = "#6b7280";
        ctx.strokeStyle = "#4b5563";
        ctx.lineWidth = 1;
        ctx.beginPath();
        if (ctx.roundRect) ctx.roundRect(btnX, btnY, btnW, btnH, 6);
        else ctx.rect(btnX, btnY, btnW, btnH);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = "#e5e7eb";
        ctx.font = "10px Arial";
        ctx.textBaseline = "middle";
        ctx.fillText("Unlock", btnX + 18, btnY + btnH / 2);
        ctx.strokeStyle = "#e5e7eb";
        ctx.lineWidth = 1.2;
        const cxLock = btnX + 10;
        const cyLock = btnY + btnH / 2;
        ctx.beginPath();
        ctx.arc(cxLock + 1.5, cyLock - 1.5, 2.5, Math.PI * 0.2, Math.PI * 1.2);
        ctx.stroke();
        ctx.beginPath();
        if (ctx.roundRect) ctx.roundRect(btnX + 2.5, cyLock + 0.5, 5, 3.5, 1);
        else ctx.rect(btnX + 2.5, cyLock + 0.5, 5, 3.5);
        ctx.stroke();
        shape._unlockHandle = { x: btnX, y: btnY, w: btnW, h: btnH };
        }
      } else {
        const handles = [
          { corner: "tl", x: boxX, y: boxY },
          { corner: "tr", x: boxX + boxW, y: boxY },
          { corner: "br", x: boxX + boxW, y: boxY + boxH },
          { corner: "bl", x: boxX, y: boxY + boxH },
        ];
        ctx.setLineDash([]);
        ctx.fillStyle = "#eab308";
        const s = 8;
        handles.forEach((h) => {
          ctx.fillRect(h.x - s / 2, h.y - s / 2, s, s);
        });
        shape._resizeHandles = handles;

        const plusSize = 14;
        const plusPad = 4;
        const plusX = boxX + boxW + plusPad;
        const plusY = boxY - plusSize - plusPad;
        ctx.fillStyle = "#22c55e";
        ctx.strokeStyle = "#14532d";
        ctx.lineWidth = 1;
        ctx.beginPath();
        if (ctx.roundRect) ctx.roundRect(plusX, plusY, plusSize, plusSize, 4);
        else ctx.rect(plusX, plusY, plusSize, plusSize);
        ctx.fill();
        ctx.stroke();
        ctx.beginPath();
        ctx.strokeStyle = "#022c22";
        ctx.lineWidth = 2;
        const cxPlus = plusX + plusSize / 2;
        const cyPlus = plusY + plusSize / 2;
        const arm = plusSize * 0.3;
        ctx.moveTo(cxPlus - arm, cyPlus);
        ctx.lineTo(cxPlus + arm, cyPlus);
        ctx.moveTo(cxPlus, cyPlus - arm);
        ctx.lineTo(cxPlus, cyPlus + arm);
        ctx.stroke();
        shape._duplicateHandle = { x: plusX, y: plusY, w: plusSize, h: plusSize };

        const delSize = 14;
        const delPad = 6;
        const delX = plusX - delSize - delPad;
        const delY = plusY;
        ctx.fillStyle = "#dc2626";
        ctx.strokeStyle = "#7f1d1d";
        ctx.lineWidth = 1;
        ctx.beginPath();
        if (ctx.roundRect) ctx.roundRect(delX, delY, delSize, delSize, 4);
        else ctx.rect(delX, delY, delSize, delSize);
        ctx.fill();
        ctx.stroke();
        ctx.beginPath();
        ctx.strokeStyle = "#fef2f2";
        ctx.lineWidth = 2;
        const cxDel = delX + delSize / 2;
        const cyDel = delY + delSize / 2;
        const armDel = delSize * 0.35;
        ctx.moveTo(cxDel - armDel, cyDel - armDel);
        ctx.lineTo(cxDel + armDel, cyDel + armDel);
        ctx.moveTo(cxDel - armDel, cyDel + armDel);
        ctx.lineTo(cxDel + armDel, cyDel - armDel);
        ctx.stroke();
        shape._deleteHandle = { x: delX, y: delY, w: delSize, h: delSize };

        const lockSize = 14;
        const lockPad = 6;
        const lockX = delX - lockSize - lockPad;
        const lockY = delY;
        ctx.fillStyle = "#4b5563";
        ctx.strokeStyle = "#374151";
        ctx.lineWidth = 1;
        ctx.beginPath();
        if (ctx.roundRect) ctx.roundRect(lockX, lockY, lockSize, lockSize, 4);
        else ctx.rect(lockX, lockY, lockSize, lockSize);
        ctx.fill();
        ctx.stroke();
        ctx.strokeStyle = "#e5e7eb";
        ctx.lineWidth = 1.5;
        const cxLock = lockX + lockSize / 2;
        const cyLock = lockY + lockSize / 2;
        ctx.beginPath();
        ctx.arc(cxLock, cyLock - 1.5, 3, Math.PI * 0.5, Math.PI * 1.5);
        ctx.stroke();
        ctx.beginPath();
        if (ctx.roundRect) ctx.roundRect(lockX + 3.5, cyLock + 1, 7, 4.5, 1);
        else ctx.rect(lockX + 3.5, cyLock + 1, 7, 4.5);
        ctx.stroke();
        shape._lockHandle = { x: lockX, y: lockY, w: lockSize, h: lockSize };
      }
    }

    ctx.restore();
  }

  function updateBoardInfoLabel() {
    if (!boardInfoLabel) return;
    const typeLabel =
      currentBoardType === "white"
        ? "Whiteboard"
        : currentBoardType === "black"
        ? "Blackboard"
        : "Green board";
    boardInfoLabel.textContent = `${typeLabel} - Page ${
      currentPageIndex + 1
    }`;
  }

  function updateZoomLabel() {
    if (!zoomLabel) return;
    zoomLabel.textContent = `${Math.round(zoom * 100)}%`;
  }

  function setBoardType(type) {
    currentBoardType = type;
    Array.from(
      boardTypeToggle.querySelectorAll(".board-type-button")
    ).forEach((btn) => {
      const isActive = btn.getAttribute("data-board") === type;
      btn.classList.toggle("board-type-button--active", isActive);
    });
    // Adjust default drawing colors based on board background
    if (type === "black" || type === "green") {
      penSettings.color = "#ffffff";
      textSettings.color = "#ffffff";
      shapeSettings.color = "#ffffff";
    } else {
      penSettings.color = "#0f172a";
      textSettings.color = "#0f172a";
      shapeSettings.color = "#0f172a";
    }
    updateBoardAppearance();
    updateBoardInfoLabel();
  }

  function setZoom(newZoom) {
    zoom = Math.min(2, Math.max(0.5, newZoom));
    updateZoomLabel();
    updateBoardAppearance();
  }

  function updateLayoutForPanels() {
    if (!mainLayout) return;
    const leftHidden = !leftPanel || leftPanel.classList.contains("is-hidden");
    const rightHidden = !rightPanel || rightPanel.classList.contains("is-hidden");
    mainLayout.classList.toggle("no-left", leftHidden);
    mainLayout.classList.toggle("no-right", rightHidden);
  }

  function handleToolSelection(tool) {
    currentTool = tool;
    toolButtons.forEach((btn) => {
      const isActive = btn.getAttribute("data-tool") === tool;
      btn.classList.toggle("tool-button--active", isActive);
    });

    if (!propertiesContent) return;
    propertiesContent.innerHTML = "";

    const heading = document.createElement("h3");
    if (tool === "stamps") {
      heading.textContent = "Saved images";
    } else if (tool === "math") {
      heading.textContent = "Symbols";
    } else if (tool === "notes") {
      heading.textContent = "Sticky notes";
    } else {
      heading.textContent = tool[0].toUpperCase() + tool.slice(1) + " tool";
    }
    heading.style.fontSize = "0.85rem";
    heading.style.margin = "0 0 0.4rem";

    propertiesContent.appendChild(heading);

    if (tool === "pen" || tool === "highlighter") {
      renderPenOptions(tool);
    } else if (tool === "eraser") {
      renderEraserOptions();
    } else if (tool === "shapes") {
      renderShapeOptions();
    } else if (tool === "text") {
      renderTextOptions();
    } else if (tool === "notes") {
      renderStickyOptions();
    } else if (tool === "math") {
      renderMathSymbolsOptions();
    } else if (tool === "select") {
      renderSelectOptions();
    } else if (tool === "charts") {
      renderChartOptions();
    } else if (tool === "stamps") {
      renderStampOptions();
    } else if (tool === "graphs") {
      const wrap = document.createElement("div");
      wrap.className = "tool-options-group";
      const p = document.createElement("p");
      p.style.fontSize = "0.8rem";
      p.style.color = "#9ca3af";
      p.style.margin = "0";
      p.textContent = "Graphs tool shows a full-page graph with horizontal and vertical axes and four quadrants while this tool is active. Use Pen/Highlighter to draw on it.";
      wrap.appendChild(p);
      propertiesContent.appendChild(wrap);
    } else {
      const text = document.createElement("p");
      text.style.fontSize = "0.8rem";
      text.style.color = "#9ca3af";
      text.style.margin = "0";
      text.textContent =
        "Tool options will appear here as we add more controls.";
      propertiesContent.appendChild(text);
    }

    // Redraw when switching tools so Graphs background (and others) appear immediately
    updateBoardAppearance();
  }

  function applyFormatToSelectedTexts(prop, value) {
    selectedTexts.forEach((t) => { t[prop] = value; });
    updateBoardAppearance();
  }

  function moveSelectedToBack() {
    const page = pages[currentPageIndex];
    if (!page) return;
    if (!page.shapes) page.shapes = [];
    if (!page.texts) page.texts = [];
    const hasAny = (selectedShapes && selectedShapes.length) || (selectedTexts && selectedTexts.length);
    if (!hasAny) return;
    pushUndo();
    if (selectedShapes.length) {
      const set = new Set(selectedShapes);
      const selected = [];
      const rest = [];
      for (const s of page.shapes) {
        if (set.has(s)) selected.push(s);
        else rest.push(s);
      }
      page.shapes = selected.concat(rest);
    }
    if (selectedTexts.length) {
      const setT = new Set(selectedTexts);
      const selectedT = [];
      const restT = [];
      for (const t of page.texts) {
        if (setT.has(t)) selectedT.push(t);
        else restT.push(t);
      }
      page.texts = selectedT.concat(restT);
    }
    updateBoardAppearance();
  }

  function copyStyle() {
    if (selectedShapes.length > 0) {
      const s = selectedShapes[0];
      styleClipboard.shapeStyle = {
        color: s.color != null ? s.color : "#0f172a",
        width: s.width != null ? s.width : 2,
        fillMode: s.fillMode != null ? s.fillMode : "hollow",
      };
    }
    if (selectedTexts.length > 0) {
      const t = selectedTexts[0];
      styleClipboard.textStyle = {
        color: t.color != null ? t.color : "#0f172a",
        fontSize: t.fontSize != null ? t.fontSize : 32,
        fontFamily: t.fontFamily != null ? t.fontFamily : "Arial",
        bold: !!t.bold,
        italic: !!t.italic,
        underline: !!t.underline,
        stickyColor: t.sticky ? (t.stickyColor != null ? t.stickyColor : "#fef08a") : undefined,
      };
    }
    if (selectedShapes.length === 0 && selectedTexts.length === 0) {
      styleClipboard.shapeStyle = null;
      styleClipboard.textStyle = null;
    }
  }

  function pasteStyle() {
    const hasShapeClip = styleClipboard.shapeStyle != null;
    const hasTextClip = styleClipboard.textStyle != null;
    if (!hasShapeClip && !hasTextClip) return;
    pushUndo();
    if (hasShapeClip && selectedShapes.length > 0) {
      const clip = styleClipboard.shapeStyle;
      selectedShapes.forEach((s) => {
        s.color = clip.color;
        s.width = clip.width;
        s.fillMode = clip.fillMode;
      });
    }
    if (hasTextClip && selectedTexts.length > 0) {
      const clip = styleClipboard.textStyle;
      selectedTexts.forEach((t) => {
        t.color = clip.color;
        t.fontSize = clip.fontSize;
        t.fontFamily = clip.fontFamily;
        t.bold = clip.bold;
        t.italic = clip.italic;
        t.underline = clip.underline;
        if (t.sticky && clip.stickyColor != null) t.stickyColor = clip.stickyColor;
      });
    }
    if (hasShapeClip && selectedTexts.length > 0 && selectedShapes.length === 0) {
      selectedTexts.forEach((t) => { t.color = styleClipboard.shapeStyle.color; });
    }
    if (hasTextClip && selectedShapes.length > 0 && selectedTexts.length === 0) {
      selectedShapes.forEach((s) => { s.color = styleClipboard.textStyle.color; });
    }
    updateBoardAppearance();
    if (currentTool === "select") handleToolSelection("select");
  }

    const container = boardCanvas && boardCanvas.closest(".canvas-container");

      const scale = window.devicePixelRatio || 1;

      const logicalH = boardCanvas ? boardCanvas.height / (scale * zoom) : 600;
      return { x: logicalW / 2, y: logicalH / 2 };
    }
    const scrollTop = container.scrollTop;
    const clientHeight = container.clientHeight;
    const scale = window.devicePixelRatio || 1;
    const logicalW = boardCanvas ? boardCanvas.width / (scale * zoom) : 800;
    return {
      x: logicalW / 2,
      y: (scrollTop + clientHeight / 2) / zoom,
    };
  }
